<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD 系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #475569;

            --color-confirmed: #22c55e;
            --color-draft: #94a3b8;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
            --color-info: #3b82f6;
            --color-tag-default: #6366f1;
            --color-dc: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1800px; margin: 0 auto; padding: 16px; }
        @media (min-width: 1801px) {
            .container { max-width: 96vw; }
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { font-size: 1.25rem; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .nav-link {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-link:hover { background: var(--bg-secondary); }
        .header-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        #user-info { font-size: 0.75rem; color: var(--text-muted); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 8px;
        }
        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .tab.active { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }

        /* Tab panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Login screen */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
        }
        #login-screen .card {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 280px;
        }
        #login-screen h2 { margin-bottom: 6px; }
        #login-screen .hint { margin-bottom: 18px; color: var(--text-muted); font-size: 0.8rem; }
        #login-screen input {
            padding: 10px 15px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.95rem;
            width: 220px;
            font-family: inherit;
        }
        #login-screen input + input { margin-top: 10px; }
        #login-screen button#login-btn {
            margin-top: 14px;
            padding: 10px 25px;
            background: var(--color-warning);
            border: none;
            color: #1a1a2e;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        #login-screen .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        #login-screen .divider .line { flex: 1; height: 1px; background: var(--border); }
        #login-screen #google-login-btn {
            padding: 10px 18px;
            background: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        #login-error { color: var(--color-danger); margin-top: 15px; display: none; }
        #login-info { color: var(--text-muted); margin-top: 15px; display: none; font-size: 0.85rem; }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .toolbar select, .toolbar button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .toolbar button.primary {
            background: var(--color-info);
            border-color: var(--color-info);
            color: white;
        }
        .toolbar button.primary:hover { opacity: 0.9; }
        .toolbar .search-toggle { background: transparent; border: 1px solid var(--border); }
        .toolbar #search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            display: none;
            width: 200px;
        }
        .toolbar #search-input.show { display: inline-block; }

        /* Tag chips */
        .tag-filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 12px;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
        }
        .tag-chip.active {
            background: var(--color-tag-default);
            border-color: var(--color-tag-default);
            color: white;
        }

        /* ====== Visit table ====== */
        .visit-table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .visit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.86rem;
            table-layout: fixed;
        }
        .visit-table thead th {
            position: sticky;
            top: 0;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 600;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            z-index: 10;
        }
        .visit-table tbody td {
            padding: 6px 8px;
            vertical-align: top;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.3;
        }
        .visit-table tbody td.col-labs,
        .visit-table tbody td.col-extra {
            white-space: pre-wrap;
        }
        .visit-table tbody td.col-exam .exam-content {
            white-space: pre-wrap;
        }
        .visit-table tbody tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .visit-table tbody tr.no-show td {
            opacity: 0.55;
            background: rgba(0,0,0,0.15);
        }

        /* 欄寬 */
        .col-num    { width: 36px; text-align: center; }
        .col-record { width: 110px; }
        .visit-table tbody td.col-record { white-space: nowrap; overflow: hidden; }
        .visit-table tbody td.col-record .record-line { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; font-weight: 600; }
        .visit-table tbody td.col-record .age-line { font-size: 0.78rem; color: var(--text-primary); margin-top: 1px; }
        .visit-table tbody td.col-record .ref-line { font-size: 0.74rem; color: var(--text-primary); font-style: italic; margin-top: 1px; }
        .col-labs   { width: 100px; font-size: 0.76rem; }
        .col-extra  { width: 140px; font-size: 0.8rem; }
        .col-exam   { width: 160px; font-size: 0.8rem; }
        .visit-table tbody td.col-extra,
        .visit-table tbody td.col-labs {
            max-height: 130px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        /* Exam：預設只顯示前 3 行；hover 或 expanded 顯示全部 */
        .exam-content {
            max-height: 60px;
            overflow: hidden;
            position: relative;
            transition: max-height 0.15s;
        }
        .exam-content.expanded,
        .exam-content:hover {
            max-height: 500px;
            overflow-y: auto;
        }
        .exam-content::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 16px;
            background: linear-gradient(transparent, var(--bg-secondary));
            pointer-events: none;
        }
        .exam-content.expanded::after,
        .exam-content:hover::after { display: none; }
        .exam-content.short::after { display: none; }
        .exam-toggle {
            display: inline-block;
            margin-top: 2px;
            color: var(--color-info);
            font-size: 0.72rem;
            cursor: pointer;
        }
        .visit-table tbody td.col-extra::-webkit-scrollbar,
        .visit-table tbody td.col-exam::-webkit-scrollbar,
        .visit-table tbody td.col-labs::-webkit-scrollbar { width: 4px; }
        .visit-table tbody td.col-extra::-webkit-scrollbar-thumb,
        .visit-table tbody td.col-exam::-webkit-scrollbar-thumb,
        .visit-table tbody td.col-labs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .col-plan   { /* 彈性 */ }
        .col-tags   { width: 56px; }
        .col-actions { width: 90px; }

        /* DC divider row */
        tr.dc-divider td {
            text-align: center;
            background: rgba(0,0,0,0.3);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px;
            letter-spacing: 2px;
            white-space: nowrap;
            word-break: keep-all;
        }

        /* Plan summary 與 plan body */
        .plan-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 6px;
            margin-bottom: 2px;
            padding: 0;
            border: none;
            font-size: 0.72rem;
            line-height: 1.3;
            color: var(--text-secondary);
        }
        .plan-summary .pill {
            display: inline-flex;
            padding: 1px 6px;
            background: rgba(99,102,241,0.18);
            border: 1px solid rgba(99,102,241,0.3);
            color: #c7d2fe;
            border-radius: 4px;
            font-size: 0.72rem;
        }
        .plan-summary .pill.rtc {
            background: rgba(34,197,94,0.18);
            border-color: rgba(34,197,94,0.4);
            color: #bbf7d0;
        }
        .plan-summary .pill.warn {
            background: rgba(251,191,36,0.18);
            border-color: rgba(251,191,36,0.4);
            color: #fde68a;
        }
        .plan-body {
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            line-height: 1.35;
        }
        .patient-summary {
            font-size: 0.75rem;
            line-height: 1.3;
            padding: 3px 6px;
            border-radius: 4px;
            margin-bottom: 3px;
        }
        .patient-summary.bone { background: rgba(168,85,247,0.12); color: #d8b4fe; border-left: 2px solid #a855f7; }
        .patient-summary.pain { background: rgba(236,72,153,0.12); color: #fbcfe8; border-left: 2px solid #ec4899; }
        .plan-body .more-toggle {
            display: inline-block;
            margin-top: 4px;
            color: var(--color-info);
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
        }
        .plan-line.done { color: #86efac; }    /* * 開頭已完成 */
        .plan-line.plan { color: var(--text-secondary); }   /* - 開頭計畫中 */
        .plan-line.rtc-line { color: #93c5fd; font-weight: 500; }

        /* Tag chips in row */
        .visit-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .visit-tags .tag-chip {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            color: white;
            white-space: nowrap;
        }
        /* 8 種主 tag 配色 */
        .visit-tags .tag-chip[data-tag="鬆"] { background: #a855f7; }
        .visit-tags .tag-chip[data-tag="CT NB"] { background: #f59e0b; color: #1a1a2e; }
        .visit-tags .tag-chip[data-tag="SONO"] { background: #22c55e; }
        .visit-tags .tag-chip[data-tag="TAME"] { background: #3b82f6; }
        .visit-tags .tag-chip[data-tag="MRI"] { background: #c4b5fd; color: #1a1a2e; }
        .visit-tags .tag-chip[data-tag="PRP"] { background: #ec4899; }
        .visit-tags .tag-chip[data-tag="follow up"] { background: #64748b; }
        .visit-tags .tag-chip[data-tag="med"] { background: #f97316; }

        /* Procedure status overlay：覆蓋背景色 */
        .tag-chip[data-status="pending"] { background: #fbcfe8 !important; color: #831843 !important; }
        .tag-chip[data-status="done"] { background: #fde68a !important; color: #78350f !important; }
        .tag-chip[data-status="pm"] { background: #bfdbfe !important; color: #1e3a8a !important; }
        .tag-chip[data-status="am"] { background: #c7d2fe !important; color: #3730a3 !important; }
        .tag-chip .status-flag {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 3px;
            padding: 0 3px;
            border-radius: 3px;
            background: rgba(0,0,0,0.18);
        }
        /* Procedure 摘要區（plan column 最上方）*/
        .proc-status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 4px;
        }

        /* 抗凝劑 icon (放在 Exam 第一行) */
        .ac-line {
            margin-bottom: 3px;
        }
        .exam-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px dashed rgba(255,255,255,0.08);
        }
        .exam-summary .pill {
            display: inline-flex;
            padding: 1px 6px;
            background: rgba(99,102,241,0.18);
            border: 1px solid rgba(99,102,241,0.3);
            color: #c7d2fe;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .exam-summary .pill.rtc {
            background: rgba(34,197,94,0.18);
            border-color: rgba(34,197,94,0.4);
            color: #bbf7d0;
        }
        .exam-summary .pill.warn {
            background: rgba(251,191,36,0.18);
            border-color: rgba(251,191,36,0.4);
            color: #fde68a;
        }
        .ac-icon {
            display: inline-flex;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: help;
        }
        .ac-icon.ac-yes { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
        .ac-icon.ac-none { background: rgba(34,197,94,0.18); color: #86efac; border: 1px solid rgba(34,197,94,0.4); }
        .ac-icon.ac-unknown { background: rgba(251,191,36,0.2); color: #fde68a; border: 1px solid rgba(251,191,36,0.4); }

        /* Status badges */
        .status-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .status-badge {
            display: inline-flex;
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .status-badge.draft { background: rgba(148,163,184,0.2); color: #cbd5e1; }
        .status-badge.confirmed { background: rgba(34,197,94,0.2); color: #86efac; }
        .status-badge.first-visit { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .status-badge.self-rtc { background: rgba(245,158,11,0.2); color: #fde68a; }
        .status-badge.warning { background: rgba(251,191,36,0.3); color: #fde68a; }

        /* Row actions */
        .row-actions {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .row-actions button {
            padding: 2px 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.66rem;
            cursor: pointer;
            white-space: nowrap;
            line-height: 1.2;
        }
        .row-actions button:hover { background: var(--bg-secondary); }
        .row-actions button.confirmed { background: rgba(34,197,94,0.3); border-color: rgba(34,197,94,0.5); }

        /* Header notes 區塊 */
        .header-notes {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            margin-bottom: 6px;
            font-size: 0.82rem;
        }
        .header-notes .hn-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.78rem;
        }
        .header-notes .hn-content {
            white-space: pre-wrap;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            line-height: 1.55;
        }
        .header-notes .hn-edit {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.78rem;
            cursor: pointer;
        }
        .header-notes textarea {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            padding: 6px;
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            min-height: 80px;
        }

        /* 在窄螢幕降低欄寬 */
        @media (max-width: 1280px) {
            .col-extra { width: 160px; }
            .col-exam { width: 150px; }
            .col-tags { width: 100px; }
            .visit-table { font-size: 0.8rem; }
        }

        /* Patient card (主表用) */
        .patient-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .empty-hint {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        /* DC divider */
        .dc-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
            color: var(--color-dc);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .dc-divider .line { flex: 1; height: 1px; background: var(--color-dc); }

        /* Status indicator (top-right of header) */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-draft);
        }
        .status-dot.connected { background: var(--color-confirmed); }
        .status-dot.saving {
            background: var(--color-warning);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Mobile */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 1.1rem; }
            .nav-link span.label { display: none; }
            #user-info { display: none; }
            #logout-btn .btn-text { display: none; }
            .toolbar { gap: 6px; }
        }

        /* 病人卡片（主表用） */
        .pt-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .pt-card .pt-info { flex: 1; min-width: 0; }
        .pt-card .pt-line1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .pt-card .pt-line2 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .pt-card .pt-tags {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
        }
        .pt-card .pt-tag {
            display: inline-flex;
            padding: 2px 8px;
            background: var(--color-tag-default);
            color: white;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .pt-card .pt-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .pt-card .pt-actions button {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;

    function showLoginError(err) {
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        console.error('登入失敗:', err);
        let msg = err.message || err.code;
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') msg = '帳號或密碼錯誤';
        else if (err.code === 'auth/too-many-requests') msg = '嘗試次數過多，請稍後再試';
        else if (err.code === 'auth/network-request-failed') msg = '網路連線錯誤';
        else if (err.code === 'auth/popup-closed-by-user') msg = '已取消登入';
        error.textContent = msg;
        error.style.display = 'block';
        info.style.display = 'none';
    }

    async function loginWithEmailPassword() {
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            error.textContent = '請輸入 Email 與密碼';
            error.style.display = 'block';
            return;
        }
        error.style.display = 'none';
        info.textContent = '登入中...';
        info.style.display = 'block';
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.NONE);

            showLoginError(err);
            passwordInput.value = '';
            passwordInput.focus();
        }

    function isStandaloneMode() {

        error.style.display = 'none';

        info.style.display = 'block';

            } else {
                await firebase.auth().signInWithPopup(provider);

        } catch (err) {

    function applyFontSize(pct) {
        document.documentElement.style.fontSize = (16 * pct / 100) + 'px';

    function adjustFontSize(delta) {
        const cur = parseInt(localStorage.getItem('opd:fontSize') || '100');
        const idx = FONT_SIZES.indexOf(cur);
        let newIdx = idx === -1 ? FONT_SIZES.indexOf(100) : idx + delta;
        newIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, newIdx));
        applyFontSize(FONT_SIZES[newIdx]);
    }

    // ========== Word 匯入 ==========
    let importedRows = [];
    let importedHeaderNotes = '';

    async function parseDocxFile(file) {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.convertToHtml({ arrayBuffer });
        const html = result.value;
        const doc = new DOMParser().parseFromString(html, 'text/html');

        // 解析表格前的段落 → headerNotes
        const preTableParagraphs = [];
        let elem = doc.body.firstChild;
        while (elem && elem.tagName !== 'TABLE') {
            if (elem.tagName === 'P') {
                const txt = elem.textContent.trim();
                if (txt) preTableParagraphs.push(txt);
            }
            elem = elem.nextSibling;
        }
        const headerNotes = preTableParagraphs.join('\n');

        const table = doc.querySelector('table');
        if (!table) return { ok: false, error: '檔案內找不到表格' };

        const rows = [...table.querySelectorAll('tr')];
        if (rows.length < 2) return { ok: false, error: '表格資料過少' };

        const parsed = [];
        let isAfterDC = false;
        rows.slice(1).forEach((tr, idx) => {
            const cells = [...tr.querySelectorAll('td, th')].map(td => {
                // 保留 cell 內的換行，把 <br> 與多個 <p> 都轉成 \n
                let txt = '';
                td.querySelectorAll('p').forEach((p, i) => {
                    if (i > 0) txt += '\n';
                    txt += p.textContent;
                });
                if (!txt) txt = td.textContent;
                return txt.trim();
            });
            if (cells.every(c => !c) || cells.length === 0) return;

            const isDCRow = cells.some(c => /^DC$/i.test(c));
            if (isDCRow) { isAfterDC = true; return; }

            const tabbed = cells.join('\t');
            const result = parsePastedRow(tabbed);
            if (result.ok) {
                parsed.push({ ...result, noShow: isAfterDC, originalRow: idx + 1 });
            } else {
                parsed.push({ ok: false, error: result.error, raw: cells, noShow: isAfterDC, originalRow: idx + 1 });
            }
        });

        return { ok: true, rows: parsed, headerNotes };
    }

    function detectDateFromFilename(filename) {
        const m = filename.match(/(\d{2})[_\-](\d{1,2})[_\-](\d{1,2})/);
        if (!m) return '';
        return `20${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    }

    async function handleImportConfirm() {
        const date = document.getElementById('import-clinic-date').value;
        if (!date) { alert('請選擇門診日期'); return; }

        const checked = [...document.querySelectorAll('.import-row-check:checked')]
            .map(c => importedRows[parseInt(c.dataset.idx)]).filter(r => r && r.ok);
        if (!checked.length) { alert('請勾選至少 1 筆'); return; }

        if (!confirm(`確定匯入 ${checked.length} 筆病人到 ${date}？\n\n（已存在的病歷號會被合併更新；既有同日 visit 會被覆蓋。）`)) return;

        const status = document.getElementById('import-status');
        status.textContent = `匯入中... 0 / ${checked.length}`;
        status.style.color = 'var(--text-secondary)';

        const updates = {};
        const now = Date.now();

        checked.forEach((r, i) => {
            const labLines = [];
            if (r.eGFR) labLines.push(`eGFR ${r.eGFR}`);
            const labStuff = extractLabs(r.extra || '');
            if (labStuff.labs) labLines.push(labStuff.labs);
            if (r.INR && !/INR/i.test(labStuff.labs || '')) {
                labLines.push(`INR ${r.INR}${r.INRDate ? ` (${r.INRDate})` : ''}`);
            }
            const refDetected = extractReferrer(r.extra || '');
            const parsedAge = parseAgeSex(r.ageSex, date);

            const existingPatient = state.patients[r.recordNumber] || {};
            updates[`opd/patients/${r.recordNumber}`] = {
                ...existingPatient,
                recordNumber: r.recordNumber,
                surname: r.surname || existingPatient.surname || '',
                ageSex: r.ageSex || existingPatient.ageSex || '',
                birthYear: parsedAge?.birthYear || existingPatient.birthYear || null,
                sex: parsedAge?.sex || existingPatient.sex || '',
                referrer: refDetected || existingPatient.referrer || '',
                labs: labLines.join('\n') || existingPatient.labs || '',
                pastHistory: existingPatient.pastHistory || '',
                boneScore: existingPatient.boneScore || '',
                anticoagState: existingPatient.anticoagState || 'unknown',
                anticoagulants: existingPatient.anticoagulants || [],
                bonePlanSummary: existingPatient.bonePlanSummary || '',
                painPlanSummary: existingPatient.painPlanSummary || '',
                firstVisitDate: existingPatient.firstVisitDate || date,
                createdAt: existingPatient.createdAt || now,
                updatedAt: now
            };
            updates[`opd/visits/${date}/${r.recordNumber}`] = {
                recordNumber: r.recordNumber,
                date,
                orderInClinic: r.order || null,
                examEducation: r.exam || '',
                plan: r.plan || '',
                tags: r.tags || [],
                procedureStatuses: {},
                status: 'confirmed',
                noShow: r.noShow || false,
                createdAt: now,
                updatedAt: now,
                confirmedAt: now
            };
            updates[`opd/patientVisitIndex/${r.recordNumber}/${date}`] = true;
        });

        if (importedHeaderNotes) {
            updates[`opd/clinicMeta/${date}/headerNotes`] = importedHeaderNotes;
        }
        const dayOfWeek = new Date(date + 'T00:00').getDay();
        if (dayOfWeek !== 3) {
            updates[`opd/clinicDates/${date}`] = { date, type: 'ad-hoc', note: '從匯入建立', createdAt: now };
        }

        try {
            await db.ref().update(updates);
            status.textContent = `✅ 匯入完成：${checked.length} 筆`;
            status.style.color = 'var(--color-confirmed)';
            setTimeout(() => {
                state.currentClinicDate = date;
                localStorage.setItem('opd:currentClinicDate', date);
                activateTab('panel-clinic');
                renderClinicDateSelector();
                onClinicDateChanged(date);
            }, 1000);
        } catch (err) {
            status.textContent = `❌ 失敗：${err.message}`;
            status.style.color = 'var(--color-danger)';
        }
    }

    function bindImportUI() {
        const fileInput = document.getElementById('import-file-input');
        const parseBtn = document.getElementById('import-parse-btn');

        if (!fileInput) return;

        fileInput.addEventListener('change', () => {

            if (f) {

                document.getElementById('import-date-hint').textContent = auto ? `已從檔名偵測 → ${auto}` : '檔名未含日期，請手動選擇';
            }

            const f = fileInput.files[0];

            const status = document.getElementById('import-status');
            status.textContent = '解析中...';

                const failCount = importedRows.length - okCount;
                status.textContent = `✓ 解析完成：${okCount} 筆成功${failCount ? `, ${failCount} 筆失敗` : ''}${importedHeaderNotes ? '；含標頭備註 ' + importedHeaderNotes.length + ' 字' : ''}`;
                status.style.color = 'var(--color-confirmed)';

                console.error(err);
                status.textContent = `❌ 解析錯誤：${err.message}`;
                status.style.color = 'var(--color-danger)';
            }
        });
    }

    // ========== 門診日邏輯 ==========
    // 規則：每月第 2 與第 4 個週三
    function getNthWednesdayOfMonth(year, month, n) {
        // year, month (1-12), n (1-5)
        const d = new Date(year, month - 1, 1);
        let count = 0;
        while (d.getMonth() === month - 1) {
            if (d.getDay() === 3) {
                count++;
                if (count === n) return new Date(d);
            }
            d.setDate(d.getDate() + 1);
        }
        return null;
    }

    function generateRegularClinicDates(monthsBack = 6, monthsForward = 6) {
        const today = new Date();
        const dates = [];
        for (let offset = -monthsBack; offset <= monthsForward; offset++) {
            const d = new Date(today.getFullYear(), today.getMonth() + offset, 1);
            const w2 = getNthWednesdayOfMonth(d.getFullYear(), d.getMonth() + 1, 2);
            const w4 = getNthWednesdayOfMonth(d.getFullYear(), d.getMonth() + 1, 4);
            if (w2) dates.push({ date: formatDate(w2), type: 'regular' });
            if (w4) dates.push({ date: formatDate(w4), type: 'regular' });
        }
        return dates;
    }

    function formatDate(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    // 從 ageSex (e.g., "55/F") 解析 birthYear & sex
    function parseAgeSex(str, refDate) {
        if (!str) return null;
        const m = str.match(/(\d+)\s*\/\s*([MFmf])/);
        if (!m) return null;
        const age = parseInt(m[1]);
        const sex = m[2].toUpperCase();
        const refYear = refDate ? new Date(refDate).getFullYear() : new Date().getFullYear();
        return { birthYear: refYear - age, sex };
    }
    // 顯示用：根據 birthYear 與當前年計算 age 字串
    function displayAgeSex(patient, refDate) {
        if (patient?.birthYear) {
            const refYear = refDate ? new Date(refDate).getFullYear() : new Date().getFullYear();
            return `${refYear - patient.birthYear}/${patient.sex || ''}`;
        }
        return patient?.ageSex || '';
    }

    function formatDateLabel(dateStr) {
        // 2026-04-22 → "2026/04/22 (三)"
        const [y, m, d] = dateStr.split('-').map(Number);
        const dt = new Date(y, m - 1, d);
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')} (${days[dt.getDay()]})`;
    }

    function findNearestClinicDate(allDates) {
        // 找今日最接近的門診日（優先未來，其次最近過去）
        const today = formatDate(new Date());
        const future = allDates.filter(d => d.date >= today).sort((a, b) => a.date.localeCompare(b.date));
        if (future.length > 0) return future[0].date;
        const past = allDates.filter(d => d.date < today).sort((a, b) => b.date.localeCompare(a.date));
        return past[0]?.date || null;
    }

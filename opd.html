<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD 系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #475569;

            --color-confirmed: #22c55e;
            --color-draft: #94a3b8;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
            --color-info: #3b82f6;
            --color-tag-default: #6366f1;
            --color-dc: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { font-size: 1.25rem; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .nav-link {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-link:hover { background: var(--bg-secondary); }
        .header-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        #user-info { font-size: 0.75rem; color: var(--text-muted); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 8px;
        }
        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .tab.active { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }

        /* Tab panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Login screen */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
        }
        #login-screen .card {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 280px;
        }
        #login-screen h2 { margin-bottom: 6px; }
        #login-screen .hint { margin-bottom: 18px; color: var(--text-muted); font-size: 0.8rem; }
        #login-screen input {
            padding: 10px 15px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.95rem;
            width: 220px;
            font-family: inherit;
        }
        #login-screen input + input { margin-top: 10px; }
        #login-screen button#login-btn {
            margin-top: 14px;
            padding: 10px 25px;
            background: var(--color-warning);
            border: none;
            color: #1a1a2e;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        #login-screen .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        #login-screen .divider .line { flex: 1; height: 1px; background: var(--border); }
        #login-screen #google-login-btn {
            padding: 10px 18px;
            background: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        #login-error { color: var(--color-danger); margin-top: 15px; display: none; }
        #login-info { color: var(--text-muted); margin-top: 15px; display: none; font-size: 0.85rem; }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .toolbar select, .toolbar button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .toolbar button.primary {
            background: var(--color-info);
            border-color: var(--color-info);
            color: white;
        }
        .toolbar button.primary:hover { opacity: 0.9; }
        .toolbar .search-toggle { background: transparent; border: 1px solid var(--border); }
        .toolbar #search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            display: none;
            width: 200px;
        }
        .toolbar #search-input.show { display: inline-block; }

        /* Tag chips */
        .tag-filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 12px;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
        }
        .tag-chip.active {
            background: var(--color-tag-default);
            border-color: var(--color-tag-default);
            color: white;
        }

        /* Patient card (placeholder） */
        .patient-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .empty-hint {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        /* DC divider */
        .dc-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
            color: var(--color-dc);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .dc-divider .line { flex: 1; height: 1px; background: var(--color-dc); }

        /* Status indicator (top-right of header) */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-draft);
        }
        .status-dot.connected { background: var(--color-confirmed); }
        .status-dot.saving {
            background: var(--color-warning);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Mobile */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 1.1rem; }
            .nav-link span.label { display: none; }
            #user-info { display: none; }
            #logout-btn .btn-text { display: none; }
            .toolbar { gap: 6px; }
        }

        /* 病人卡片（主表用） */
        .pt-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .pt-card .pt-info { flex: 1; min-width: 0; }
        .pt-card .pt-line1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .pt-card .pt-line2 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .pt-card .pt-tags {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
        }
        .pt-card .pt-tag {
            display: inline-flex;
            padding: 2px 8px;
            background: var(--color-tag-default);
            color: white;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .pt-card .pt-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .pt-card .pt-actions button {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .pt-card .pt-actions button.danger {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }
        .pt-card .pt-actions button:hover { background: var(--bg-secondary); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .modal .field {
            margin-bottom: 12px;
        }
        .modal .field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal .field input, .modal .field textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .modal .field textarea { resize: vertical; min-height: 60px; }
        .modal .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .modal .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .modal .actions button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .modal .actions button.primary {
            background: var(--color-info);
            border-color: var(--color-info);
            color: white;
        }
        .modal .actions button.danger {
            background: var(--color-danger);
            border-color: var(--color-danger);
            color: white;
        }

        /* Tag editor in modal */
        .tag-editor {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            min-height: 38px;
        }
        .tag-editor .tag-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            background: var(--color-tag-default);
            color: white;
            border-radius: 10px;
            font-size: 0.78rem;
            gap: 4px;
        }
        .tag-editor .tag-pill .remove {
            cursor: pointer;
            opacity: 0.7;
            font-size: 0.85rem;
        }
        .tag-editor .tag-pill .remove:hover { opacity: 1; }
        .tag-editor input {
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            flex: 1;
            min-width: 60px;
            padding: 2px 4px;
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
    <div class="card">
        <h2>🩺 OPD 系統</h2>
        <p class="hint">提示：intra</p>
        <input type="email" id="email-input" placeholder="Email" autocomplete="username">
        <input type="password" id="password-input" placeholder="密碼" autocomplete="current-password">
        <br>
        <button id="login-btn">登入</button>

        <div class="divider">
            <div class="line"></div><span>或</span><div class="line"></div>
        </div>

        <button id="google-login-btn">
            <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
            使用 Google 登入
        </button>
        <p style="margin-top: 6px; color: var(--text-muted); font-size: 0.75rem;">（家裡或自己電腦使用，可持續登入）</p>

        <p id="login-error">登入失敗</p>
        <p id="login-info"></p>
    </div>
</div>

<!-- 主畫面 -->
<div class="container hidden" id="main-app">

    <header>
        <h1>🩺 OPD 系統</h1>
        <div class="header-right">
            <a href="index.html" class="nav-link" title="切換到排程系統">→ <span class="label">排程</span></a>
            <span class="status-pill">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">連線中</span>
            </span>
            <span id="user-info"></span>
            <button id="logout-btn" class="header-btn" title="登出">🚪<span class="btn-text"> 登出</span></button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" data-panel="panel-clinic">📅 門診日</button>
        <button class="tab" data-panel="panel-patients">👥 病人主表</button>
        <button class="tab" data-panel="panel-io">📥 匯入 / 匯出</button>
    </div>

    <!-- 門診日 -->
    <div class="panel active" id="panel-clinic">
        <div class="toolbar">
            <select id="clinic-date-select"><option>載入中...</option></select>
            <button class="primary" id="add-patient-btn">+ 新增病人</button>
            <button class="search-toggle" id="search-toggle-btn">🔍</button>
            <input type="text" id="search-input" placeholder="病歷號 / 姓">
            <span style="flex:1"></span>
            <button id="add-clinic-date-btn" title="新增加診日">+ 加診日</button>
        </div>
        <div class="tag-filter-bar" id="tag-filter-bar">
            <!-- tag chips 動態產生 -->
        </div>
        <div id="patient-list">
            <div class="empty-hint">（骨架完成，下一步開始建立病人卡片內容）</div>
        </div>
    </div>

    <!-- 病人主表 -->
    <div class="panel" id="panel-patients">
        <div class="toolbar">
            <input type="text" id="patient-search-input" placeholder="🔍 病歷號 / 姓" style="display: inline-block; flex: 1; max-width: 320px;">
            <button class="primary" id="add-patient-master-btn">+ 新增病人</button>
            <span style="flex:1"></span>
            <span id="patient-count" style="color: var(--text-muted); font-size: 0.85rem;"></span>
        </div>
        <div id="patient-master-list">
            <div class="empty-hint">載入中...</div>
        </div>
    </div>

    <!-- 匯入 / 匯出 -->
    <div class="panel" id="panel-io">
        <div class="empty-hint">（待實作：Word 匯入、Procedure list 匯出）</div>
    </div>

</div>

<!-- 病人新增/編輯 Modal -->
<div class="modal-overlay" id="patient-modal">
    <div class="modal">
        <h3 id="patient-modal-title">新增病人</h3>

        <!-- 從 docx 整列貼上自動解析 -->
        <div class="field" id="paste-from-docx-field">
            <label style="display: flex; justify-content: space-between; align-items: center;">
                <span>📋 從 Word 整列貼上（可選，自動填入下方欄位）</span>
                <button type="button" id="pt-paste-parse-btn" style="padding: 4px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px; font-family: inherit; font-size: 0.78rem; cursor: pointer;">解析填入</button>
            </label>
            <textarea id="pt-paste-input" placeholder="從 Word OPD 表格選整列複製貼上即可（10 欄、Tab 分隔）" style="min-height: 50px;"></textarea>
            <div id="pt-paste-status" style="font-size: 0.78rem; color: var(--text-muted); margin-top: 4px;"></div>
        </div>

        <div class="field">
            <label>病歷號 <span style="color: var(--color-danger)">*</span></label>
            <input type="text" id="pt-record-number" placeholder="例：W61564">
        </div>
        <div class="field">
            <label>姓</label>
            <input type="text" id="pt-surname" placeholder="例：楊" maxlength="2">
        </div>
        <div class="field-row">
            <div class="field">
                <label>年齡 / 性別</label>
                <input type="text" id="pt-age-sex" placeholder="例：55/F">
            </div>
            <div class="field">
                <label>eGFR</label>
                <input type="text" id="pt-egfr" placeholder="例：>60">
            </div>
        </div>
        <div class="field-row">
            <div class="field">
                <label>INR</label>
                <input type="text" id="pt-inr" placeholder="例：1.04">
            </div>
            <div class="field">
                <label>INR 日期</label>
                <input type="text" id="pt-inr-date" placeholder="例：26/04">
            </div>
        </div>
        <div class="field">
            <label>額外資訊</label>
            <textarea id="pt-extra" placeholder="轉介來源、過敏、特殊用藥等"></textarea>
        </div>
        <div class="field">
            <label>標籤（按 Enter 新增）</label>
            <div class="tag-editor" id="pt-tag-editor">
                <input type="text" id="pt-tag-input" placeholder="鬆 / NB / f/u ...">
            </div>
        </div>
        <div class="actions">
            <button id="pt-modal-delete" class="danger" style="display: none;">刪除</button>
            <span style="flex: 1;"></span>
            <button id="pt-modal-cancel">取消</button>
            <button id="pt-modal-save" class="primary">儲存</button>
        </div>
    </div>
</div>

<!-- 確認對話框 -->
<div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width: 360px;">
        <h3 id="confirm-title">確認</h3>
        <p id="confirm-message" style="color: var(--text-secondary); margin-bottom: 12px;"></p>
        <div class="actions">
            <button id="confirm-cancel">取消</button>
            <button id="confirm-ok" class="danger">確定</button>
        </div>
    </div>
</div>

<script>
    // ========== Firebase 設定（與 index.html 同一個專案） ==========
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyATCaOlYxkYTle1hPzYAcuXNlQHaAuO3-8",
        authDomain: "case-scheduler-f752b.firebaseapp.com",
        projectId: "case-scheduler-f752b",
        storageBucket: "case-scheduler-f752b.firebasestorage.app",
        messagingSenderId: "703006186929",
        appId: "1:703006186929:web:57ac5b059678005455f190",
        databaseURL: "https://case-scheduler-f752b-default-rtdb.firebaseio.com"
    };

    let currentUser = null;
    let db = null;

    // ========== 登入 / 登出 ==========
    function showLoginError(err) {
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        console.error('登入失敗:', err);
        let msg = err.message || err.code;
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') msg = '帳號或密碼錯誤';
        else if (err.code === 'auth/too-many-requests') msg = '嘗試次數過多，請稍後再試';
        else if (err.code === 'auth/network-request-failed') msg = '網路連線錯誤';
        else if (err.code === 'auth/popup-closed-by-user') msg = '已取消登入';
        error.textContent = msg;
        error.style.display = 'block';
        info.style.display = 'none';
    }

    async function loginWithEmailPassword() {
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            error.textContent = '請輸入 Email 與密碼';
            error.style.display = 'block';
            return;
        }
        error.style.display = 'none';
        info.textContent = '登入中...';
        info.style.display = 'block';
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.NONE);
            await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (err) {
            showLoginError(err);
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    function isStandaloneMode() {
        return window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;
    }

    async function loginWithGoogle() {
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        error.style.display = 'none';
        info.textContent = '登入中...';
        info.style.display = 'block';
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            const provider = new firebase.auth.GoogleAuthProvider();
            if (isStandaloneMode()) {
                await firebase.auth().signInWithRedirect(provider);
            } else {
                await firebase.auth().signInWithPopup(provider);
            }
        } catch (err) {
            showLoginError(err);
        }
    }

    async function logout() {
        await firebase.auth().signOut();
        location.reload();
    }

    // ========== Firebase 初始化 ==========
    function initFirebase() {
        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        db = firebase.database();
        setStatus('connected', '已連線');
    }

    function setStatus(state, text) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        dot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'saving' ? ' saving' : '');
        txt.textContent = text;
    }

    // ========== Tab 切換 ==========
    function activateTab(panelId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panelId));
        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === panelId));
    }

    // ========== 啟動 ==========
    document.addEventListener('DOMContentLoaded', () => {
        initFirebase();

        // 處理 redirect 回傳（PWA / standalone 模式 Google 登入用）
        firebase.auth().getRedirectResult().catch((err) => {
            if (err.code !== 'auth/no-auth-event') showLoginError(err);
        });

        // 監聽登入狀態
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                const provider = user.providerData[0]?.providerId || 'unknown';
                const providerIcon = provider === 'google.com' ? 'G' : (provider === 'password' ? 'E' : '?');
                const shortName = (user.email || '').split('@')[0] || user.uid.substring(0, 6);
                const userInfo = document.getElementById('user-info');
                if (userInfo) {
                    userInfo.textContent = `${providerIcon}:${shortName}`;
                    userInfo.title = `${provider} | ${user.email || user.uid}`;
                }
                console.log('已登入:', user.email, '| UID:', user.uid);
                onUserReady();
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 登入按鈕
        document.getElementById('login-btn').addEventListener('click', loginWithEmailPassword);
        document.getElementById('google-login-btn').addEventListener('click', loginWithGoogle);
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('確定要登出嗎？')) logout();
        });
        const submitOnEnter = (e) => { if (e.key === 'Enter') loginWithEmailPassword(); };
        document.getElementById('email-input').addEventListener('keydown', submitOnEnter);
        document.getElementById('password-input').addEventListener('keydown', submitOnEnter);

        // Tab
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => activateTab(t.dataset.panel));
        });

        // 搜尋切換
        document.getElementById('search-toggle-btn').addEventListener('click', () => {
            const inp = document.getElementById('search-input');
            inp.classList.toggle('show');
            if (inp.classList.contains('show')) inp.focus();
            else inp.value = '';
        });
    });

    // ========== 登入後初始化 ==========
    function onUserReady() {
        loadPatients();
        bindPatientUI();
    }

    // ========== 病人主表狀態 ==========
    const state = {
        patients: {},          // {recordNumber: patientObj}
        editingRecordNumber: null,
        currentTags: [],       // tag editor working state
        confirmCallback: null  // confirm modal callback
    };

    // ========== 病人主表 Firebase ==========
    function loadPatients() {
        if (!db) return;
        setStatus('saving', '載入中...');
        db.ref('opd/patients').on('value', (snap) => {
            state.patients = snap.val() || {};
            renderPatientMaster();
            setStatus('connected', '已連線');
        }, (err) => {
            console.error('讀取病人資料失敗:', err);
            setStatus('', '連線失敗');
            alert('讀取病人資料失敗：' + err.message + '\n\n如顯示權限不足，請確認 Firebase Realtime Database rules 已設定 opd 路徑允許你的 UID。');
        });
    }

    async function savePatient(patient) {
        const ref = db.ref('opd/patients/' + patient.recordNumber);
        const now = Date.now();
        const data = {
            ...patient,
            updatedAt: now,
            createdAt: state.patients[patient.recordNumber]?.createdAt || now
        };
        setStatus('saving', '儲存中...');
        await ref.set(data);
        setStatus('connected', '已儲存');
    }

    async function deletePatient(recordNumber) {
        setStatus('saving', '刪除中...');
        await db.ref('opd/patients/' + recordNumber).remove();
        setStatus('connected', '已刪除');
    }

    // ========== 病人主表 UI ==========
    function renderPatientMaster() {
        const list = document.getElementById('patient-master-list');
        const countEl = document.getElementById('patient-count');
        const searchVal = document.getElementById('patient-search-input').value.trim().toLowerCase();

        const allPatients = Object.values(state.patients);
        const filtered = searchVal
            ? allPatients.filter(p =>
                (p.recordNumber || '').toLowerCase().includes(searchVal) ||
                (p.surname || '').toLowerCase().includes(searchVal))
            : allPatients;

        // 排序：依病歷號
        filtered.sort((a, b) => (a.recordNumber || '').localeCompare(b.recordNumber || ''));

        countEl.textContent = `共 ${allPatients.length} 位${searchVal ? `（顯示 ${filtered.length}）` : ''}`;

        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-hint">${allPatients.length === 0 ? '尚無病人資料，點「+ 新增病人」開始建立' : '查無相符結果'}</div>`;
            return;
        }

        list.innerHTML = filtered.map(p => {
            const tags = (p.tags || []).map(t => `<span class="pt-tag">${escapeHtml(t)}</span>`).join('');
            const inrPart = p.INR ? ` ・ INR: ${escapeHtml(p.INR)}${p.INRDate ? ` (${escapeHtml(p.INRDate)})` : ''}` : '';
            const egfrPart = p.eGFR ? ` ・ eGFR: ${escapeHtml(p.eGFR)}` : '';
            const extraPart = p.extra ? `<div class="pt-line2" style="margin-top: 4px;">${escapeHtml(p.extra)}</div>` : '';
            return `
                <div class="pt-card" data-record="${escapeAttr(p.recordNumber)}">
                    <div class="pt-info">
                        <div class="pt-line1">
                            ${escapeHtml(p.recordNumber)}${p.surname ? ` (${escapeHtml(p.surname)})` : ''}
                            <span class="pt-tags">${tags}</span>
                        </div>
                        <div class="pt-line2">${escapeHtml(p.ageSex || '')}${egfrPart}${inrPart}</div>
                        ${extraPart}
                    </div>
                    <div class="pt-actions">
                        <button data-action="edit" data-record="${escapeAttr(p.recordNumber)}">編輯</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) {
        return String(s ?? '').replace(/"/g, '&quot;');
    }

    // ========== 病人 Modal ==========
    function openPatientModal(recordNumber) {
        const isEdit = !!recordNumber;
        const p = isEdit ? (state.patients[recordNumber] || {}) : {};
        state.editingRecordNumber = isEdit ? recordNumber : null;

        document.getElementById('patient-modal-title').textContent = isEdit ? '編輯病人' : '新增病人';
        document.getElementById('pt-record-number').value = p.recordNumber || '';
        document.getElementById('pt-record-number').disabled = isEdit;  // 編輯時不能改病歷號（PK）
        document.getElementById('pt-surname').value = p.surname || '';
        document.getElementById('pt-age-sex').value = p.ageSex || '';
        document.getElementById('pt-egfr').value = p.eGFR || '';
        document.getElementById('pt-inr').value = p.INR || '';
        document.getElementById('pt-inr-date').value = p.INRDate || '';
        document.getElementById('pt-extra').value = p.extra || '';

        state.currentTags = [...(p.tags || [])];
        renderTagEditor();

        document.getElementById('pt-modal-delete').style.display = isEdit ? 'inline-block' : 'none';
        document.getElementById('patient-modal').classList.add('show');
        if (!isEdit) document.getElementById('pt-record-number').focus();
    }

    function closePatientModal() {
        document.getElementById('patient-modal').classList.remove('show');
        state.editingRecordNumber = null;
        state.currentTags = [];
        document.getElementById('pt-paste-input').value = '';
        document.getElementById('pt-paste-status').textContent = '';
    }

    // 從 docx 整列貼上解析
    // 預期欄位順序：序號 / 病歷號(姓) / 年齡性別 / eGFR / 額外 / Exam / Plan / NB / 鬆 / f/u
    function parsePastedRow(raw) {
        if (!raw || !raw.trim()) {
            return { ok: false, error: '請先貼上資料' };
        }
        // 取第一行（避免多行）
        const firstLine = raw.split(/\r?\n/).find(l => l.trim()) || raw;
        // 主要靠 Tab 分隔，少數情況可能是多空白
        let parts = firstLine.split('\t').map(s => s.trim());
        if (parts.length < 4) {
            // 嘗試以多空白分隔（複製方式不同）
            parts = firstLine.split(/\s{2,}/).map(s => s.trim());
        }
        if (parts.length < 4) {
            return { ok: false, error: `欄位偵測失敗（只解析到 ${parts.length} 欄），請確認從 Word 表格列複製` };
        }

        // 嘗試識別「病歷號(姓)」欄位位置：通常是 parts[1]，但若使用者複製不含序號可能在 parts[0]
        let recIdx = -1;
        const recPattern = /^([A-Za-z]?\d{5,8})\s*(?:\(([^)]+)\))?$/;  // 容許 0-1 字母 + 5-8 位數
        for (let i = 0; i < Math.min(parts.length, 3); i++) {
            if (recPattern.test(parts[i])) { recIdx = i; break; }
        }
        if (recIdx === -1) {
            return { ok: false, error: '找不到病歷號（前 3 欄都不像病歷號 (姓) 格式）' };
        }

        const recMatch = parts[recIdx].match(recPattern);
        const recordNumber = recMatch[1];
        const surname = (recMatch[2] || '').trim();

        // 後續欄位相對於 recIdx
        const ageSex = parts[recIdx + 1] || '';
        const eGFR = parts[recIdx + 2] || '';
        const extra = parts[recIdx + 3] || '';

        // 從 extra 嘗試抓 INR
        let INR = '', INRDate = '';
        const inrMatch = extra.match(/INR:\s*([\d.]+)\s*(?:\(([^)]+)\))?/i);
        if (inrMatch) {
            INR = inrMatch[1];
            INRDate = (inrMatch[2] || '').trim();
        }

        // tags：NB / 鬆 / f/u 三欄（最後三欄通常是這個順序）
        const tagLabels = ['NB', '鬆', 'f/u'];
        const tags = [];
        const tagStartIdx = parts.length - 3;
        if (tagStartIdx >= recIdx + 4) {
            for (let i = 0; i < 3; i++) {
                const cellVal = (parts[tagStartIdx + i] || '').trim();
                if (cellVal && cellVal !== '-' && cellVal !== '─') {
                    tags.push(tagLabels[i]);
                }
            }
        }

        // 也保留 Exam 與 Plan 文字（暫不寫入病人主表，作為提示）
        const examIdx = recIdx + 4;
        const planIdx = recIdx + 5;
        const exam = parts[examIdx] || '';
        const plan = parts[planIdx] || '';

        return {
            ok: true,
            recordNumber, surname, ageSex, eGFR, extra, INR, INRDate, tags,
            exam, plan,
            partsCount: parts.length
        };
    }

    function applyParsedToForm(parsed) {
        document.getElementById('pt-record-number').value = parsed.recordNumber;
        document.getElementById('pt-surname').value = parsed.surname;
        document.getElementById('pt-age-sex').value = parsed.ageSex;
        document.getElementById('pt-egfr').value = parsed.eGFR;
        document.getElementById('pt-inr').value = parsed.INR;
        document.getElementById('pt-inr-date').value = parsed.INRDate;
        document.getElementById('pt-extra').value = parsed.extra;
        // tags 合併（不覆蓋既有）
        parsed.tags.forEach(t => {
            if (!state.currentTags.includes(t)) state.currentTags.push(t);
        });
        renderTagEditor();
    }

    function renderTagEditor() {
        const editor = document.getElementById('pt-tag-editor');
        const input = document.getElementById('pt-tag-input');
        // 移除既有 pill，保留 input
        editor.querySelectorAll('.tag-pill').forEach(el => el.remove());
        state.currentTags.forEach((tag, idx) => {
            const pill = document.createElement('span');
            pill.className = 'tag-pill';
            pill.innerHTML = `${escapeHtml(tag)} <span class="remove" data-idx="${idx}">✕</span>`;
            editor.insertBefore(pill, input);
        });
    }

    async function handlePatientSave() {
        const recordNumber = document.getElementById('pt-record-number').value.trim();
        if (!recordNumber) {
            alert('請輸入病歷號');
            return;
        }

        const patient = {
            recordNumber,
            surname: document.getElementById('pt-surname').value.trim(),
            ageSex: document.getElementById('pt-age-sex').value.trim(),
            eGFR: document.getElementById('pt-egfr').value.trim(),
            INR: document.getElementById('pt-inr').value.trim(),
            INRDate: document.getElementById('pt-inr-date').value.trim(),
            extra: document.getElementById('pt-extra').value.trim(),
            tags: [...state.currentTags]
        };

        // 新增時若病歷號已存在 → 提示
        if (!state.editingRecordNumber && state.patients[recordNumber]) {
            if (!confirm(`病歷號 ${recordNumber} 已存在，是否覆蓋？`)) return;
        }

        try {
            await savePatient(patient);
            closePatientModal();
        } catch (err) {
            alert('儲存失敗：' + err.message);
        }
    }

    function handlePatientDelete() {
        if (!state.editingRecordNumber) return;
        const rec = state.editingRecordNumber;
        const surname = state.patients[rec]?.surname || '';
        showConfirm(`刪除病人 ${rec}${surname ? ` (${surname})` : ''}？`, '此操作無法復原。', async () => {
            try {
                await deletePatient(rec);
                closePatientModal();
            } catch (err) {
                alert('刪除失敗：' + err.message);
            }
        });
    }

    // ========== 通用確認對話框 ==========
    function showConfirm(title, message, onConfirm) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        state.confirmCallback = onConfirm;
        document.getElementById('confirm-modal').classList.add('show');
    }

    // ========== 綁定 UI ==========
    function bindPatientUI() {
        if (state.uiBound) return;
        state.uiBound = true;

        // 新增按鈕
        document.getElementById('add-patient-master-btn').addEventListener('click', () => openPatientModal());

        // docx 整列貼上自動解析
        document.getElementById('pt-paste-parse-btn').addEventListener('click', () => {
            const raw = document.getElementById('pt-paste-input').value;
            const status = document.getElementById('pt-paste-status');
            const result = parsePastedRow(raw);
            if (!result.ok) {
                status.textContent = '❌ ' + result.error;
                status.style.color = 'var(--color-danger)';
                return;
            }
            applyParsedToForm(result);
            const planNote = result.plan ? `（Exam/Plan 已偵測共 ${result.exam.length + result.plan.length} 字，但暫不寫入病人主表，待 visit 模組）` : '';
            status.textContent = `✅ 已解析 ${result.partsCount} 欄並填入下方${result.tags.length ? `；標籤：${result.tags.join(', ')}` : ''}。${planNote}`;
            status.style.color = 'var(--color-confirmed)';
        });

        // 貼上時自動觸發解析（按下 paste 後若內容包含 tab 直接 parse）
        document.getElementById('pt-paste-input').addEventListener('paste', (e) => {
            setTimeout(() => {
                const txt = document.getElementById('pt-paste-input').value;
                if (txt.includes('\t')) {
                    document.getElementById('pt-paste-parse-btn').click();
                }
            }, 50);
        });

        // 搜尋
        document.getElementById('patient-search-input').addEventListener('input', () => renderPatientMaster());

        // 病人卡片點擊（編輯）
        document.getElementById('patient-master-list').addEventListener('click', (e) => {
            const editBtn = e.target.closest('button[data-action="edit"]');
            if (editBtn) {
                openPatientModal(editBtn.dataset.record);
            }
        });

        // Modal 按鈕
        document.getElementById('pt-modal-cancel').addEventListener('click', closePatientModal);
        document.getElementById('pt-modal-save').addEventListener('click', handlePatientSave);
        document.getElementById('pt-modal-delete').addEventListener('click', handlePatientDelete);
        document.getElementById('patient-modal').addEventListener('click', (e) => {
            if (e.target.id === 'patient-modal') closePatientModal();
        });

        // Tag editor
        const tagInput = document.getElementById('pt-tag-input');
        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInput.value.trim();
                if (val && !state.currentTags.includes(val)) {
                    state.currentTags.push(val);
                    renderTagEditor();
                }
                tagInput.value = '';
            } else if (e.key === 'Backspace' && !tagInput.value && state.currentTags.length > 0) {
                state.currentTags.pop();
                renderTagEditor();
            }
        });
        document.getElementById('pt-tag-editor').addEventListener('click', (e) => {
            const removeBtn = e.target.closest('.remove');
            if (removeBtn) {
                const idx = parseInt(removeBtn.dataset.idx);
                state.currentTags.splice(idx, 1);
                renderTagEditor();
            }
        });

        // Confirm modal
        document.getElementById('confirm-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.remove('show');
            state.confirmCallback = null;
        });
        document.getElementById('confirm-ok').addEventListener('click', () => {
            const cb = state.confirmCallback;
            document.getElementById('confirm-modal').classList.remove('show');
            state.confirmCallback = null;
            if (cb) cb();
        });
        document.getElementById('confirm-modal').addEventListener('click', (e) => {
            if (e.target.id === 'confirm-modal') {
                document.getElementById('confirm-modal').classList.remove('show');
                state.confirmCallback = null;
            }
        });

        // ESC 關閉 modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('patient-modal').classList.contains('show')) closePatientModal();
                if (document.getElementById('confirm-modal').classList.contains('show')) {
                    document.getElementById('confirm-modal').classList.remove('show');
                    state.confirmCallback = null;
                }
            }
        });
    }
</script>

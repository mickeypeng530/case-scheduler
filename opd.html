<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD 系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #475569;

            --color-confirmed: #22c55e;
            --color-draft: #94a3b8;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
            --color-info: #3b82f6;
            --color-tag-default: #6366f1;
            --color-dc: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1800px; margin: 0 auto; padding: 16px; }
        @media (min-width: 1801px) {
            .container { max-width: 96vw; }
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { font-size: 1.25rem; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .nav-link {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-link:hover { background: var(--bg-secondary); }
        .header-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        #user-info { font-size: 0.75rem; color: var(--text-muted); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 8px;
        }
        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .tab.active { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }

        /* Tab panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Login screen */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
        }
        #login-screen .card {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 280px;
        }
        #login-screen h2 { margin-bottom: 6px; }
        #login-screen .hint { margin-bottom: 18px; color: var(--text-muted); font-size: 0.8rem; }
        #login-screen input {
            padding: 10px 15px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.95rem;
            width: 220px;
            font-family: inherit;
        }
        #login-screen input + input { margin-top: 10px; }
        #login-screen button#login-btn {
            margin-top: 14px;
            padding: 10px 25px;
            background: var(--color-warning);
            border: none;
            color: #1a1a2e;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        #login-screen .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        #login-screen .divider .line { flex: 1; height: 1px; background: var(--border); }
        #login-screen #google-login-btn {
            padding: 10px 18px;
            background: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        #login-error { color: var(--color-danger); margin-top: 15px; display: none; }
        #login-info { color: var(--text-muted); margin-top: 15px; display: none; font-size: 0.85rem; }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .toolbar select, .toolbar button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .toolbar button.primary {
            background: var(--color-info);
            border-color: var(--color-info);
            color: white;
        }
        .toolbar button.primary:hover { opacity: 0.9; }
        .toolbar .search-toggle { background: transparent; border: 1px solid var(--border); }
        .toolbar #search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            display: none;
            width: 200px;
        }
        .toolbar #search-input.show { display: inline-block; }

        /* Tag chips */
        .tag-filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 12px;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
        }
        .tag-chip.active {
            background: var(--color-tag-default);
            border-color: var(--color-tag-default);
            color: white;
        }

        /* ====== Visit table ====== */
        .visit-table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .visit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.86rem;
            table-layout: fixed;
        }
        .visit-table thead th {
            position: sticky;
            top: 0;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 600;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            z-index: 10;
        }
        .visit-table tbody td {
            padding: 6px 8px;
            vertical-align: top;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.3;
        }
        .visit-table tbody td.col-labs,
        .visit-table tbody td.col-extra,
        .visit-table tbody td.col-exam {
            white-space: pre-wrap;
        }
        .visit-table tbody tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .visit-table tbody tr.no-show td {
            opacity: 0.55;
            background: rgba(0,0,0,0.15);
        }

        /* 欄寬 */
        .col-num    { width: 36px; text-align: center; }
        .col-record { width: 110px; }
        .visit-table tbody td.col-record { white-space: nowrap; overflow: hidden; }
        .visit-table tbody td.col-record .record-line { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; font-weight: 600; }
        .visit-table tbody td.col-record .age-line { font-size: 0.78rem; color: var(--text-primary); margin-top: 1px; }
        .visit-table tbody td.col-record .ref-line { font-size: 0.74rem; color: var(--text-primary); font-style: italic; margin-top: 1px; }
        .col-labs   { width: 100px; font-size: 0.76rem; }
        .col-extra  { width: 140px; font-size: 0.8rem; }
        .col-exam   { width: 160px; font-size: 0.8rem; }
        .visit-table tbody td.col-extra,
        .visit-table tbody td.col-exam,
        .visit-table tbody td.col-labs {
            max-height: 130px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .visit-table tbody td.col-extra::-webkit-scrollbar,
        .visit-table tbody td.col-exam::-webkit-scrollbar,
        .visit-table tbody td.col-labs::-webkit-scrollbar { width: 4px; }
        .visit-table tbody td.col-extra::-webkit-scrollbar-thumb,
        .visit-table tbody td.col-exam::-webkit-scrollbar-thumb,
        .visit-table tbody td.col-labs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .col-plan   { /* 彈性 */ }
        .col-tags   { width: 70px; }
        .col-actions { width: 90px; }

        /* DC divider row */
        tr.dc-divider td {
            text-align: center;
            background: rgba(0,0,0,0.3);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px;
            letter-spacing: 4px;
        }

        /* Plan summary 與 plan body */
        .plan-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 6px;
            margin-bottom: 2px;
            padding: 0;
            border: none;
            font-size: 0.72rem;
            line-height: 1.3;
            color: var(--text-secondary);
        }
        .plan-summary .pill {
            display: inline-flex;
            padding: 1px 6px;
            background: rgba(99,102,241,0.18);
            border: 1px solid rgba(99,102,241,0.3);
            color: #c7d2fe;
            border-radius: 4px;
            font-size: 0.72rem;
        }
        .plan-summary .pill.rtc {
            background: rgba(34,197,94,0.18);
            border-color: rgba(34,197,94,0.4);
            color: #bbf7d0;
        }
        .plan-summary .pill.warn {
            background: rgba(251,191,36,0.18);
            border-color: rgba(251,191,36,0.4);
            color: #fde68a;
        }
        .plan-body {
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            line-height: 1.35;
        }
        .plan-body .more-toggle {
            display: inline-block;
            margin-top: 4px;
            color: var(--color-info);
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
        }
        .plan-line.done { color: #86efac; }    /* * 開頭已完成 */
        .plan-line.plan { color: var(--text-secondary); }   /* - 開頭計畫中 */
        .plan-line.rtc-line { color: #93c5fd; font-weight: 500; }

        /* Tag chips in row */
        .visit-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .visit-tags .tag-chip {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            color: white;
            white-space: nowrap;
        }
        /* 8 種主 tag 配色 */
        .visit-tags .tag-chip[data-tag="鬆"] { background: #a855f7; }
        .visit-tags .tag-chip[data-tag="CT NB"] { background: #f59e0b; color: #1a1a2e; }
        .visit-tags .tag-chip[data-tag="SONO"] { background: #22c55e; }
        .visit-tags .tag-chip[data-tag="TAME"] { background: #3b82f6; }
        .visit-tags .tag-chip[data-tag="MRI"] { background: #c4b5fd; color: #1a1a2e; }
        .visit-tags .tag-chip[data-tag="PRP"] { background: #ec4899; }
        .visit-tags .tag-chip[data-tag="follow up"] { background: #64748b; }
        .visit-tags .tag-chip[data-tag="med"] { background: #f97316; }
        .visit-tags .tag-chip[data-tag*=""] { /* fallback */ }

        /* Status badges */
        .status-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .status-badge {
            display: inline-flex;
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .status-badge.draft { background: rgba(148,163,184,0.2); color: #cbd5e1; }
        .status-badge.confirmed { background: rgba(34,197,94,0.2); color: #86efac; }
        .status-badge.first-visit { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .status-badge.self-rtc { background: rgba(245,158,11,0.2); color: #fde68a; }
        .status-badge.warning { background: rgba(251,191,36,0.3); color: #fde68a; }

        /* Row actions */
        .row-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .row-actions button {
            padding: 3px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.72rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .row-actions button:hover { background: var(--bg-secondary); }
        .row-actions button.confirmed { background: rgba(34,197,94,0.3); border-color: rgba(34,197,94,0.5); }

        /* Header notes 區塊 */
        .header-notes {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }
        .header-notes .hn-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .header-notes .hn-content {
            white-space: pre-wrap;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            line-height: 1.55;
        }
        .header-notes .hn-edit {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.78rem;
            cursor: pointer;
        }
        .header-notes textarea {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            padding: 6px;
            font-family: 'Noto Sans TC', monospace;
            font-size: 0.82rem;
            min-height: 80px;
        }

        /* 在窄螢幕降低欄寬 */
        @media (max-width: 1280px) {
            .col-extra { width: 160px; }
            .col-exam { width: 150px; }
            .col-tags { width: 100px; }
            .visit-table { font-size: 0.8rem; }
        }

        /* Patient card (主表用) */
        .patient-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .empty-hint {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        /* DC divider */
        .dc-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
            color: var(--color-dc);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .dc-divider .line { flex: 1; height: 1px; background: var(--color-dc); }

        /* Status indicator (top-right of header) */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-draft);
        }
        .status-dot.connected { background: var(--color-confirmed); }
        .status-dot.saving {
            background: var(--color-warning);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Mobile */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 1.1rem; }
            .nav-link span.label { display: none; }
            #user-info { display: none; }
            #logout-btn .btn-text { display: none; }
            .toolbar { gap: 6px; }
        }

        /* 病人卡片（主表用） */
        .pt-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .pt-card .pt-info { flex: 1; min-width: 0; }
        .pt-card .pt-line1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .pt-card .pt-line2 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .pt-card .pt-tags {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
        }
        .pt-card .pt-tag {
            display: inline-flex;
            padding: 2px 8px;
            background: var(--color-tag-default);
            color: white;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .pt-card .pt-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .pt-card .pt-actions button {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .pt-card .pt-actions button.danger {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }
        .pt-card .pt-actions button:hover { background: var(--bg-secondary); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .modal .field {
            margin-bottom: 12px;
        }
        .modal .field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal .field input, .modal .field textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .modal .field textarea { resize: vertical; min-height: 60px; }
        .modal .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .modal .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .modal .actions button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .modal .actions button.primary {
            background: var(--color-info);
            border-color: var(--color-info);
            color: white;
        }
        .modal .actions button.danger {
            background: var(--color-danger);
            border-color: var(--color-danger);
            color: white;
        }

        /* Tag editor in modal */
        .tag-editor {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            min-height: 38px;
        }
        .tag-editor .tag-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            background: var(--color-tag-default);
            color: white;
            border-radius: 10px;
            font-size: 0.78rem;
            gap: 4px;
        }
        .tag-editor .tag-pill .remove {
            cursor: pointer;
            opacity: 0.7;
            font-size: 0.85rem;
        }
        .tag-editor .tag-pill .remove:hover { opacity: 1; }
        .tag-editor input {
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            flex: 1;
            min-width: 60px;
            padding: 2px 4px;
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
    <div class="card">
        <h2>🩺 OPD 系統</h2>
        <p class="hint">提示：intra</p>
        <input type="email" id="email-input" placeholder="Email" autocomplete="username">

<script>
    // ========== Firebase 設定（與 index.html 同一個專案） ==========
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyATCaOlYxkYTle1hPzYAcuXNlQHaAuO3-8",
        authDomain: "case-scheduler-f752b.firebaseapp.com",
        projectId: "case-scheduler-f752b",
        storageBucket: "case-scheduler-f752b.firebasestorage.app",
        messagingSenderId: "703006186929",
        appId: "1:703006186929:web:57ac5b059678005455f190",
        databaseURL: "https://case-scheduler-f752b-default-rtdb.firebaseio.com"
    };

    let currentUser = null;
    let db = null;

    // ========== 登入 / 登出 ==========
    function showLoginError(err) {
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        console.error('登入失敗:', err);
        let msg = err.message || err.code;
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') msg = '帳號或密碼錯誤';
        else if (err.code === 'auth/too-many-requests') msg = '嘗試次數過多，請稍後再試';
        else if (err.code === 'auth/network-request-failed') msg = '網路連線錯誤';
        else if (err.code === 'auth/popup-closed-by-user') msg = '已取消登入';
        error.textContent = msg;
        error.style.display = 'block';
        info.style.display = 'none';
    }

    async function loginWithEmailPassword() {
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            error.textContent = '請輸入 Email 與密碼';
            error.style.display = 'block';
            return;
        }
        error.style.display = 'none';
        info.textContent = '登入中...';
        info.style.display = 'block';
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.NONE);
            await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (err) {
            showLoginError(err);
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    function isStandaloneMode() {
        return window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;
    }

    async function loginWithGoogle() {
        const error = document.getElementById('login-error');
        const info = document.getElementById('login-info');
        error.style.display = 'none';
        info.textContent = '登入中...';
        info.style.display = 'block';
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            const provider = new firebase.auth.GoogleAuthProvider();
            if (isStandaloneMode()) {
                await firebase.auth().signInWithRedirect(provider);
            } else {
                await firebase.auth().signInWithPopup(provider);
            }
        } catch (err) {
            showLoginError(err);
        }
    }

    async function logout() {
        await firebase.auth().signOut();
        location.reload();
    }

    // ========== Firebase 初始化 ==========
    function initFirebase() {
        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        db = firebase.database();
        setStatus('connected', '已連線');
    }

    function setStatus(state, text) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        dot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'saving' ? ' saving' : '');
        txt.textContent = text;
    }

    // ========== Tab 切換 ==========
    function activateTab(panelId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panelId));
        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === panelId));
    }

    // ========== 啟動 ==========
    // ========== 字體大小 ==========
    const FONT_SIZES = [85, 100, 115, 130, 145];
    function applyFontSize(pct) {
        document.documentElement.style.fontSize = (16 * pct / 100) + 'px';
        const lbl = document.getElementById('font-size-label');
        if (lbl) lbl.textContent = pct + '%';
        localStorage.setItem('opd:fontSize', pct);
    }
    function adjustFontSize(delta) {
        const cur = parseInt(localStorage.getItem('opd:fontSize') || '100');
        const idx = FONT_SIZES.indexOf(cur);
        let newIdx = idx === -1 ? FONT_SIZES.indexOf(100) : idx + delta;
        newIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, newIdx));
        applyFontSize(FONT_SIZES[newIdx]);
    }

    document.addEventListener('DOMContentLoaded', () => {
        // 先套用儲存的字體大小（在 DOM 都還沒長出來前先打底）
        const savedFs = parseInt(localStorage.getItem('opd:fontSize') || '100');
        applyFontSize(savedFs);

        initFirebase();

        // 處理 redirect 回傳（PWA / standalone 模式 Google 登入用）
        firebase.auth().getRedirectResult().catch((err) => {
            if (err.code !== 'auth/no-auth-event') showLoginError(err);
        });

        // 監聽登入狀態
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                const provider = user.providerData[0]?.providerId || 'unknown';
                const providerIcon = provider === 'google.com' ? 'G' : (provider === 'password' ? 'E' : '?');
                const shortName = (user.email || '').split('@')[0] || user.uid.substring(0, 6);
                const userInfo = document.getElementById('user-info');
                if (userInfo) {
                    userInfo.textContent = `${providerIcon}:${shortName}`;
                    userInfo.title = `${provider} | ${user.email || user.uid}`;
                }
                console.log('已登入:', user.email, '| UID:', user.uid);
                onUserReady();
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 登入按鈕
        document.getElementById('login-btn').addEventListener('click', loginWithEmailPassword);
        document.getElementById('google-login-btn').addEventListener('click', loginWithGoogle);
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('確定要登出嗎？')) logout();
        });
        document.getElementById('font-up-btn')?.addEventListener('click', () => adjustFontSize(1));
        document.getElementById('font-down-btn')?.addEventListener('click', () => adjustFontSize(-1));
        const submitOnEnter = (e) => { if (e.key === 'Enter') loginWithEmailPassword(); };
        document.getElementById('email-input').addEventListener('keydown', submitOnEnter);
        document.getElementById('password-input').addEventListener('keydown', submitOnEnter);

        // Tab
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => activateTab(t.dataset.panel));
        });

        // 搜尋切換
        document.getElementById('search-toggle-btn').addEventListener('click', () => {
            const inp = document.getElementById('search-input');
            inp.classList.toggle('show');
            if (inp.classList.contains('show')) inp.focus();
            else inp.value = '';
        });
    });

    // ========== 登入後初始化 ==========
    function onUserReady() {
        loadPatients();
        loadAdHocClinicDates();
        bindPatientUI();
        bindClinicDayUI();
        initClinicDateSelector();
    }

    // ========== 門診日邏輯 ==========
    // 規則：每月第 2 與第 4 個週三
    function getNthWednesdayOfMonth(year, month, n) {
        // year, month (1-12), n (1-5)
        const d = new Date(year, month - 1, 1);
        let count = 0;
        while (d.getMonth() === month - 1) {
            if (d.getDay() === 3) {
                count++;
                if (count === n) return new Date(d);
            }
            d.setDate(d.getDate() + 1);
        }
        return null;
    }

    function generateRegularClinicDates(monthsBack = 6, monthsForward = 6) {
        const today = new Date();
        const dates = [];
        for (let offset = -monthsBack; offset <= monthsForward; offset++) {
            const d = new Date(today.getFullYear(), today.getMonth() + offset, 1);
            const w2 = getNthWednesdayOfMonth(d.getFullYear(), d.getMonth() + 1, 2);
            const w4 = getNthWednesdayOfMonth(d.getFullYear(), d.getMonth() + 1, 4);
            if (w2) dates.push({ date: formatDate(w2), type: 'regular' });
            if (w4) dates.push({ date: formatDate(w4), type: 'regular' });
        }
        return dates;
    }

    function formatDate(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    // 從 ageSex (e.g., "55/F") 解析 birthYear & sex
    function parseAgeSex(str, refDate) {
        if (!str) return null;
        const m = str.match(/(\d+)\s*\/\s*([MFmf])/);
        if (!m) return null;
        const age = parseInt(m[1]);
        const sex = m[2].toUpperCase();
        const refYear = refDate ? new Date(refDate).getFullYear() : new Date().getFullYear();
        return { birthYear: refYear - age, sex };
    }
    // 顯示用：根據 birthYear 與當前年計算 age 字串
    function displayAgeSex(patient, refDate) {
        if (patient?.birthYear) {
            const refYear = refDate ? new Date(refDate).getFullYear() : new Date().getFullYear();
            return `${refYear - patient.birthYear}/${patient.sex || ''}`;
        }
        return patient?.ageSex || '';
    }

    function formatDateLabel(dateStr) {
        // 2026-04-22 → "2026/04/22 (三)"
        const [y, m, d] = dateStr.split('-').map(Number);
        const dt = new Date(y, m - 1, d);
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')} (${days[dt.getDay()]})`;
    }

    function findNearestClinicDate(allDates) {
        // 找今日最接近的門診日（優先未來，其次最近過去）
        const today = formatDate(new Date());
        const future = allDates.filter(d => d.date >= today).sort((a, b) => a.date.localeCompare(b.date));
        if (future.length > 0) return future[0].date;
        const past = allDates.filter(d => d.date < today).sort((a, b) => b.date.localeCompare(a.date));
        return past[0]?.date || null;
    }

    function renderClinicDateSelector() {
        const select = document.getElementById('clinic-date-select');
        if (!select) return;

        const regular = generateRegularClinicDates();
        const adHoc = Object.values(state.adHocClinicDates || {}).map(x => ({ date: x.date, type: 'ad-hoc' }));

        // 合併、去重（adHoc 優先）
        const map = new Map();
        regular.forEach(d => map.set(d.date, d));
        adHoc.forEach(d => map.set(d.date, d));
        const allDates = [...map.values()].sort((a, b) => b.date.localeCompare(a.date));  // 新到舊

        // 預設選最近一個門診日；優先使用 localStorage 記住的日期，再來才是「最近一次」
        if (!state.currentClinicDate) {
            const saved = localStorage.getItem('opd:currentClinicDate');
            const validSaved = saved && allDates.find(d => d.date === saved);
            state.currentClinicDate = validSaved ? saved : findNearestClinicDate(allDates);
        }
        const currentValue = state.currentClinicDate;

        select.innerHTML = allDates.map(d => {
            const label = (d.type === 'ad-hoc' ? '★ ' : '') + formatDateLabel(d.date) + (d.type === 'ad-hoc' ? '（加診）' : '');
            return `<option value="${d.date}" ${d.date === currentValue ? 'selected' : ''} style="${d.type === 'ad-hoc' ? 'color:#fca5a5;' : ''}">${label}</option>`;
        }).join('');

        const isAdHoc = allDates.find(d => d.date === currentValue)?.type === 'ad-hoc';
        select.style.color = isAdHoc ? '#fca5a5' : '';
        select.style.fontWeight = isAdHoc ? '600' : '';

        // 只在「首次設定」時 trigger onClinicDateChanged，避免覆寫使用者選擇
        if (currentValue && !state.clinicDateInitialized) {
            state.clinicDateInitialized = true;
            onClinicDateChanged(currentValue);
        }
        updateClinicDateMeta();
    }

    // ========== Plan parsing ==========
    const PROC_KEYWORDS = [
        { name: 'CT NB', re: /\bCT\s*NB\b/gi },
        { name: 'pRF', re: /\bp?RF\b/g },
        { name: 'SONO', re: /\bSONO\s*INJ\b/gi },
        { name: 'TAME', re: /\b[sc]?TAME\b/gi },
        { name: 'MRI', re: /\bMRI\b/g },
        { name: 'PRP', re: /\bPRP\b/g },
        { name: 'HA', re: /\bHA\b/g },
        { name: 'Prolia', re: /\bProlia\b/gi },
        { name: 'Aclasta', re: /\bAclasta\b/gi },
        { name: 'Evenity', re: /\bEvenity\b/gi },
        { name: 'Forteo', re: /\bForteo\b/gi },
        { name: 'Fosamax', re: /\bFosamax\b/gi }
    ];
    const RTC_PATTERN = /(?:(\d{2})\/)?(\d{1,2})\/(\d{1,2})\s*RTC(\??)/gi;

    function summarizePlan(plan, currentDate) {
        if (!plan) return { items: [], rtcDates: [], hasMultiRTC: false, isSelfRTC: false };
        const counts = {};
        PROC_KEYWORDS.forEach(k => {
            const matches = plan.match(k.re);
            if (matches && matches.length) counts[k.name] = matches.length;
        });

        const isSelfRTC = /\bself\s*RTC\b/i.test(plan);

        // 抽 RTC 日期
        const rtcMatches = [...plan.matchAll(RTC_PATTERN)];
        const today = currentDate || formatDate(new Date());
        const futureDates = [];
        rtcMatches.forEach(m => {
            const yy = m[1] ? `20${m[1]}` : new Date(today).getFullYear().toString();
            const mm = m[2].padStart(2, '0');
            const dd = m[3].padStart(2, '0');
            const dateStr = `${yy}-${mm}-${dd}`;
            if (dateStr > today) futureDates.push(dateStr);
        });
        const uniqueFuture = [...new Set(futureDates)].sort();

        const items = Object.entries(counts).map(([k, n]) => ({ name: k, count: n }));
        return {
            items,
            rtcDates: uniqueFuture,
            hasMultiRTC: uniqueFuture.length > 1,
            isSelfRTC,
            nextRTC: uniqueFuture[0] || null
        };
    }

    function highlightPlanLine(line) {
        const trimmed = line.trim();
        if (!trimmed) return '';  // 空行直接 skip
        let cls = '';
        if (trimmed.startsWith('*')) cls = 'plan-line done';
        else if (trimmed.startsWith('-')) cls = 'plan-line plan';
        else if (/RTC/i.test(trimmed)) cls = 'plan-line rtc-line';
        return `<span class="${cls}">${escapeHtml(trimmed)}</span>`;
    }

    // ========== Visit table 渲染 ==========
    function renderVisitList() {
        const wrap = document.getElementById('visit-list');
        const date = state.currentClinicDate;
        if (!date) {
            wrap.innerHTML = `<div class="empty-hint">請選擇門診日期</div>`;
            return;
        }
        const visits = Object.values((state.visitsByDate || {})[date] || {});

        // 搜尋過濾
        const searchVal = (document.getElementById('visit-search-input').value || '').trim().toLowerCase();
        const filtered = searchVal
            ? visits.filter(v => {
                const p = state.patients[v.recordNumber] || {};
                return v.recordNumber?.toLowerCase().includes(searchVal)
                    || p.surname?.toLowerCase().includes(searchVal);
              })
            : visits;

        if (filtered.length === 0) {
            wrap.innerHTML = `<div class="empty-hint">${formatDateLabel(date)}<br><br>${visits.length === 0 ? '尚無病人，點「+ 新增病人」新增' : '查無相符結果'}</div>`;
            return;
        }

        // 排序：noShow=false 在前，按 orderInClinic ASC；DC 後也按 orderInClinic
        const came = filtered.filter(v => !v.noShow).sort((a, b) => (a.orderInClinic || 999) - (b.orderInClinic || 999));
        const noShow = filtered.filter(v => v.noShow).sort((a, b) => (a.orderInClinic || 999) - (b.orderInClinic || 999));

        const renderRow = (v) => {
            const p = state.patients[v.recordNumber] || {};
            const summary = summarizePlan(v.plan, date);
            const planLines = (v.plan || '').split(/\r?\n/);
            // 去除前後空行避免顯示空白
            while (planLines.length && !planLines[0].trim()) planLines.shift();
            while (planLines.length && !planLines[planLines.length - 1].trim()) planLines.pop();
            const showLines = state.expandedPlans?.has(v.recordNumber) ? planLines : planLines.slice(-7);
            const hasMore = planLines.length > showLines.length;

            const summaryPills = [
                ...summary.items.map(it => `<span class="pill">${escapeHtml(it.name)}×${it.count}</span>`),
                summary.nextRTC ? `<span class="pill rtc">下次 RTC: ${summary.nextRTC.slice(5)}</span>` : '',
                summary.hasMultiRTC ? `<span class="pill warn">多 RTC ${summary.rtcDates.length}</span>` : '',
                summary.isSelfRTC ? `<span class="pill warn">自我約診</span>` : ''
            ].filter(Boolean).join('');

            const tagChips = (v.tags || []).map(t => `<span class="tag-chip" data-tag="${escapeAttr(t)}">${escapeHtml(t)}</span>`).join('');

            const statusBadges = [
                v.status === 'confirmed' ? '<span class="status-badge confirmed">已確認</span>' : '<span class="status-badge draft">草稿</span>',
                p.firstVisitDate === v.date ? '<span class="status-badge first-visit">初診</span>' : '',
                summary.isSelfRTC ? '<span class="status-badge self-rtc">自約</span>' : '',
                summary.hasMultiRTC ? '<span class="status-badge warning">多 RTC</span>' : ''
            ].filter(Boolean).join('');

            const ageDisplay = displayAgeSex(p, date) || p.ageSex || '';
            // labs 顯示：優先 patient.labs；若無，fallback 合成 (eGFR + INR)
            let labsDisplay = p.labs || '';
            if (!labsDisplay) {
                const synth = [];
                if (p.eGFR && isValidEGFR(p.eGFR)) synth.push(`eGFR ${p.eGFR}`);
                if (p.INR) synth.push(`INR ${p.INR}${p.INRDate ? ` (${p.INRDate})` : ''}`);
                labsDisplay = synth.join('\n');
            }
            // 如果 patient 殘留 referrer-like 內容在 eGFR（legacy bug），自動把它當 referrer 顯示
            const referrerDisplay = p.referrer || (p.eGFR && !isValidEGFR(p.eGFR) ? p.eGFR : '');
            return `
              <tr class="${v.noShow ? 'no-show' : ''}" data-record="${escapeAttr(v.recordNumber)}">
                <td class="col-num">${escapeHtml(String(v.orderInClinic || ''))}</td>
                <td class="col-record">
                    <span class="record-line">${escapeHtml(v.recordNumber)}${p.surname ? ` (${escapeHtml(String(p.surname).replace(/\s+/g,''))})` : ''}</span>
                    ${ageDisplay ? `<div class="age-line">${escapeHtml(ageDisplay)}</div>` : ''}
                    ${referrerDisplay ? `<div class="ref-line">${escapeHtml(referrerDisplay)}</div>` : ''}
                    <div class="status-badges">${statusBadges}</div>
                </td>
                <td class="col-labs">${escapeHtml(labsDisplay)}</td>
                <td class="col-extra">${escapeHtml(p.extra || '')}</td>
                <td class="col-exam">${escapeHtml(v.examEducation || '')}</td>
                <td class="col-plan">
                    <div class="plan-summary">${summaryPills || '<span style="color:var(--text-muted)">（plan 尚未填）</span>'}</div>
                    <div class="plan-body">${showLines.map(highlightPlanLine).filter(Boolean).join('<br>')}${hasMore ? `<br><span class="more-toggle" data-record="${escapeAttr(v.recordNumber)}">▼ 顯示全部 ${planLines.length} 行</span>` : (state.expandedPlans?.has(v.recordNumber) && planLines.length > 7 ? `<br><span class="more-toggle" data-record="${escapeAttr(v.recordNumber)}">▲ 收合</span>` : '')}</div>
                </td>
                <td class="col-tags"><div class="visit-tags">${tagChips}</div></td>
                <td class="col-actions">
                    <div class="row-actions">
                        <button data-action="edit" data-record="${escapeAttr(v.recordNumber)}">✏️ 編輯</button>
                        <button data-action="confirm" data-record="${escapeAttr(v.recordNumber)}" class="${v.status === 'confirmed' ? 'confirmed' : ''}">${v.status === 'confirmed' ? '✓ 已確認' : '✓ 確認'}</button>
                        <button data-action="copy-plan" data-record="${escapeAttr(v.recordNumber)}">📋 複製</button>
                        <button data-action="toggle-dc" data-record="${escapeAttr(v.recordNumber)}">${v.noShow ? '↑ 移回' : '↓ 移 DC'}</button>
                    </div>
                </td>
              </tr>
            `;
        };

        const dcDivider = noShow.length > 0 ? `
          <tr class="dc-divider"><td colspan="8">─── D C ───  共 ${noShow.length} 位未到</td></tr>
        ` : '';

        wrap.innerHTML = `
          <div class="visit-table-wrapper">
            <table class="visit-table">
              <colgroup>
                <col class="col-num"><col class="col-record"><col class="col-labs">
                <col class="col-extra"><col class="col-exam"><col class="col-plan">
                <col class="col-tags"><col class="col-actions">
              </colgroup>
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-record">病人</th>
                  <th class="col-labs">抽血</th>
                  <th class="col-extra">背景</th>
                  <th class="col-exam">Exam</th>
                  <th class="col-plan">Plan</th>
                  <th class="col-tags">標籤</th>
                  <th class="col-actions">操作</th>
                </tr>
              </thead>
              <tbody>
                ${came.map(renderRow).join('')}
                ${dcDivider}
                ${noShow.map(renderRow).join('')}
              </tbody>
            </table>
          </div>
        `;
    }

    function renderHeaderNotes() {

    // ========== Visit CRUD ==========
    async function saveVisit(visit, patientPartial) {
        const now = Date.now();
        const updates = {};

        // patient 主表 upsert（若有提供 patientPartial）
        if (patientPartial && patientPartial.recordNumber) {
            const existing = state.patients[patientPartial.recordNumber] || {};
            const merged = {
                ...existing,
                ...patientPartial,
                createdAt: existing.createdAt || now,
                updatedAt: now,
                firstVisitDate: existing.firstVisitDate || visit.date
            };
            // 只寫非空值（避免清掉既有）
            Object.keys(patientPartial).forEach(k => {
                if (patientPartial[k] === '' && existing[k]) merged[k] = existing[k];
            });
            updates['opd/patients/' + patientPartial.recordNumber] = merged;
        }

        // visit
        const visitData = {
            ...visit,
            updatedAt: now,
            createdAt: ((state.visitsByDate?.[visit.date] || {})[visit.recordNumber]?.createdAt) || now
        };
        updates[`opd/visits/${visit.date}/${visit.recordNumber}`] = visitData;

        // 倒查 index
        updates[`opd/patientVisitIndex/${visit.recordNumber}/${visit.date}`] = true;

        setStatus('saving', '儲存中...');
        await db.ref().update(updates);
        setStatus('connected', '已儲存');
    }

    async function deleteVisit(date, recordNumber) {
        const updates = {};
        updates[`opd/visits/${date}/${recordNumber}`] = null;
        updates[`opd/patientVisitIndex/${recordNumber}/${date}`] = null;
        setStatus('saving', '刪除中...');
        await db.ref().update(updates);
        setStatus('connected', '已刪除');
    }

    async function toggleNoShow(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        if (!visit) return;
        await db.ref(`opd/visits/${date}/${recordNumber}/noShow`).set(!visit.noShow);
    }

    async function toggleConfirm(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        if (!visit) return;
        const newStatus = visit.status === 'confirmed' ? 'draft' : 'confirmed';
        const updates = { status: newStatus };
        if (newStatus === 'confirmed') updates.confirmedAt = Date.now();
        await db.ref(`opd/visits/${date}/${recordNumber}`).update(updates);
        // RTC 自動傳遞下個版本實作
    }

    function copyPlanToClipboard(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        const p = state.patients[recordNumber] || {};
        if (!visit) return;
        const lines = [
            `${visit.orderInClinic || ''} | ${visit.recordNumber} (${p.surname || ''}) | ${p.ageSex || ''} | eGFR ${p.eGFR || ''} ${p.INR ? '| INR ' + p.INR : ''}`,
            p.extra ? `額外: ${p.extra}` : '',
            visit.examEducation ? `Exam: ${visit.examEducation}` : '',
            visit.plan ? `Plan:\n${visit.plan}` : ''
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(lines).then(() => {
            setStatus('connected', '已複製到剪貼簿');
            setTimeout(() => setStatus('connected', '已連線'), 1500);
        });
    }

    // ========== 綁定門診日 UI ==========
    function bindClinicDayUI() {
        if (state.clinicUiBound) return;
        state.clinicUiBound = true;

        // 日期選擇
        document.getElementById('clinic-date-select').addEventListener('change', (e) => {
            state.currentClinicDate = e.target.value;
            localStorage.setItem('opd:currentClinicDate', e.target.value);
            onClinicDateChanged(state.currentClinicDate);
            updateClinicDateMeta();
        });

        // 上一個 / 下一個
        document.getElementById('prev-clinic-btn').addEventListener('click', () => navigateClinicDate(1));
        document.getElementById('next-clinic-btn').addEventListener('click', () => navigateClinicDate(-1));

        // 加診日
        document.getElementById('add-clinic-date-btn').addEventListener('click', async () => {
            const today = formatDate(new Date());
            const input = prompt('輸入加診日期（YYYY-MM-DD）：', today);
            if (!input) return;
            if (!/^\d{4}-\d{2}-\d{2}$/.test(input)) {
                alert('日期格式錯誤，請用 YYYY-MM-DD');
                return;
            }
            try {
                await addAdHocClinicDate(input);
                state.currentClinicDate = input;
                renderClinicDateSelector();
                onClinicDateChanged(input);
            } catch (err) {
                alert('新增加診日失敗：' + err.message);
            }
        });

        // 搜尋切換
        document.getElementById('visit-search-toggle-btn').addEventListener('click', () => {
            const inp = document.getElementById('visit-search-input');
            inp.classList.toggle('show');
            if (inp.classList.contains('show')) inp.focus();
            else { inp.value = ''; renderVisitList(); }
        });
        document.getElementById('visit-search-input').addEventListener('input', () => renderVisitList());

        // 新增病人按鈕
        document.getElementById('add-visit-btn').addEventListener('click', () => openVisitModal());

        // 表格內按鈕
        document.getElementById('visit-list').addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            const more = e.target.closest('.more-toggle');
            if (more) {
                state.expandedPlans = state.expandedPlans || new Set();
                const rec = more.dataset.record;
                if (state.expandedPlans.has(rec)) state.expandedPlans.delete(rec);
                else state.expandedPlans.add(rec);
                renderVisitList();
                return;
            }
            if (!btn) return;
            const rec = btn.dataset.record;
            const action = btn.dataset.action;
            if (action === 'confirm') toggleConfirm(rec);
            else if (action === 'copy-plan') copyPlanToClipboard(rec);
            else if (action === 'edit') openVisitModal(rec);
            else if (action === 'toggle-dc') toggleNoShow(rec);
        });

        // Visit modal 綁定
        bindVisitModal();
    }

    // ========== Visit modal ==========
    const DEFAULT_TAGS = ['鬆', 'CT NB', 'SONO', 'TAME', 'MRI', 'PRP', 'follow up', 'med'];

    function renderVisitTagPicker(selected) {
        const wrap = document.getElementById('v-tag-picker');
        wrap.innerHTML = DEFAULT_TAGS.map(t => {
            const isOn = selected.includes(t);
            const styleOn = `cursor:pointer; outline:2px solid white; outline-offset:1px;`;
            const styleOff = `cursor:pointer; background:transparent !important; color:var(--text-secondary) !important; border:1px dashed var(--border);`;
            return `<span class="tag-chip" data-tag="${escapeAttr(t)}" style="${isOn ? styleOn : styleOff}">${escapeHtml(t)}</span>`;
        }).join('');
    }

    function openVisitModal(recordNumber) {
        const date = state.currentClinicDate;
        if (!date) { alert('請先選擇門診日期'); return; }
        const isEdit = !!recordNumber;
        const visit = isEdit ? ((state.visitsByDate?.[date] || {})[recordNumber] || {}) : {};
        const patient = isEdit ? (state.patients[recordNumber] || {}) : {};

        state.editingVisitRecord = isEdit ? recordNumber : null;
        state.visitTagsTemp = [...(visit.tags || [])];

        document.getElementById('visit-modal-title').textContent = isEdit ? `編輯病人（${formatDateLabel(date)}）` : `新增本日病人（${formatDateLabel(date)}）`;
        document.getElementById('v-order').value = visit.orderInClinic || '';
        document.getElementById('v-record-number').value = visit.recordNumber || '';
        document.getElementById('v-record-number').disabled = false;
        document.getElementById('v-record-number').dataset.original = visit.recordNumber || '';
        document.getElementById('v-surname').value = patient.surname || '';
        // 年齡/性別：若已有 birthYear 則計算當前年齡顯示
        document.getElementById('v-age-sex').value = displayAgeSex(patient, date) || patient.ageSex || '';
        document.getElementById('v-referrer').value = patient.referrer || '';
        // labs 整合：若 patient.labs 已有就用，否則合成（含舊 eGFR/INR fallback）
        let labsValue = patient.labs || '';
        if (!labsValue) {
            const synthesized = [];
            if (patient.eGFR) synthesized.push(`eGFR ${patient.eGFR}`);
            if (patient.INR) synthesized.push(`INR ${patient.INR}${patient.INRDate ? ` (${patient.INRDate})` : ''}`);
            labsValue = synthesized.join('\n');
        }
        document.getElementById('v-labs').value = labsValue;
        document.getElementById('v-extra').value = patient.extra || '';
        document.getElementById('v-exam').value = visit.examEducation || '';
        document.getElementById('v-plan').value = visit.plan || '';
        document.getElementById('v-modal-delete').style.display = isEdit ? 'inline-block' : 'none';

        renderVisitTagPicker(state.visitTagsTemp);

        document.getElementById('visit-paste-input').value = '';
        document.getElementById('visit-paste-status').textContent = '';
        document.getElementById('visit-modal').classList.add('show');
        if (!isEdit) document.getElementById('v-record-number').focus();
    }

    function closeVisitModal() {
        document.getElementById('visit-modal').classList.remove('show');
        state.editingVisitRecord = null;
        state.visitTagsTemp = [];
    }

    // 病歷號 input 失焦或變更 → 自動帶舊資料
    function autoFillFromPatientLookup() {
        const rec = document.getElementById('v-record-number').value.trim();
        if (!rec) return;
        const p = state.patients[rec];
        if (!p) return;
        // 只填空欄位，不覆蓋
        const fillIfEmpty = (id, value) => {
            const el = document.getElementById(id);
            if (!el.value.trim() && value) {
                el.value = value;
                // 視覺提示
                el.style.transition = 'background 0.15s';
                el.style.background = 'rgba(59,130,246,0.2)';
                setTimeout(() => { el.style.background = ''; }, 1000);
            }
        };
        fillIfEmpty('v-surname', p.surname);
        fillIfEmpty('v-age-sex', p.ageSex);
        fillIfEmpty('v-egfr', p.eGFR);
        fillIfEmpty('v-inr', p.INR);
        fillIfEmpty('v-extra', p.extra);
    }

    async function handleVisitSave() {
        const date = state.currentClinicDate;
        const recordNumber = document.getElementById('v-record-number').value.trim();
        if (!recordNumber) { alert('請輸入病歷號'); return; }

        // 病歷號變更檢查
        const original = document.getElementById('v-record-number').dataset.original || '';
        if (original && original !== recordNumber) {
            if (!confirm(`病歷號將從「${original}」改為「${recordNumber}」。\n\n這會把本次 visit 搬到新病歷號名下。確定？`)) return;
            // 刪舊
            await deleteVisit(date, original);
        }

        const visit = {
            recordNumber,
            date,
            orderInClinic: parseInt(document.getElementById('v-order').value) || null,
            examEducation: document.getElementById('v-exam').value.trim(),
            plan: document.getElementById('v-plan').value.trim(),
            tags: [...state.visitTagsTemp],
            status: ((state.visitsByDate?.[date] || {})[recordNumber]?.status) || 'draft',
            noShow: ((state.visitsByDate?.[date] || {})[recordNumber]?.noShow) || false
        };
        const ageSexInput = document.getElementById('v-age-sex').value.trim();
        const parsed = parseAgeSex(ageSexInput, date);
        const patientPartial = {
            recordNumber,
            surname: document.getElementById('v-surname').value.trim(),
            ageSex: ageSexInput,
            birthYear: parsed?.birthYear || null,
            sex: parsed?.sex || '',
            referrer: document.getElementById('v-referrer').value.trim(),
            labs: document.getElementById('v-labs').value.trim(),
            extra: document.getElementById('v-extra').value.trim()
        };

        try {
            await saveVisit(visit, patientPartial);
            closeVisitModal();
        } catch (err) {
            alert('儲存失敗：' + err.message);
        }
    }

    function handleVisitDelete() {
        const date = state.currentClinicDate;
        const rec = state.editingVisitRecord;
        if (!rec) return;
        showConfirm(`刪除 ${rec} 的本日 visit？`, '只刪除這次門診紀錄，不會刪掉病人主表。', async () => {
            await deleteVisit(date, rec);
            closeVisitModal();
        });
    }

    function bindVisitModal() {
        if (state.visitModalBound) return;
        state.visitModalBound = true;

        document.getElementById('v-modal-cancel').addEventListener('click', closeVisitModal);
        document.getElementById('v-modal-save').addEventListener('click', handleVisitSave);
        document.getElementById('v-modal-delete').addEventListener('click', handleVisitDelete);
        document.getElementById('visit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'visit-modal') closeVisitModal();
        });

        // 病歷號失焦自動帶資料
        document.getElementById('v-record-number').addEventListener('blur', autoFillFromPatientLookup);

        // Tag picker
        document.getElementById('v-tag-picker').addEventListener('click', (e) => {
            const chip = e.target.closest('.tag-chip');
            if (!chip) return;
            const tag = chip.dataset.tag;
            const idx = state.visitTagsTemp.indexOf(tag);
            if (idx >= 0) state.visitTagsTemp.splice(idx, 1);
            else state.visitTagsTemp.push(tag);
            renderVisitTagPicker(state.visitTagsTemp);
        });

        // Paste 解析
        document.getElementById('visit-paste-parse-btn').addEventListener('click', () => {
            const raw = document.getElementById('visit-paste-input').value;
            const status = document.getElementById('visit-paste-status');
            const result = parsePastedRow(raw);
            if (!result.ok) {
                status.textContent = '❌ ' + result.error;
                status.style.color = 'var(--color-danger)';
                return;
            }
            // 填入 visit 表單；referrer / labs 從 extra 抽出
            if (result.order != null) document.getElementById('v-order').value = result.order;
            document.getElementById('v-record-number').value = result.recordNumber;
            document.getElementById('v-surname').value = result.surname;
            document.getElementById('v-age-sex').value = result.ageSex;

            const refDetected = extractReferrer(result.extra);
            const labStuff = extractLabs(result.extra);
            // 把 eGFR、INR 也加進 labs（用換行分隔，方便閱讀）
            const labLines = [];
            if (result.eGFR) labLines.push(`eGFR ${result.eGFR}`);
            if (labStuff.labs) labLines.push(labStuff.labs);
            if (result.INR) labLines.push(`INR ${result.INR}${result.INRDate ? ` (${result.INRDate})` : ''}`);
            const labsCombined = labLines.join('\n');

            document.getElementById('v-referrer').value = refDetected;
            document.getElementById('v-labs').value = labsCombined;
            // extra 剩餘部分（去掉抽出的 lab/referrer）
            let extraRemaining = labStuff.remaining;
            if (refDetected) {
                extraRemaining = extraRemaining.replace(new RegExp(`(^|[\\s/、,，])${refDetected}([\\s/、,，]|$)`, 'g'), ' ').trim();
            }
            document.getElementById('v-extra').value = extraRemaining;
            document.getElementById('v-exam').value = result.exam;
            document.getElementById('v-plan').value = result.plan;
            // tags 合併
            (result.tags || []).forEach(t => {
                if (DEFAULT_TAGS.includes(t) && !state.visitTagsTemp.includes(t)) state.visitTagsTemp.push(t);
            });
            renderVisitTagPicker(state.visitTagsTemp);

            status.textContent = `✅ 已解析（${result.mode === 'tab' ? 'Tab 分隔' : '換行分隔'}，${result.partsCount} 欄）`;
            status.style.color = 'var(--color-confirmed)';
        });

        document.getElementById('visit-paste-input').addEventListener('paste', () => {
            setTimeout(() => {
                const txt = document.getElementById('visit-paste-input').value;
                const lc = txt.split(/\r?\n/).filter(l => l.trim()).length;
                if (txt.includes('\t') || lc >= 4) {
                    document.getElementById('visit-paste-parse-btn').click();
                }
            }, 50);
        });
    }

    function navigateClinicDate(delta) {
        // delta=1 表示上一個（較舊），-1 表示下一個（較新）
        const select = document.getElementById('clinic-date-select');
        const options = [...select.options];
        const idx = options.findIndex(o => o.value === state.currentClinicDate);
        const newIdx = idx + delta;
        if (newIdx < 0 || newIdx >= options.length) return;
        select.value = options[newIdx].value;
        state.currentClinicDate = options[newIdx].value;
        localStorage.setItem('opd:currentClinicDate', state.currentClinicDate);
        onClinicDateChanged(state.currentClinicDate);
        updateClinicDateMeta();
    }

    // ========== 病人主表狀態 ==========
    const state = {
        patients: {},          // {recordNumber: patientObj}
        editingRecordNumber: null,
        currentTags: [],       // tag editor working state
        confirmCallback: null  // confirm modal callback
    };

    // ========== 病人主表 Firebase ==========
    function loadPatients() {
        if (!db) return;
        setStatus('saving', '載入中...');
        db.ref('opd/patients').on('value', (snap) => {
            state.patients = snap.val() || {};
            renderPatientMaster();
            setStatus('connected', '已連線');
        }, (err) => {
            console.error('讀取病人資料失敗:', err);
            setStatus('', '連線失敗');
            alert('讀取病人資料失敗：' + err.message + '\n\n如顯示權限不足，請確認 Firebase Realtime Database rules 已設定 opd 路徑允許你的 UID。');
        });
    }

    async function savePatient(patient) {
        const ref = db.ref('opd/patients/' + patient.recordNumber);
        const now = Date.now();
        const data = {
            ...patient,
            updatedAt: now,
            createdAt: state.patients[patient.recordNumber]?.createdAt || now
        };
        setStatus('saving', '儲存中...');
        await ref.set(data);
        setStatus('connected', '已儲存');
    }

    async function deletePatient(recordNumber) {
        setStatus('saving', '刪除中...');
        await db.ref('opd/patients/' + recordNumber).remove();
        setStatus('connected', '已刪除');
    }

    // ========== 病人主表 UI ==========
    function renderPatientMaster() {
        const list = document.getElementById('patient-master-list');
        const countEl = document.getElementById('patient-count');
        const searchVal = document.getElementById('patient-search-input').value.trim().toLowerCase();

        const allPatients = Object.values(state.patients);
        const filtered = searchVal
            ? allPatients.filter(p =>
                (p.recordNumber || '').toLowerCase().includes(searchVal) ||
                (p.surname || '').toLowerCase().includes(searchVal))
            : allPatients;

        // 排序：依病歷號
        filtered.sort((a, b) => (a.recordNumber || '').localeCompare(b.recordNumber || ''));

        countEl.textContent = `共 ${allPatients.length} 位${searchVal ? `（顯示 ${filtered.length}）` : ''}`;

        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-hint">${allPatients.length === 0 ? '尚無病人資料，點「+ 新增病人」開始建立' : '查無相符結果'}</div>`;
            return;
        }

        list.innerHTML = filtered.map(p => {
            const tags = (p.tags || []).map(t => `<span class="pt-tag">${escapeHtml(t)}</span>`).join('');
            const inrPart = p.INR ? ` ・ INR: ${escapeHtml(p.INR)}${p.INRDate ? ` (${escapeHtml(p.INRDate)})` : ''}` : '';
            const egfrPart = p.eGFR ? ` ・ eGFR: ${escapeHtml(p.eGFR)}` : '';
            const extraPart = p.extra ? `<div class="pt-line2" style="margin-top: 4px;">${escapeHtml(p.extra)}</div>` : '';
            return `
                <div class="pt-card" data-record="${escapeAttr(p.recordNumber)}">
                    <div class="pt-info">
                        <div class="pt-line1">
                            ${escapeHtml(p.recordNumber)}${p.surname ? ` (${escapeHtml(p.surname)})` : ''}
                            <span class="pt-tags">${tags}</span>
                        </div>
                        <div class="pt-line2">${escapeHtml(p.ageSex || '')}${egfrPart}${inrPart}</div>
                        ${extraPart}
                    </div>
                    <div class="pt-actions">
                        <button data-action="edit" data-record="${escapeAttr(p.recordNumber)}">編輯</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) {
        return String(s ?? '').replace(/"/g, '&quot;');
    }

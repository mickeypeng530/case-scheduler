    // ========== 門診日選擇器 UI ==========
    function initClinicDateSelector() {
        if (state.clinicSelectorInitialized) return;
        state.clinicSelectorInitialized = true;
        renderClinicDateSelector();
    }

    function renderClinicDateSelector() {
        const yearSel = document.getElementById('clinic-year-select');
        const mdSel = document.getElementById('clinic-md-select');
        if (!yearSel || !mdSel) return;

        const regular = generateRegularClinicDates();
        const adHoc = Object.values(state.adHocClinicDates || {}).map(x => ({ date: x.date, type: 'ad-hoc' }));
        const map = new Map();
        regular.forEach(d => map.set(d.date, d));
        adHoc.forEach(d => map.set(d.date, d));
        const allDates = [...map.values()].sort((a, b) => b.date.localeCompare(a.date));
        state._allDates = allDates;

        if (!state.currentClinicDate) {
            const saved = localStorage.getItem('opd:currentClinicDate');
            const validSaved = saved && allDates.find(d => d.date === saved);
            state.currentClinicDate = validSaved ? saved : findNearestClinicDate(allDates);
        }
        const currentValue = state.currentClinicDate;
        const currentYear = currentValue ? currentValue.slice(0, 4) : new Date().getFullYear().toString();

        // 年份下拉
        const years = [...new Set(allDates.map(d => d.date.slice(0, 4)))].sort((a, b) => b.localeCompare(a));
        yearSel.innerHTML = years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y} 年</option>`).join('');

        // 該年的月日下拉
        const yearDates = allDates.filter(d => d.date.startsWith(currentYear));
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        mdSel.innerHTML = yearDates.map(d => {
            const md = d.date.slice(5).replace('-', '/');
            const wd = days[new Date(d.date).getDay()];
            const label = (d.type === 'ad-hoc' ? '★ ' : '') + `${md} (${wd})` + (d.type === 'ad-hoc' ? ' 加診' : '');
            return `<option value="${d.date}" ${d.date === currentValue ? 'selected' : ''} style="${d.type === 'ad-hoc' ? 'color:#fca5a5;' : ''}">${label}</option>`;
        }).join('');

        const isAdHoc = allDates.find(d => d.date === currentValue)?.type === 'ad-hoc';
        mdSel.style.color = isAdHoc ? '#fca5a5' : '';
        mdSel.style.fontWeight = isAdHoc ? '600' : '';

        if (currentValue && !state.clinicDateInitialized) {
            state.clinicDateInitialized = true;
            onClinicDateChanged(currentValue);
        }
        updateClinicDateMeta();
    }

    function updateClinicDateMeta() {
        const meta = document.getElementById('clinic-date-meta');
        const date = state.currentClinicDate;
        if (!date) { meta.textContent = ''; return; }
        const visits = state.visitsByDate?.[date] || {};
        const count = Object.keys(visits).length;
        meta.textContent = `${count} 位病人`;
    }

    function onClinicDateChanged(dateStr) {
        if (state.visitsListener) state.visitsListener();
        if (state.metaListener) state.metaListener();
        loadVisitsForDate(dateStr);
        loadClinicMetaForDate(dateStr);
    }

    function loadVisitsForDate(dateStr) {
        if (!db) return;
        const ref = db.ref('opd/visits/' + dateStr);
        const handler = (snap) => {
            state.visitsByDate = state.visitsByDate || {};
            state.visitsByDate[dateStr] = snap.val() || {};
            renderVisitList();
            updateClinicDateMeta();
        };
        ref.on('value', handler);
        state.visitsListener = () => ref.off('value', handler);
    }

    function loadClinicMetaForDate(dateStr) {
        if (!db) return;
        const ref = db.ref('opd/clinicMeta/' + dateStr);
        const handler = (snap) => {
            state.clinicMetaByDate = state.clinicMetaByDate || {};
            state.clinicMetaByDate[dateStr] = snap.val() || {};
            renderHeaderNotes();
        };
        ref.on('value', handler);
        state.metaListener = () => ref.off('value', handler);
    }

    // ========== Plan parsing ==========
    const PROC_KEYWORDS = [
        { name: 'CT NB', re: /\bCT\s*NB\b/gi },
        { name: 'pRF', re: /\bp?RF\b/g },
        { name: 'SONO', re: /\bSONO\s*INJ\b/gi },
        { name: 'TAME', re: /\b[sc]?TAME\b/gi },
        { name: 'MRI', re: /\bMRI\b/g },
        { name: 'PRP', re: /\bPRP\b/g },
        { name: 'HA', re: /\bHA\b/g },
        { name: 'Prolia', re: /\bProlia\b/gi },
        { name: 'Aclasta', re: /\bAclasta\b/gi },
        { name: 'Evenity', re: /\bEvenity\b/gi },
        { name: 'Forteo', re: /\bForteo\b/gi },
        { name: 'Fosamax', re: /\bFosamax\b/gi }
    ];
    const RTC_PATTERN = /(?:(\d{2})\/)?(\d{1,2})\/(\d{1,2})\s*RTC(\??)/gi;

    // 行級日期偵測（line 中所有日期）
    const LINE_DATE_PATTERN = /(\d{2})\/(\d{1,2})\/(\d{1,2})|(?:^|\s)(\d{1,2})\/(\d{1,2})(?!\d)/g;
    // 「討論／建議」行 → 不計入
    const DISCUSS_PATTERN = /\b(consider|may|discuss|favor|build|建議|考慮|可能|可考慮|商量|討論)\b/i;
    const NHI_PATTERN = /\bNHI\b/i;
    const SELF_PAID_PATTERN = /\b(self\s*paid?|自費)\b/i;
    function detectPayment(line) {
        if (NHI_PATTERN.test(line)) return 'NHI';
        if (SELF_PAID_PATTERN.test(line)) return 'self';
        return null;
    }

    function extractLineDates(line, refDateStr) {
        const today = refDateStr || formatDate(new Date());
        const refYear = new Date(today).getFullYear();
        const dates = [];
        let m;
        const re = new RegExp(LINE_DATE_PATTERN.source, 'g');
        while ((m = re.exec(line)) !== null) {
            let yy, mm, dd;
            if (m[1]) {  // YY/M/D
                yy = `20${m[1]}`;
                mm = m[2].padStart(2, '0');
                dd = m[3].padStart(2, '0');
            } else {  // M/D，補今年
                yy = String(refYear);
                mm = m[4].padStart(2, '0');
                dd = m[5].padStart(2, '0');
            }
            dates.push(`${yy}-${mm}-${dd}`);
        }
        return dates;
    }

    function summarizePlan(plan, currentDate) {
        if (!plan) return { items: [], rtcDates: [], hasMultiRTC: false, isSelfRTC: false };

        const today = currentDate || formatDate(new Date());
        const lines = plan.split(/\r?\n/);
        const counts = {};  // { name: { done, planned } }
        PROC_KEYWORDS.forEach(k => { counts[k.name] = { done: 0, planned: 0 }; });

        // 為每個 procedure 紀錄關聯日期（給 hover tooltip 用）
        PROC_KEYWORDS.forEach(k => { counts[k.name].dates = []; });

        // 只抓「明確帶年份」的日期（YY/MM/DD 或 YYYY/MM/DD）
        const EXPLICIT_YEAR_DATE = /\b(\d{2,4})\/(\d{1,2})\/(\d{1,2})\b/g;
        const SHORT_DATE_RE = /\b(\d{1,2})\/(\d{1,2})\b(?!\/)/g;
        lines.forEach(line => {
            if (!line.trim()) return;
            if (DISCUSS_PATTERN.test(line)) return;

            const starsMatch = line.trim().match(/^\*\s*/);
            const isAnchor = !!starsMatch;

            const explicitDates = [];
            let m;
            const re = new RegExp(EXPLICIT_YEAR_DATE.source, 'g');
            while ((m = re.exec(line)) !== null) {
                let yy = m[1];
                if (yy.length === 2) yy = '20' + yy;
                explicitDates.push(`${yy}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`);
            }
            const hasExplicitFuture = explicitDates.some(d => d > today);
            const hasExplicitPastOrToday = explicitDates.some(d => d <= today);

            // 該行最早的明確日期，給 tooltip 顯示
            const lineDateLabel = explicitDates[0] ? explicitDates[0].slice(2).replace(/-/g, '/') : (line.match(SHORT_DATE_RE)?.[0] || '');

            const payment = detectPayment(line);

            PROC_KEYWORDS.forEach(k => {
                const matches = line.match(k.re);
                if (!matches || !matches.length) return;
                let kind;
                if (isAnchor) kind = 'done';
                else if (hasExplicitFuture && !hasExplicitPastOrToday) kind = 'planned';
                else kind = 'done';
                counts[k.name][kind] += matches.length;
                counts[k.name].dates.push({ date: lineDateLabel, kind, payment, line: line.trim() });
            });
        });

        const isSelfRTC = /\bself\s*RTC\b/i.test(plan);

        // RTC 日期（用 RTC_PATTERN，未來的）
        const rtcMatches = [...plan.matchAll(RTC_PATTERN)];
        const futureRTC = [];
        rtcMatches.forEach(m => {
            const yy = m[1] ? `20${m[1]}` : new Date(today).getFullYear().toString();
            const mm = m[2].padStart(2, '0');
            const dd = m[3].padStart(2, '0');
            const dateStr = `${yy}-${mm}-${dd}`;
            if (dateStr > today) futureRTC.push(dateStr);
        });
        const uniqueFuture = [...new Set(futureRTC)].sort();

        const items = Object.entries(counts)
            .filter(([_, c]) => c.done || c.planned)
            .map(([name, c]) => ({ name, done: c.done, planned: c.planned, count: c.done, dates: c.dates || [] }));

        return {
            items,
            rtcDates: uniqueFuture,
            hasMultiRTC: uniqueFuture.length > 1,
            isSelfRTC,
            nextRTC: uniqueFuture[0] || null
        };
    }

    function highlightPlanLine(line) {
        const trimmed = line.trim();
        if (!trimmed) return '';  // 空行直接 skip
        let cls = '';
        if (trimmed.startsWith('*')) cls = 'plan-line done';
        else if (trimmed.startsWith('-')) cls = 'plan-line plan';
        else if (/RTC/i.test(trimmed)) cls = 'plan-line rtc-line';
        return `<span class="${cls}">${escapeHtml(trimmed)}</span>`;
    }

    // ========== Visit table 渲染 ==========
    function renderVisitList() {
        const wrap = document.getElementById('visit-list');
        const date = state.currentClinicDate;
        if (!date) {
            wrap.innerHTML = `<div class="empty-hint">請選擇門診日期</div>`;
            return;
        }
        const visits = Object.values((state.visitsByDate || {})[date] || {});

        // 搜尋過濾
        const searchVal = (document.getElementById('visit-search-input').value || '').trim().toLowerCase();
        const filtered = searchVal
            ? visits.filter(v => {
                const p = state.patients[v.recordNumber] || {};
                return v.recordNumber?.toLowerCase().includes(searchVal)
                    || p.surname?.toLowerCase().includes(searchVal);
              })
            : visits;

        if (filtered.length === 0) {
            wrap.innerHTML = `<div class="empty-hint">${formatDateLabel(date)}<br><br>${visits.length === 0 ? '尚無病人，點「+ 新增病人」新增' : '查無相符結果'}</div>`;
            return;
        }

        // 排序：noShow=false 在前，按 orderInClinic ASC；DC 後也按 orderInClinic
        const came = filtered.filter(v => !v.noShow).sort((a, b) => (a.orderInClinic || 999) - (b.orderInClinic || 999));
        const noShow = filtered.filter(v => v.noShow).sort((a, b) => (a.orderInClinic || 999) - (b.orderInClinic || 999));

        const renderRow = (v) => {
            const p = state.patients[v.recordNumber] || {};
            const summary = summarizePlan(v.plan, date);
            const planLines = (v.plan || '').split(/\r?\n/);
            // 去除前後空行避免顯示空白
            while (planLines.length && !planLines[0].trim()) planLines.shift();
            while (planLines.length && !planLines[planLines.length - 1].trim()) planLines.pop();
            const showLines = state.expandedPlans?.has(v.recordNumber) ? planLines : planLines.slice(-3);
            const hasMore = planLines.length > showLines.length;

            const summaryPills = [
                ...summary.items.map(it => `<span class="pill">${escapeHtml(it.name)}×${it.count}</span>`),
                summary.nextRTC ? `<span class="pill rtc">下次 RTC: ${summary.nextRTC.slice(5)}</span>` : '',
                summary.hasMultiRTC ? `<span class="pill warn">多 RTC ${summary.rtcDates.length}</span>` : '',
                summary.isSelfRTC ? `<span class="pill warn">自我約診</span>` : ''
            ].filter(Boolean).join('');

            const tagChips = (v.tags || []).map(t => `<span class="tag-chip" data-tag="${escapeAttr(t)}">${escapeHtml(t)}</span>`).join('');

            const statusBadges = [
                v.status === 'confirmed' ? '<span class="status-badge confirmed">已確認</span>' : '<span class="status-badge draft">草稿</span>',
                p.firstVisitDate === v.date ? '<span class="status-badge first-visit">初診</span>' : '',
                summary.isSelfRTC ? '<span class="status-badge self-rtc">自約</span>' : '',
                summary.hasMultiRTC ? '<span class="status-badge warning">多 RTC</span>' : ''
            ].filter(Boolean).join('');

            const ageDisplay = displayAgeSex(p, date) || p.ageSex || '';
            // labs 顯示：優先 patient.labs；若無，fallback 合成 (eGFR + INR)
            let labsDisplay = p.labs || '';
            if (!labsDisplay) {
                const synth = [];
                if (p.eGFR && isValidEGFR(p.eGFR)) synth.push(`eGFR ${p.eGFR}`);
                if (p.INR) synth.push(`INR ${p.INR}${p.INRDate ? ` (${p.INRDate})` : ''}`);
                labsDisplay = synth.join('\n');
            }
            // 如果 patient 殘留 referrer-like 內容在 eGFR（legacy bug），自動把它當 referrer 顯示
            const referrerDisplay = p.referrer || (p.eGFR && !isValidEGFR(p.eGFR) ? p.eGFR : '');
            return `
              <tr class="${v.noShow ? 'no-show' : ''}" data-record="${escapeAttr(v.recordNumber)}">
                <td class="col-num">${escapeHtml(String(v.orderInClinic || ''))}</td>
                <td class="col-record">
                    <span class="record-line">${escapeHtml(v.recordNumber)}${p.surname ? ` (${escapeHtml(String(p.surname).replace(/\s+/g,''))})` : ''}</span>
                    ${ageDisplay ? `<div class="age-line">${escapeHtml(ageDisplay)}</div>` : ''}
                    ${referrerDisplay ? `<div class="ref-line">${escapeHtml(referrerDisplay)}</div>` : ''}
                    <div class="status-badges">${statusBadges}</div>
                </td>
                <td class="col-labs">${escapeHtml(labsDisplay)}</td>
                <td class="col-extra">${(() => {
                    const bs = p.boneScore || '';
                    const ph = p.pastHistory || p.extra || '';
                    const parts = [];
                    if (bs) parts.push(`<span style="color:#c084fc;font-weight:600;font-size:0.72rem">骨鬆:</span> ${escapeHtml(bs)}`);
                    if (ph) parts.push(`<span style="color:#fda4af;font-weight:600;font-size:0.72rem">PH:</span> ${escapeHtml(ph)}`);
                    return parts.join('<br>');
                })()}</td>
                <td class="col-exam">${(() => {
                    const needs = visitNeedsAnticoagCheck(v);
                    let acIcon = '';
                    if (p.anticoagState === 'yes' && (p.anticoagulants || []).length) {
                        // 有抗凝藥永遠顯示 🩸 + 藥名（hover 顯示 hold 天數）
                        const drugs = (p.anticoagulants || []).map(d => `${escapeHtml(d)} hold ${getAnticoagHold(d)}`).join('；');
                        acIcon = `<span class="ac-icon ac-yes" title="抗凝劑（侵入處置前需 hold）：${drugs}">🩸 ${(p.anticoagulants || []).map(escapeHtml).join('/')}</span>`;
                    } else if (needs && p.anticoagState === 'none') {
                        // 只在本次有 CT NB / TAME / pRF 時，秀「✅ 已確認無」
                        acIcon = `<span class="ac-icon ac-none" title="已確認無抗凝">✅ 無抗凝</span>`;
                    } else if (needs) {
                        // 未確認，且本次有 CT NB / TAME / pRF
                        acIcon = `<span class="ac-icon ac-unknown" title="未確認抗凝劑使用情況；本次有 CT NB / TAME / pRF，請於門診確認">⚠️ 未確認抗凝</span>`;
                    }
                    // Procedure auto-summary（done×N，計畫中另外標）+ hover 顯示日期 + NHI/self
                    const summaryPills = [
                        ...summary.items.map(it => {
                            const planNote = it.planned ? `<span style="opacity:0.7;font-size:0.65rem"> +${it.planned}計</span>` : '';
                            // 若 done 都同一付款型，chip 直接顯示
                            const donePayments = (it.dates || []).filter(d => d.kind === 'done').map(d => d.payment).filter(Boolean);
                            const samePay = donePayments.length === it.done && donePayments.length && donePayments.every(p => p === donePayments[0]);
                            const payTag = samePay ? ` ${donePayments[0]}` : '';
                            const main = it.done ? `${escapeHtml(it.name)}×${it.done}${escapeHtml(payTag)}` : `${escapeHtml(it.name)} 計${it.planned}`;
                            const datesText = (it.dates || []).map(d => {
                                const pay = d.payment ? `${d.payment} ` : '';
                                return `${pay}${d.date || '-'} (${d.kind === 'planned' ? '計' : '已'})`;
                            }).join('\n');
                            const tip = `已完成 ${it.done}, 計畫中 ${it.planned}` + (datesText ? `\n────\n${datesText}` : '');
                            return `<span class="pill" title="${escapeAttr(tip)}">${main}${planNote}</span>`;
                        }),
                        summary.hasMultiRTC ? `<span class="pill warn" title="${escapeAttr(summary.rtcDates.join('\n'))}">多 RTC ${summary.rtcDates.length}</span>` : '',
                        summary.isSelfRTC ? `<span class="pill warn">自我約診</span>` : ''
                    ].filter(Boolean).join('');
                    return `
                        ${acIcon ? `<div class="ac-line">${acIcon}</div>` : ''}
                        ${summaryPills ? `<div class="exam-summary">${summaryPills}</div>` : ''}
                        <div class="exam-content${(v.examEducation || '').length < 80 ? ' short' : ''}" data-record="${escapeAttr(v.recordNumber)}">${escapeHtml(v.examEducation || '')}</div>
                    `;
                })()}</td>
                <td class="col-plan">
                    ${(() => {
                        const procEntries = Object.entries(v.procedureStatuses || {}).filter(([_, s]) => s);
                        if (!procEntries.length) return '';
                        return `<div class="proc-status-bar">${procEntries.map(([p, s]) =>
                            `<span class="tag-chip" data-status="${s}">${escapeHtml(p)}<span class="status-flag">${STATUS_LABEL[s] || s}</span></span>`
                        ).join('')}</div>`;
                    })()}
                    ${p.bonePlanSummary ? `<div class="patient-summary bone">🦴 ${escapeHtml(p.bonePlanSummary)}</div>` : ''}
                    ${p.painPlanSummary ? `<div class="patient-summary pain">💢 ${escapeHtml(p.painPlanSummary)}</div>` : ''}
                    <div class="plan-body">${showLines.map(highlightPlanLine).filter(Boolean).join('<br>')}${hasMore ? `<br><span class="more-toggle" data-record="${escapeAttr(v.recordNumber)}">▼ 顯示全部 ${planLines.length} 行</span>` : (state.expandedPlans?.has(v.recordNumber) && planLines.length > 3 ? `<br><span class="more-toggle" data-record="${escapeAttr(v.recordNumber)}">▲ 收合</span>` : '')}</div>
                </td>
                <td class="col-tags"><div class="visit-tags">${tagChips}</div></td>
                <td class="col-actions">
                    <div class="row-actions">
                        <button data-action="edit" data-record="${escapeAttr(v.recordNumber)}">✏️ 編輯</button>
                        <button data-action="confirm" data-record="${escapeAttr(v.recordNumber)}" class="${v.status === 'confirmed' ? 'confirmed' : ''}">${v.status === 'confirmed' ? '✓ 已確認' : '✓ 確認'}</button>
                        <button data-action="copy-plan" data-record="${escapeAttr(v.recordNumber)}">📋 複製</button>
                        <button data-action="toggle-dc" data-record="${escapeAttr(v.recordNumber)}">${v.noShow ? '↑ 移回' : '↓ 移 DC'}</button>
                    </div>
                </td>
              </tr>
            `;
        };

        const dcDivider = noShow.length > 0 ? `
          <tr class="dc-divider"><td colspan="8">─── D C ───  共 ${noShow.length} 位未到</td></tr>
        ` : '';

        wrap.innerHTML = `
          <div class="visit-table-wrapper">
            <table class="visit-table">
              <colgroup>
                <col class="col-num"><col class="col-record"><col class="col-labs">
                <col class="col-extra"><col class="col-exam"><col class="col-plan">
                <col class="col-tags"><col class="col-actions">
              </colgroup>
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-record">病人</th>
                  <th class="col-labs">抽血</th>
                  <th class="col-extra">慢性病史</th>
                  <th class="col-exam">本次概況</th>
                  <th class="col-plan">Plan</th>
                  <th class="col-tags">標籤</th>
                  <th class="col-actions">操作</th>
                </tr>
              </thead>
              <tbody>
                ${came.map(renderRow).join('')}
                ${dcDivider}
                ${noShow.map(renderRow).join('')}
              </tbody>
            </table>
          </div>
        `;
    }

    function renderHeaderNotes() {
        const date = state.currentClinicDate;
        const wrap = document.getElementById('header-notes');
        if (!wrap || !date) return;
        const meta = (state.clinicMetaByDate || {})[date] || {};
        const notes = meta.headerNotes || '';
        if (state.editingHeaderNotes) {
            wrap.innerHTML = `
              <div class="hn-title">📌 標頭備註（${formatDateLabel(date)}）
                <span><button class="hn-edit" id="hn-save">儲存</button> <button class="hn-edit" id="hn-cancel">取消</button></span>
              </div>
              <textarea id="hn-textarea">${escapeHtml(notes)}</textarea>
            `;
            const ta = document.getElementById('hn-textarea');
            ta.focus();
            document.getElementById('hn-save').onclick = async () => {
                await db.ref('opd/clinicMeta/' + date + '/headerNotes').set(ta.value);
                state.editingHeaderNotes = false;
                renderHeaderNotes();
            };
            document.getElementById('hn-cancel').onclick = () => {
                state.editingHeaderNotes = false;
                renderHeaderNotes();
            };
        } else {
            wrap.innerHTML = `
              <div class="hn-title">📌 標頭備註
                <button class="hn-edit" id="hn-edit-btn">編輯</button>
              </div>
              <div class="hn-content">${notes ? escapeHtml(notes) : '<span style="color:var(--text-muted)">（尚未填寫，點編輯加入這日的預約 CT NB / MRI 等）</span>'}</div>
            `;
            document.getElementById('hn-edit-btn').onclick = () => {
                state.editingHeaderNotes = true;
                renderHeaderNotes();
            };
        }
    }

    // ========== Visit CRUD ==========
    async function saveVisit(visit, patientPartial) {
        const now = Date.now();
        const updates = {};

        // patient 主表 upsert（若有提供 patientPartial）
        if (patientPartial && patientPartial.recordNumber) {
            const existing = state.patients[patientPartial.recordNumber] || {};
            const merged = {
                ...existing,
                ...patientPartial,
                createdAt: existing.createdAt || now,
                updatedAt: now,
                firstVisitDate: existing.firstVisitDate || visit.date
            };
            // 只寫非空值（避免清掉既有）
            Object.keys(patientPartial).forEach(k => {
                if (patientPartial[k] === '' && existing[k]) merged[k] = existing[k];
            });
            updates['opd/patients/' + patientPartial.recordNumber] = merged;
        }

        // visit
        const visitData = {
            ...visit,
            updatedAt: now,
            createdAt: ((state.visitsByDate?.[visit.date] || {})[visit.recordNumber]?.createdAt) || now
        };
        updates[`opd/visits/${visit.date}/${visit.recordNumber}`] = visitData;

        // 倒查 index
        updates[`opd/patientVisitIndex/${visit.recordNumber}/${visit.date}`] = true;

        setStatus('saving', '儲存中...');
        await db.ref().update(updates);
        setStatus('connected', '已儲存');
    }

    async function deleteVisit(date, recordNumber) {
        const updates = {};
        updates[`opd/visits/${date}/${recordNumber}`] = null;
        updates[`opd/patientVisitIndex/${recordNumber}/${date}`] = null;
        setStatus('saving', '刪除中...');
        await db.ref().update(updates);
        setStatus('connected', '已刪除');
    }

    async function toggleNoShow(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        if (!visit) return;
        await db.ref(`opd/visits/${date}/${recordNumber}/noShow`).set(!visit.noShow);
    }

    async function toggleConfirm(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        if (!visit) return;
        const newStatus = visit.status === 'confirmed' ? 'draft' : 'confirmed';
        const updates = { status: newStatus };
        if (newStatus === 'confirmed') updates.confirmedAt = Date.now();
        await db.ref(`opd/visits/${date}/${recordNumber}`).update(updates);
        // RTC 自動傳遞下個版本實作
    }

    function copyPlanToClipboard(recordNumber) {
        const date = state.currentClinicDate;
        const visit = (state.visitsByDate?.[date] || {})[recordNumber];
        const p = state.patients[recordNumber] || {};
        if (!visit) return;
        const lines = [
            `${visit.orderInClinic || ''} | ${visit.recordNumber} (${p.surname || ''}) | ${p.ageSex || ''} | eGFR ${p.eGFR || ''} ${p.INR ? '| INR ' + p.INR : ''}`,
            p.extra ? `額外: ${p.extra}` : '',
            visit.examEducation ? `Exam: ${visit.examEducation}` : '',
            visit.plan ? `Plan:\n${visit.plan}` : ''
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(lines).then(() => {
            setStatus('connected', '已複製到剪貼簿');
            setTimeout(() => setStatus('connected', '已連線'), 1500);
        });
    }

    // ========== 綁定門診日 UI ==========
    function bindClinicDayUI() {
        if (state.clinicUiBound) return;
        state.clinicUiBound = true;

        // 月日選擇
        document.getElementById('clinic-md-select').addEventListener('change', (e) => {
            state.currentClinicDate = e.target.value;
            localStorage.setItem('opd:currentClinicDate', e.target.value);
            onClinicDateChanged(state.currentClinicDate);
            updateClinicDateMeta();
        });
        // 年份切換 → 跳到該年最新一個門診日
        document.getElementById('clinic-year-select').addEventListener('change', (e) => {
            const y = e.target.value;
            const all = state._allDates || [];
            const yearDates = all.filter(d => d.date.startsWith(y));
            if (!yearDates.length) return;
            // 預設選該年最近今天的日期
            const today = formatDate(new Date());
            const future = yearDates.filter(d => d.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
            const pick = future[0]?.date || yearDates[0].date;
            state.currentClinicDate = pick;
            localStorage.setItem('opd:currentClinicDate', pick);
            renderClinicDateSelector();
            onClinicDateChanged(pick);
            updateClinicDateMeta();
        });

        // 上一個 / 下一個
        document.getElementById('prev-clinic-btn').addEventListener('click', () => navigateClinicDate(1));
        document.getElementById('next-clinic-btn').addEventListener('click', () => navigateClinicDate(-1));

        // 加診日
        document.getElementById('add-clinic-date-btn').addEventListener('click', async () => {
            const today = formatDate(new Date());
            const input = prompt('輸入加診日期（YYYY-MM-DD）：', today);
            if (!input) return;
            if (!/^\d{4}-\d{2}-\d{2}$/.test(input)) {
                alert('日期格式錯誤，請用 YYYY-MM-DD');
                return;
            }
            try {
                await addAdHocClinicDate(input);
                state.currentClinicDate = input;
                renderClinicDateSelector();
                onClinicDateChanged(input);
            } catch (err) {
                alert('新增加診日失敗：' + err.message);
            }
        });

        // 搜尋切換
        document.getElementById('visit-search-toggle-btn').addEventListener('click', () => {
            const inp = document.getElementById('visit-search-input');
            inp.classList.toggle('show');
            if (inp.classList.contains('show')) inp.focus();
            else { inp.value = ''; renderVisitList(); }
        });
        document.getElementById('visit-search-input').addEventListener('input', () => renderVisitList());

        // 新增病人按鈕
        document.getElementById('add-visit-btn').addEventListener('click', () => openVisitModal());

        // 表格內按鈕
        document.getElementById('visit-list').addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            const more = e.target.closest('.more-toggle');
            if (more) {
                state.expandedPlans = state.expandedPlans || new Set();
                const rec = more.dataset.record;
                if (state.expandedPlans.has(rec)) state.expandedPlans.delete(rec);
                else state.expandedPlans.add(rec);
                renderVisitList();
                return;
            }
            if (!btn) return;
            const rec = btn.dataset.record;
            const action = btn.dataset.action;
            if (action === 'confirm') toggleConfirm(rec);
            else if (action === 'copy-plan') copyPlanToClipboard(rec);
            else if (action === 'edit') openVisitModal(rec);
            else if (action === 'toggle-dc') toggleNoShow(rec);
        });

        // Visit modal 綁定
        bindVisitModal();
    }

    // ========== Visit modal ==========
    const DEFAULT_TAGS = ['鬆', 'CT NB', 'SONO', 'TAME', 'MRI', 'PRP', 'follow up', 'med'];
    const DEFAULT_PROCEDURES = ['CT NB', 'MRI', 'SONO', 'TAME', '鬆', 'pRF', 'PRP'];
    const STATUS_CYCLE = [undefined, 'pending', 'done', 'pm', 'am'];
    const STATUS_LABEL = { pending: '待', done: '已', pm: 'PM', am: 'AM' };

    // 抗凝劑停藥天數對照
    const ANTICOAG_HOLD_DAYS = {
        'Aspirin':  '1–2d',
        'Plavix':   '5d',
        'Lixiana':  '2–3d',
        'Eliquis':  '2–3d',
        'Xarelto':  '2–3d',
        'Pradaxa':  '2–3d',
        'Warfarin': '依 INR'
    };
    function getAnticoagHold(name) {
        const key = Object.keys(ANTICOAG_HOLD_DAYS).find(k => k.toLowerCase() === name.toLowerCase());
        return key ? ANTICOAG_HOLD_DAYS[key] : '?';
    }
    // 本次 visit 是否需要「確認抗凝」（只 CT NB / TAME / pRF；SONO 不需要）
    function visitNeedsAnticoagCheck(v) {
        const ps = v?.procedureStatuses || {};
        return ['CT NB', 'TAME', 'pRF'].some(k => ps[k]);
    }

    function renderProcedurePicker(statuses) {
        const wrap = document.getElementById('v-proc-picker');
        if (!wrap) return;
        wrap.innerHTML = DEFAULT_PROCEDURES.map(p => {
            const status = statuses?.[p];
            const flag = status ? `<span class="status-flag">${STATUS_LABEL[status] || status}</span>` : '';
            const styleOff = status ? '' : `background:transparent !important; color:var(--text-secondary) !important; border:1px dashed var(--border);`;
            return `<span class="tag-chip" data-proc="${escapeAttr(p)}" data-status="${status || ''}" style="cursor:pointer; ${styleOff}">${escapeHtml(p)}${flag}</span>`;
        }).join('');
    }

    function renderVisitTagPicker(selected) {
        const wrap = document.getElementById('v-tag-picker');
        wrap.innerHTML = DEFAULT_TAGS.map(t => {
            const isOn = selected.includes(t);
            const styleOn = `cursor:pointer; outline:2px solid white; outline-offset:1px;`;
            const styleOff = `cursor:pointer; background:transparent !important; color:var(--text-secondary) !important; border:1px dashed var(--border);`;
            return `<span class="tag-chip" data-tag="${escapeAttr(t)}" style="${isOn ? styleOn : styleOff}">${escapeHtml(t)}</span>`;
        }).join('');
    }

    function openVisitModal(recordNumber) {
        const date = state.currentClinicDate;
        if (!date) { alert('請先選擇門診日期'); return; }
        const isEdit = !!recordNumber;
        const visit = isEdit ? ((state.visitsByDate?.[date] || {})[recordNumber] || {}) : {};
        const patient = isEdit ? (state.patients[recordNumber] || {}) : {};

        state.editingVisitRecord = isEdit ? recordNumber : null;
        state.visitTagsTemp = [...(visit.tags || [])];
        state.procStatusesTemp = { ...(visit.procedureStatuses || {}) };

        document.getElementById('visit-modal-title').textContent = isEdit ? `編輯病人（${formatDateLabel(date)}）` : `新增本日病人（${formatDateLabel(date)}）`;
        document.getElementById('v-order').value = visit.orderInClinic || '';
        document.getElementById('v-record-number').value = visit.recordNumber || '';
        document.getElementById('v-record-number').disabled = false;
        document.getElementById('v-record-number').dataset.original = visit.recordNumber || '';
        document.getElementById('v-surname').value = patient.surname || '';
        // 年齡/性別：若已有 birthYear 則計算當前年齡顯示
        document.getElementById('v-age-sex').value = displayAgeSex(patient, date) || patient.ageSex || '';
        document.getElementById('v-referrer').value = patient.referrer || '';
        // labs 整合：若 patient.labs 已有就用，否則合成（含舊 eGFR/INR fallback）
        let labsValue = patient.labs || '';
        if (!labsValue) {
            const synthesized = [];
            if (patient.eGFR) synthesized.push(`eGFR ${patient.eGFR}`);
            if (patient.INR) synthesized.push(`INR ${patient.INR}${patient.INRDate ? ` (${patient.INRDate})` : ''}`);
            labsValue = synthesized.join('\n');
        }
        document.getElementById('v-labs').value = labsValue;
        document.getElementById('v-bone-score').value = patient.boneScore || '';
        // pastHistory 取代 extra；舊資料 fallback 從 extra 帶
        document.getElementById('v-past-history').value = patient.pastHistory || patient.extra || '';

        // 抗凝劑 state 載入
        const acState = patient.anticoagState || (patient.anticoagulants && patient.anticoagulants.length ? 'yes' : 'unknown');
        document.getElementById('v-anticoag-state').value = acState;
        document.getElementById('v-anticoag-list').value = (patient.anticoagulants || []).join(', ');
        document.getElementById('v-anticoag-list').style.display = (acState === 'yes') ? 'inline-block' : 'none';

        document.getElementById('v-bone-summary').value = patient.bonePlanSummary || '';
        document.getElementById('v-pain-summary').value = patient.painPlanSummary || '';

        document.getElementById('v-exam').value = visit.examEducation || '';
        document.getElementById('v-plan').value = visit.plan || '';
        document.getElementById('v-modal-delete').style.display = isEdit ? 'inline-block' : 'none';

        renderVisitTagPicker(state.visitTagsTemp);
        renderProcedurePicker(state.procStatusesTemp);

        document.getElementById('visit-paste-input').value = '';
        document.getElementById('visit-paste-status').textContent = '';
        document.getElementById('visit-modal').classList.add('show');
        if (!isEdit) document.getElementById('v-record-number').focus();
    }

    function closeVisitModal() {
        document.getElementById('visit-modal').classList.remove('show');
        state.editingVisitRecord = null;
        state.visitTagsTemp = [];
        state.procStatusesTemp = {};
    }

    // 病歷號 input 失焦或變更 → 自動帶舊資料
    function autoFillFromPatientLookup() {
        const rec = document.getElementById('v-record-number').value.trim();
        if (!rec) return;
        const p = state.patients[rec];
        if (!p) return;
        // 只填空欄位，不覆蓋
        const fillIfEmpty = (id, value) => {
            const el = document.getElementById(id);
            if (!el.value.trim() && value) {
                el.value = value;
                // 視覺提示
                el.style.transition = 'background 0.15s';
                el.style.background = 'rgba(59,130,246,0.2)';
                setTimeout(() => { el.style.background = ''; }, 1000);
            }
        };
        fillIfEmpty('v-surname', p.surname);
        fillIfEmpty('v-age-sex', p.ageSex);
        fillIfEmpty('v-egfr', p.eGFR);
        fillIfEmpty('v-inr', p.INR);
        fillIfEmpty('v-extra', p.extra);
    }

    async function handleVisitSave() {
        const date = state.currentClinicDate;
        const recordNumber = document.getElementById('v-record-number').value.trim();
        if (!recordNumber) { alert('請輸入病歷號'); return; }

        // 病歷號變更檢查
        const original = document.getElementById('v-record-number').dataset.original || '';
        if (original && original !== recordNumber) {
            if (!confirm(`病歷號將從「${original}」改為「${recordNumber}」。\n\n這會把本次 visit 搬到新病歷號名下。確定？`)) return;
            // 刪舊
            await deleteVisit(date, original);
        }

        // 過濾 procedureStatuses 只留有狀態的
        const cleanedProcStatuses = {};
        Object.entries(state.procStatusesTemp || {}).forEach(([k, v]) => { if (v) cleanedProcStatuses[k] = v; });

        const visit = {
            recordNumber,
            date,
            orderInClinic: parseInt(document.getElementById('v-order').value) || null,
            examEducation: document.getElementById('v-exam').value.trim(),
            plan: document.getElementById('v-plan').value.trim(),
            tags: [...state.visitTagsTemp],
            procedureStatuses: cleanedProcStatuses,
            status: ((state.visitsByDate?.[date] || {})[recordNumber]?.status) || 'draft',
            noShow: ((state.visitsByDate?.[date] || {})[recordNumber]?.noShow) || false
        };
        const ageSexInput = document.getElementById('v-age-sex').value.trim();
        const parsed = parseAgeSex(ageSexInput, date);
        const acState = document.getElementById('v-anticoag-state').value;
        const acListRaw = document.getElementById('v-anticoag-list').value.trim();
        const anticoagulants = (acState === 'yes' && acListRaw)
            ? acListRaw.split(/[,，、]+/).map(s => s.trim()).filter(Boolean)
            : [];
        const patientPartial = {
            recordNumber,
            surname: document.getElementById('v-surname').value.trim(),
            ageSex: ageSexInput,
            birthYear: parsed?.birthYear || null,
            sex: parsed?.sex || '',
            referrer: document.getElementById('v-referrer').value.trim(),
            labs: document.getElementById('v-labs').value.trim(),
            boneScore: document.getElementById('v-bone-score').value.trim(),
            pastHistory: document.getElementById('v-past-history').value.trim(),
            anticoagState: acState,
            anticoagulants,
            bonePlanSummary: document.getElementById('v-bone-summary').value.trim(),
            painPlanSummary: document.getElementById('v-pain-summary').value.trim()
        };

        try {
            await saveVisit(visit, patientPartial);
            closeVisitModal();
        } catch (err) {
            alert('儲存失敗：' + err.message);
        }
    }

    function handleVisitDelete() {
        const date = state.currentClinicDate;
        const rec = state.editingVisitRecord;
        if (!rec) return;
        showConfirm(`刪除 ${rec} 的本日 visit？`, '只刪除這次門診紀錄，不會刪掉病人主表。', async () => {
            await deleteVisit(date, rec);
            closeVisitModal();
        });
    }

    function bindVisitModal() {
        if (state.visitModalBound) return;
        state.visitModalBound = true;

        document.getElementById('v-modal-cancel').addEventListener('click', closeVisitModal);
        document.getElementById('v-modal-save').addEventListener('click', handleVisitSave);
        document.getElementById('v-modal-delete').addEventListener('click', handleVisitDelete);
        document.getElementById('visit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'visit-modal') closeVisitModal();
        });

        // 病歷號失焦自動帶資料
        document.getElementById('v-record-number').addEventListener('blur', autoFillFromPatientLookup);

        // 抗凝劑 state 切換 → 顯示/隱藏藥名輸入
        document.getElementById('v-anticoag-state').addEventListener('change', (e) => {
            const inp = document.getElementById('v-anticoag-list');
            inp.style.display = (e.target.value === 'yes') ? 'inline-block' : 'none';
            if (e.target.value !== 'yes') inp.value = '';
        });

        // 「🤖 從 plan 生成本次說明」按鈕
        document.getElementById('v-generate-exam').addEventListener('click', () => {
            const date = state.currentClinicDate;
            const planText = document.getElementById('v-plan').value;
            const summary = summarizePlan(planText, date);
            const lines = [];
            summary.items.forEach(it => {
                // done 與 planned 分組顯示
                const doneEvts = (it.dates || []).filter(d => d.kind === 'done');
                const planEvts = (it.dates || []).filter(d => d.kind === 'planned');

                const formatGroup = (events) => {
                    if (!events.length) return '';
                    const payments = events.map(e => e.payment).filter(Boolean);
                    const samePayment = payments.length && payments.length === events.length && payments.every(p => p === payments[0]);
                    if (samePayment) {
                        // Prolia×3 NHI (25/03/26, 09/24, 26/04/22)
                        const dates = events.map(e => e.date).filter(Boolean).join(', ');
                        return `×${events.length} ${payments[0]}${dates ? ` (${dates})` : ''}`;
                    } else {
                        // 混合或無付款標記：列每個 (NHI 25/03/26, self 04/22) 等
                        const parts = events.map(e => `${e.payment ? e.payment + ' ' : ''}${e.date || '-'}`);
                        return `×${events.length} (${parts.join(', ')})`;
                    }
                };

                const doneStr = formatGroup(doneEvts);
                const planStr = planEvts.length ? `, 計${planEvts.length}` + (planEvts.some(e => e.date) ? ` (${planEvts.map(e => e.date).filter(Boolean).join(', ')})` : '') : '';

                if (doneEvts.length) {
                    lines.push(`${it.name}${doneStr}${planStr}`);
                } else if (planEvts.length) {
                    lines.push(`${it.name} 計${planEvts.length}` + (planEvts.some(e => e.date) ? ` (${planEvts.map(e => e.date).filter(Boolean).join(', ')})` : ''));
                }
            });
            if (summary.hasMultiRTC) lines.push(`⚠ 多 RTC: ${summary.rtcDates.join(', ')}`);
            if (summary.isSelfRTC) lines.push('自我約診');
            const generated = lines.join('\n');
            const ta = document.getElementById('v-exam');
            const cur = ta.value.trim();
            if (cur && !confirm('本次說明已有內容，是否要替換？\n\n（取消會附加在後面）')) {
                ta.value = cur + '\n\n' + generated;
            } else {
                ta.value = generated;
            }
            ta.focus();
        });

        // Tag picker（單純多選）
        document.getElementById('v-tag-picker').addEventListener('click', (e) => {
            const chip = e.target.closest('.tag-chip');
            if (!chip) return;
            const tag = chip.dataset.tag;
            const idx = state.visitTagsTemp.indexOf(tag);
            if (idx >= 0) state.visitTagsTemp.splice(idx, 1);
            else state.visitTagsTemp.push(tag);
            renderVisitTagPicker(state.visitTagsTemp);
        });

        // Procedure status picker（點循環狀態）
        document.getElementById('v-proc-picker').addEventListener('click', (e) => {
            const chip = e.target.closest('.tag-chip');
            if (!chip) return;
            const proc = chip.dataset.proc;
            const cur = state.procStatusesTemp[proc];
            const idx = STATUS_CYCLE.indexOf(cur);
            const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
            if (next) state.procStatusesTemp[proc] = next;
            else delete state.procStatusesTemp[proc];
            renderProcedurePicker(state.procStatusesTemp);
        });

        // Paste 解析
        document.getElementById('visit-paste-parse-btn').addEventListener('click', () => {
            const raw = document.getElementById('visit-paste-input').value;
            const status = document.getElementById('visit-paste-status');
            const result = parsePastedRow(raw);
            if (!result.ok) {
                status.textContent = '❌ ' + result.error;
                status.style.color = 'var(--color-danger)';
                return;
            }
            // 填入 visit 表單；referrer / labs 從 extra 抽出
            if (result.order != null) document.getElementById('v-order').value = result.order;
            document.getElementById('v-record-number').value = result.recordNumber;
            document.getElementById('v-surname').value = result.surname;
            document.getElementById('v-age-sex').value = result.ageSex;

            const refDetected = extractReferrer(result.extra);
            const labStuff = extractLabs(result.extra);
            // 把 eGFR 與 labs 整合；如果 labStuff.labs 已含 INR 則不重複加
            const labLines = [];
            if (result.eGFR) labLines.push(`eGFR ${result.eGFR}`);
            if (labStuff.labs) labLines.push(labStuff.labs);
            if (result.INR && !/INR/i.test(labStuff.labs || '')) {
                labLines.push(`INR ${result.INR}${result.INRDate ? ` (${result.INRDate})` : ''}`);
            }
            const labsCombined = labLines.join('\n');

            document.getElementById('v-referrer').value = refDetected;
            document.getElementById('v-labs').value = labsCombined;
            // extra 剩餘部分（去掉抽出的 lab/referrer）
            let extraRemaining = labStuff.remaining;
            if (refDetected) {
                extraRemaining = extraRemaining.replace(new RegExp(`(^|[\\s/、,，])${refDetected}([\\s/、,，]|$)`, 'g'), ' ').trim();
            }
            document.getElementById('v-extra').value = extraRemaining;
            document.getElementById('v-exam').value = result.exam;
            document.getElementById('v-plan').value = result.plan;
            // tags 合併
            (result.tags || []).forEach(t => {
                if (DEFAULT_TAGS.includes(t) && !state.visitTagsTemp.includes(t)) state.visitTagsTemp.push(t);
            });
            renderVisitTagPicker(state.visitTagsTemp);

            status.textContent = `✅ 已解析（${result.mode === 'tab' ? 'Tab 分隔' : '換行分隔'}，${result.partsCount} 欄）`;
            status.style.color = 'var(--color-confirmed)';
        });

        document.getElementById('visit-paste-input').addEventListener('paste', () => {
            setTimeout(() => {
                const txt = document.getElementById('visit-paste-input').value;
                const lc = txt.split(/\r?\n/).filter(l => l.trim()).length;
                if (txt.includes('\t') || lc >= 4) {
                    document.getElementById('visit-paste-parse-btn').click();
                }
            }, 50);
        });
    }

    function navigateClinicDate(delta) {
        // delta=1 上一個（較舊），-1 下一個（較新）。跨年自動跳。
        const all = state._allDates || [];
        if (!all.length) return;
        const idx = all.findIndex(d => d.date === state.currentClinicDate);
        const newIdx = idx + delta;
        if (newIdx < 0 || newIdx >= all.length) return;
        state.currentClinicDate = all[newIdx].date;
        localStorage.setItem('opd:currentClinicDate', state.currentClinicDate);
        renderClinicDateSelector();
        onClinicDateChanged(state.currentClinicDate);
        updateClinicDateMeta();
    }

    // ========== 病人主表狀態 ==========
    const state = {
        patients: {},          // {recordNumber: patientObj}
        editingRecordNumber: null,
        currentTags: [],       // tag editor working state
        confirmCallback: null  // confirm modal callback
    };

    // ========== 病人主表 Firebase ==========
    function loadPatients() {
        if (!db) return;
        setStatus('saving', '載入中...');
        db.ref('opd/patients').on('value', (snap) => {
            state.patients = snap.val() || {};
            renderPatientMaster();
            setStatus('connected', '已連線');
        }, (err) => {
            console.error('讀取病人資料失敗:', err);
            setStatus('', '連線失敗');
            alert('讀取病人資料失敗：' + err.message + '\n\n如顯示權限不足，請確認 Firebase Realtime Database rules 已設定 opd 路徑允許你的 UID。');
        });
    }

    async function savePatient(patient) {
        const ref = db.ref('opd/patients/' + patient.recordNumber);
        const now = Date.now();
        const data = {
            ...patient,
            updatedAt: now,
            createdAt: state.patients[patient.recordNumber]?.createdAt || now
        };
        setStatus('saving', '儲存中...');
        await ref.set(data);
        setStatus('connected', '已儲存');
    }

    async function deletePatient(recordNumber) {
        setStatus('saving', '刪除中...');
        await db.ref('opd/patients/' + recordNumber).remove();
        setStatus('connected', '已刪除');
    }

    // ========== 病人主表 UI ==========
    function renderPatientMaster() {
        const list = document.getElementById('patient-master-list');
        const countEl = document.getElementById('patient-count');
        const searchVal = document.getElementById('patient-search-input').value.trim().toLowerCase();

        const allPatients = Object.values(state.patients);
        const filtered = searchVal
            ? allPatients.filter(p =>
                (p.recordNumber || '').toLowerCase().includes(searchVal) ||
                (p.surname || '').toLowerCase().includes(searchVal))
            : allPatients;

        // 排序：依病歷號
        filtered.sort((a, b) => (a.recordNumber || '').localeCompare(b.recordNumber || ''));

        countEl.textContent = `共 ${allPatients.length} 位${searchVal ? `（顯示 ${filtered.length}）` : ''}`;

        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-hint">${allPatients.length === 0 ? '尚無病人資料，點「+ 新增病人」開始建立' : '查無相符結果'}</div>`;
            return;
        }

        list.innerHTML = filtered.map(p => {
            const tags = (p.tags || []).map(t => `<span class="pt-tag">${escapeHtml(t)}</span>`).join('');
            const inrPart = p.INR ? ` ・ INR: ${escapeHtml(p.INR)}${p.INRDate ? ` (${escapeHtml(p.INRDate)})` : ''}` : '';
            const egfrPart = p.eGFR ? ` ・ eGFR: ${escapeHtml(p.eGFR)}` : '';
            const extraPart = p.extra ? `<div class="pt-line2" style="margin-top: 4px;">${escapeHtml(p.extra)}</div>` : '';
            return `
                <div class="pt-card" data-record="${escapeAttr(p.recordNumber)}">
                    <div class="pt-info">
                        <div class="pt-line1">
                            ${escapeHtml(p.recordNumber)}${p.surname ? ` (${escapeHtml(p.surname)})` : ''}
                            <span class="pt-tags">${tags}</span>
                        </div>
                        <div class="pt-line2">${escapeHtml(p.ageSex || '')}${egfrPart}${inrPart}</div>
                        ${extraPart}
                    </div>
                    <div class="pt-actions">
                        <button data-action="edit" data-record="${escapeAttr(p.recordNumber)}">編輯</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) {
        return String(s ?? '').replace(/"/g, '&quot;');
    }

    // ========== 病人 Modal ==========
    function openPatientModal(recordNumber) {
        const isEdit = !!recordNumber;
        const p = isEdit ? (state.patients[recordNumber] || {}) : {};
        state.editingRecordNumber = isEdit ? recordNumber : null;

        document.getElementById('patient-modal-title').textContent = isEdit ? '編輯病人' : '新增病人';
        document.getElementById('pt-record-number').value = p.recordNumber || '';
        document.getElementById('pt-record-number').disabled = isEdit;  // 編輯時不能改病歷號（PK）
        document.getElementById('pt-surname').value = p.surname || '';
        document.getElementById('pt-age-sex').value = p.ageSex || '';
        document.getElementById('pt-egfr').value = p.eGFR || '';
        document.getElementById('pt-inr').value = p.INR || '';
        document.getElementById('pt-inr-date').value = p.INRDate || '';
        document.getElementById('pt-extra').value = p.extra || '';

        state.currentTags = [...(p.tags || [])];
        renderTagEditor();

        document.getElementById('pt-modal-delete').style.display = isEdit ? 'inline-block' : 'none';
        document.getElementById('patient-modal').classList.add('show');
        if (!isEdit) document.getElementById('pt-record-number').focus();
    }

    function closePatientModal() {
        document.getElementById('patient-modal').classList.remove('show');
        state.editingRecordNumber = null;
        state.currentTags = [];
        document.getElementById('pt-paste-input').value = '';
        document.getElementById('pt-paste-status').textContent = '';
    }

    // 從 docx 整列貼上解析
    // 支援兩種格式：
    //  1. Tab 分隔單列（從表格複製）：序號\t病歷號(姓)\t年齡\teGFR\t...
    //  2. 換行分隔多行（每欄一行）：每行一個欄位
    function parsePastedRow(raw) {
        if (!raw || !raw.trim()) {
            return { ok: false, error: '請先貼上資料' };
        }

        const hasTabs = raw.includes('\t');
        if (hasTabs) {
            return parseTabSeparated(raw);
        } else {
            return parseLineBased(raw);
        }
    }

    const RECORD_PATTERN = /^\s*([A-Za-z]?\d{5,8})\s*(?:\(([^)]+)\))?\s*$/;
    const PLAN_DATE_PATTERN = /^\s*[\*\-]?\s*(\d{1,2}\/\d{1,2}|\d{2}\/\d{1,2}\/\d{1,2})\b/;
    const EGFR_PATTERN = /^\s*[><=]?\s*\d+(\.\d+)?\s*$/;
    const TAG_LABELS = ['NB', '鬆', 'f/u'];

    function isValidEGFR(val) { return EGFR_PATTERN.test(val || ''); }

    function extractINR(text) {
        const m = (text || '').match(/INR:\s*([\d.]+)\s*(?:\(([^)]+)\))?/i);
        if (!m) return { INR: '', INRDate: '' };
        return { INR: m[1], INRDate: (m[2] || '').trim() };
    }

    // 從 extra 偵測常見來源關鍵字（Buo/Hsu/Huang/web 等短詞）
    const REFERRER_KEYWORDS = ['Buo', 'Hsu', 'Huang', 'Yen', 'Lin', 'Chen', 'Wang', 'Wu', 'web', 'Web', 'WEB'];
    function extractReferrer(text) {
        if (!text) return '';
        for (const kw of REFERRER_KEYWORDS) {
            const re = new RegExp(`(^|[\\s/、,，])${kw}([\\s/、,，]|$)`);
            if (re.test(text)) return kw;
        }
        return '';
    }

    // 從 extra 抽出常見 lab 行（含 INR、Ca、T-Score、TBS、eGFR 等）
    const LAB_PATTERNS = [
        /INR:?\s*[\d.]+(?:\s*\([^)]+\))?/i,
        /Ca:?\s*[\d.]+(?:\s*\([^)]+\))?/i,
        /T[-\s]?(?:Score)?:?\s*-?[\d.]+(?:\s*\([^)]+\))?/i,
        /TBS:?\s*[\d.]+/i,
        /eGFR:?\s*[><=]*\s*[\d.]+/i,
        /Cr:?\s*[\d.]+/i,
        /Hip\s*fr:?\s*[\d.]+%?/i,
        /[Mm]ajor:?\s*[\d.]+%?/i
    ];
    function extractLabs(text) {
        if (!text) return { labs: '', remaining: '' };
        const found = [];
        let remaining = text;
        for (const re of LAB_PATTERNS) {
            const m = text.match(re);
            if (m) {
                found.push(m[0]);
                remaining = remaining.replace(m[0], '').trim();
            }
        }
        // 清理 remaining 多餘 / 與空白
        remaining = remaining.replace(/\s*\/\s*/g, ' / ').replace(/\s*\/\s*\/\s*/g, ' / ').replace(/^\s*\/\s*|\s*\/\s*$/g, '').trim();
        return { labs: found.join(' / '), remaining };
    }

    // Tab 分隔解析（單列、cell 內可能含換行）
    function parseTabSeparated(raw) {
        const parts = raw.split('\t').map(s => s.trim());
        if (parts.length < 4) {
            return { ok: false, error: `Tab 欄位過少（只 ${parts.length} 欄）` };
        }

        let recIdx = -1;
        for (let i = 0; i < Math.min(parts.length, 3); i++) {
            if (RECORD_PATTERN.test(parts[i])) { recIdx = i; break; }
        }
        if (recIdx === -1) {
            return { ok: false, error: '前 3 欄找不到病歷號 (姓) 格式' };
        }

        const recMatch = parts[recIdx].match(RECORD_PATTERN);

        const tags = [];
        const tagStartIdx = parts.length - 3;
        if (tagStartIdx >= recIdx + 3) {
            for (let i = 0; i < 3; i++) {
                const v = (parts[tagStartIdx + i] || '').trim();
                if (v && v !== '-' && v !== '─') tags.push(TAG_LABELS[i]);
            }
        }

        // 序號：recIdx 之前若有純數字格，取為 orderInClinic
        let order = null;
        for (let i = 0; i < recIdx; i++) {
            const m = parts[i].match(/^\s*(\d+)\s*$/);
            if (m) { order = parseInt(m[1]); break; }
        }

        // 偵測 eGFR 欄位 shift：若 parts[recIdx+2] 不像 eGFR（沒有 >60 / 60 等格式），
        // 表示原 docx eGFR 欄為空被 Word 省略，後續欄位整體前移 1
        const c2 = (parts[recIdx + 2] || '').trim();
        let eGFRVal, extraIdx, examIdx, planIdx;
        if (isValidEGFR(c2) || !c2) {
            eGFRVal = c2;
            extraIdx = recIdx + 3;
            examIdx = recIdx + 4;
            planIdx = recIdx + 5;
        } else {
            eGFRVal = '';
            extraIdx = recIdx + 2;
            examIdx = recIdx + 3;
            planIdx = recIdx + 4;
        }
        const extraVal = (parts[extraIdx] || '').replace(/\n+/g, ' / ');
        const inr2 = extractINR(extraVal);

        return {
            ok: true,
            mode: 'tab',
            order,
            recordNumber: recMatch[1],
            surname: (recMatch[2] || '').trim().replace(/\s+/g, ''),
            ageSex: parts[recIdx + 1] || '',
            eGFR: eGFRVal,
            extra: extraVal,
            ...inr2,
            tags,
            exam: parts[examIdx] || '',
            plan: parts[planIdx] || '',
            partsCount: parts.length
        };
    }

    // 換行分隔解析（每行一個欄位；多行 cell 視為連續多個欄位）
    function parseLineBased(raw) {
        const lines = raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
        if (lines.length < 4) {
            return { ok: false, error: `行數過少（只 ${lines.length} 行）` };
        }

        // 找病歷號行（前 5 行掃描）
        let recIdx = -1;
        for (let i = 0; i < Math.min(lines.length, 5); i++) {
            if (RECORD_PATTERN.test(lines[i])) { recIdx = i; break; }
        }
        if (recIdx === -1) {
            return { ok: false, error: '前 5 行找不到病歷號 (姓) 格式' };
        }

        const recMatch = lines[recIdx].match(RECORD_PATTERN);
        const ageSex = lines[recIdx + 1] || '';
        const eGFR = lines[recIdx + 2] || '';

        // 從 recIdx+3 起，收集 extra 直到偵測到 Exam-like 或 Plan-like 行
        // 簡化：偵測到 Plan-like 行（日期開頭）就停
        const extraLines = [];
        let i = recIdx + 3;
        let examLine = '';
        while (i < lines.length) {
            const line = lines[i];
            // 偵測到 Plan-like（日期開頭）就停
            if (PLAN_DATE_PATTERN.test(line)) break;
            // 偵測到「Exam-like」啟示語（如「L spine」、「R 」、解剖描述）— 比較難準確
            // 簡化：把目前累積的 extraLines 與此行比較長度，若此行為描述句（沒冒號或無數字），視為 Exam
            const looksLikeExam = !/[:：]/.test(line) && !/^\d+\.\d+/.test(line) && /[A-Za-z]/.test(line) && line.length > 12;
            if (looksLikeExam && extraLines.length >= 1) {
                examLine = line;
                i++;
                break;
            }
            extraLines.push(line);
            i++;
        }

        // 剩餘行（含 Exam 後）= Plan
        const planLines = lines.slice(i).filter(Boolean);
        const extra = extraLines.join(' / ');
        const inr = extractINR(extra);

        // 序號：recIdx 之前的純數字行取為 order
        let order = null;
        for (let i = 0; i < recIdx; i++) {
            const m = lines[i].match(/^\s*(\d+)\s*$/);
            if (m) { order = parseInt(m[1]); break; }
        }

        return {
            ok: true,
            mode: 'line',
            order,
            recordNumber: recMatch[1],
            surname: (recMatch[2] || '').trim().replace(/\s+/g, ''),
            ageSex,
            eGFR,
            extra,
            ...inr,
            tags: [],
            exam: examLine,
            plan: planLines.join('\n'),
            partsCount: lines.length
        };
    }

    function applyParsedToForm(parsed) {
        document.getElementById('pt-record-number').value = parsed.recordNumber;
        document.getElementById('pt-surname').value = parsed.surname;
        document.getElementById('pt-age-sex').value = parsed.ageSex;
        document.getElementById('pt-egfr').value = parsed.eGFR;
        document.getElementById('pt-inr').value = parsed.INR;
        document.getElementById('pt-inr-date').value = parsed.INRDate;
        document.getElementById('pt-extra').value = parsed.extra;
        // tags 合併（不覆蓋既有）
        parsed.tags.forEach(t => {
            if (!state.currentTags.includes(t)) state.currentTags.push(t);
        });
        renderTagEditor();
    }

    function renderTagEditor() {
        const editor = document.getElementById('pt-tag-editor');
        const input = document.getElementById('pt-tag-input');
        // 移除既有 pill，保留 input
        editor.querySelectorAll('.tag-pill').forEach(el => el.remove());
        state.currentTags.forEach((tag, idx) => {
            const pill = document.createElement('span');
            pill.className = 'tag-pill';
            pill.innerHTML = `${escapeHtml(tag)} <span class="remove" data-idx="${idx}">✕</span>`;
            editor.insertBefore(pill, input);
        });
    }

    async function handlePatientSave() {
        const recordNumber = document.getElementById('pt-record-number').value.trim();
        if (!recordNumber) {
            alert('請輸入病歷號');
            return;
        }

        const patient = {
            recordNumber,
            surname: document.getElementById('pt-surname').value.trim(),
            ageSex: document.getElementById('pt-age-sex').value.trim(),
            eGFR: document.getElementById('pt-egfr').value.trim(),
            INR: document.getElementById('pt-inr').value.trim(),
            INRDate: document.getElementById('pt-inr-date').value.trim(),
            extra: document.getElementById('pt-extra').value.trim(),
            tags: [...state.currentTags]
        };

        // 新增時若病歷號已存在 → 提示
        if (!state.editingRecordNumber && state.patients[recordNumber]) {
            if (!confirm(`病歷號 ${recordNumber} 已存在，是否覆蓋？`)) return;
        }

        try {
            await savePatient(patient);
            closePatientModal();
        } catch (err) {
            alert('儲存失敗：' + err.message);
        }
    }

    function handlePatientDelete() {
        if (!state.editingRecordNumber) return;
        const rec = state.editingRecordNumber;
        const surname = state.patients[rec]?.surname || '';
        showConfirm(`刪除病人 ${rec}${surname ? ` (${surname})` : ''}？`, '此操作無法復原。', async () => {
            try {
                await deletePatient(rec);
                closePatientModal();
            } catch (err) {
                alert('刪除失敗：' + err.message);
            }
        });
    }

    // ========== 通用確認對話框 ==========
    function showConfirm(title, message, onConfirm) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        state.confirmCallback = onConfirm;
        document.getElementById('confirm-modal').classList.add('show');
    }

    // ========== 綁定 UI ==========
    function bindPatientUI() {
        if (state.uiBound) return;
        state.uiBound = true;

        // 新增按鈕
        document.getElementById('add-patient-master-btn').addEventListener('click', () => openPatientModal());

        // docx 整列貼上自動解析
        document.getElementById('pt-paste-parse-btn').addEventListener('click', () => {
            const raw = document.getElementById('pt-paste-input').value;
            const status = document.getElementById('pt-paste-status');
            const result = parsePastedRow(raw);
            if (!result.ok) {
                status.textContent = '❌ ' + result.error;
                status.style.color = 'var(--color-danger)';
                return;
            }
            applyParsedToForm(result);
            const modeLabel = result.mode === 'tab' ? 'Tab 分隔' : '換行分隔';
            const examPart = result.exam ? `；偵測到 Exam（暫存待 visit 模組）` : '';
            const planPart = result.plan ? `；Plan ${result.plan.split('\n').length} 行（暫存待 visit 模組）` : '';
            status.textContent = `✅ 已解析（${modeLabel}，${result.partsCount} 欄）並填入${result.tags.length ? `；標籤：${result.tags.join(', ')}` : ''}${examPart}${planPart}`;
            status.style.color = 'var(--color-confirmed)';
        });

        // 貼上後若內容含 tab 或多行（>= 4 行）自動觸發解析
        document.getElementById('pt-paste-input').addEventListener('paste', (e) => {
            setTimeout(() => {
                const txt = document.getElementById('pt-paste-input').value;
                const lineCount = txt.split(/\r?\n/).filter(l => l.trim()).length;
                if (txt.includes('\t') || lineCount >= 4) {
                    document.getElementById('pt-paste-parse-btn').click();
                }
            }, 50);
        });

        // 搜尋
        document.getElementById('patient-search-input').addEventListener('input', () => renderPatientMaster());

        // 病人卡片點擊（編輯）
        document.getElementById('patient-master-list').addEventListener('click', (e) => {
            const editBtn = e.target.closest('button[data-action="edit"]');
            if (editBtn) {
                openPatientModal(editBtn.dataset.record);
            }
        });

        // Modal 按鈕
        document.getElementById('pt-modal-cancel').addEventListener('click', closePatientModal);
        document.getElementById('pt-modal-save').addEventListener('click', handlePatientSave);
        document.getElementById('pt-modal-delete').addEventListener('click', handlePatientDelete);
        document.getElementById('patient-modal').addEventListener('click', (e) => {
            if (e.target.id === 'patient-modal') closePatientModal();
        });

        // Tag editor
        const tagInput = document.getElementById('pt-tag-input');
        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInput.value.trim();
                if (val && !state.currentTags.includes(val)) {
                    state.currentTags.push(val);
                    renderTagEditor();
                }
                tagInput.value = '';
            } else if (e.key === 'Backspace' && !tagInput.value && state.currentTags.length > 0) {
                state.currentTags.pop();
                renderTagEditor();
            }
        });
        document.getElementById('pt-tag-editor').addEventListener('click', (e) => {
            const removeBtn = e.target.closest('.remove');
            if (removeBtn) {
                const idx = parseInt(removeBtn.dataset.idx);
                state.currentTags.splice(idx, 1);
                renderTagEditor();
            }
        });

        // Confirm modal
        document.getElementById('confirm-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.remove('show');
            state.confirmCallback = null;
        });
        document.getElementById('confirm-ok').addEventListener('click', () => {
            const cb = state.confirmCallback;
            document.getElementById('confirm-modal').classList.remove('show');
            state.confirmCallback = null;
            if (cb) cb();
        });
        document.getElementById('confirm-modal').addEventListener('click', (e) => {
            if (e.target.id === 'confirm-modal') {
                document.getElementById('confirm-modal').classList.remove('show');
                state.confirmCallback = null;
            }
        });

        // ESC 關閉 modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('patient-modal').classList.contains('show')) closePatientModal();
                if (document.getElementById('confirm-modal').classList.contains('show')) {
                    document.getElementById('confirm-modal').classList.remove('show');
                    state.confirmCallback = null;
                }
            }
        });
    }
</script>
</body>

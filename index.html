    // ===== Tips 分類渲染 =====
    // 把 tips 分三段:原本 SOP / 📷 不良片(自動分類) / 🎓 教學摘要
    const BAD_FILM_CATEGORIES = [
      { key: 'arti',  label: '異物 / 假影',     re: /異物|項鍊|衣服|頭髮|金屬|佛祖|玉珠|artifact|necklace/i },
      { key: 'cut',   label: '範圍不全 / 切到',  re: /\bcut\b|切|範圍|包含|不全|未包|肋膈角/i },
      { key: 'pose',  label: '定位 / 旋轉',     re: /定位|旋轉|反轉|角度|對位|歪|斜|聳肩|過低|過高|pose|flip|rotate|positioning|centering|improper/i },
      { key: 'blur',  label: '模糊 / 動態',     re: /模糊|動度|呼吸|閉氣|吸飽|motion|blur/i },
      { key: 'order', label: '醫令 / 流程',     reorder: /醫囑|醫令|protocol|order|key 資料|報告|送出|上傳/i },
    ];

    function classifyBadFilm(line) {
      for (const cat of BAD_FILM_CATEGORIES) {
        if ((cat.re || cat.reorder) && (cat.re ? cat.re.test(line) : cat.reorder.test(line))) return cat.key;
      }
      return 'other';
    }

    // 拆 tips 為「本院 SOP」與「會議紀錄(📷/🎓)」
    function splitTips(tips) {
      const sop = [], bf = [], tc = [];
      for (const t of tips || []) {
        if (t.startsWith('📷')) bf.push(t);
        else if (t.startsWith('🎓')) tc.push(t);
        else sop.push(t);
      }
      return { sop, bf, tc };
    }

    // 從 view tip 字串反推 meetings 內的 bf 物件(對齊 bf.id 用於 bad_film_images)
    function findBadFilmFromTip(tipText) {
      const m = tipText.match(/^📷[\s✏]*\((\d{4}-\d{2})\s+不良片(?:\s+參考)?\)\s*[—–-]\s*(.+?)(?:\s*[—–-]|$)/);
      if (!m) return null;
      const [, mid, exam] = m;
      const examTrim = exam.trim();
      return meetingsStore.flatItems().find(it =>
        it.type === 'bf' && it.meeting === mid && (it.title === examTrim || (it.raw.exam_name || '') === examTrim)
      );
    }

    // 不良片圖片 store(快取 bad_film_images Firestore collection)
    const badFilmImagesStore = {
      _cache: {},
      _loaded: false,
      _loadingPromise: null,
      async loadAll() {
        if (this._loaded) return this._cache;
        if (this._loadingPromise) return this._loadingPromise;
        this._loadingPromise = (async () => {
          try {
            const snap = await getDocs(collection(db, 'bad_film_images'));
            snap.forEach(d => { this._cache[d.id] = d.data(); });
            this._loaded = true;
          } catch (e) { console.warn('[badFilmImages] 載入失敗', e); }
          return this._cache;
        })();
        return this._loadingPromise;
      },
      get(bfId) { return this._cache[bfId] || null; },
      async set(bfId, data) {
        const merged = { ...(this._cache[bfId] || {}), ...data };
        this._cache[bfId] = merged;
        await setDoc(doc(db, 'bad_film_images', bfId), merged);
      },
      async remove(bfId) {
        delete this._cache[bfId];
        await deleteDoc(doc(db, 'bad_film_images', bfId));
      },
    };

    // Tips section(琥珀,只放本院 SOP)
    function renderTipsSection(tips) {
      const { sop } = splitTips(tips);
      if (!sop.length) return '';
      return `
        <section class="mt-6 p-4 rounded-lg bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50">
          <h2 class="text-lg sm:text-xl font-bold text-amber-700 dark:text-amber-400 uppercase tracking-wider">Tips <span class="text-amber-500/70 font-normal text-sm">提示</span></h2>
          <ol class="mt-2 space-y-1 text-amber-900 dark:text-amber-100 list-decimal list-outside pl-6 text-sm leading-relaxed">
            ${sop.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
          </ol>
        </section>
      `;
    }

    // 渲染單條 bf tip → 條目 + 📷 按鈕(只在「有圖」時顯示;上傳走編輯擺位頁)
    function renderBfItem(tipText) {
      const text = escapeHtml(tipText.replace(/^📷[\s✏]*/, ''));
      const bf = findBadFilmFromTip(tipText);
      let camBtn = '';
      if (bf && bf.raw && bf.raw.id) {
        const img = badFilmImagesStore.get(bf.raw.id);
        if (img && img.url) {
          camBtn = `<button type="button" class="bf-cam-btn ml-1 inline-flex items-center justify-center align-middle text-rose-500 hover:text-rose-700 dark:text-rose-400 dark:hover:text-rose-200 transition" data-bf-id="${escapeHtml(bf.raw.id)}" title="點此看不良片影像" aria-label="看不良片影像">📷</button>`;
        }
      }
      return `<li>${text}${camBtn}</li>`;
    }

    function renderTcItem(tipText) {
      return `<li>${escapeHtml(tipText.replace(/^🎓\s*/, ''))}</li>`;
    }

    // 會議紀錄補充 section(灰,獨立,字略小,自適應密度)
    function renderMeetingExtractsSection(tips) {
      const { bf, tc } = splitTips(tips);
      if (!bf.length && !tc.length) return '';
      const total = bf.length + tc.length;

      const wrapStart = `<section class="mt-6 p-4 rounded-lg bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700">`;
      const wrapEnd = `</section>`;

      // ── 稀疏(1-3 條,單一類型)→ 標題合併,扁平,預設收合 ──────────────────────
      if (total <= 3 && (!bf.length || !tc.length)) {
        if (bf.length) {
          return `${wrapStart}
            <details class="group">
              <summary class="cursor-pointer select-none text-sm font-semibold text-slate-500 dark:text-slate-400 list-none flex items-center gap-1.5">
                <span class="group-open:rotate-90 transition inline-block text-xs">▶</span>
                📋 會議紀錄補充 · <span class="text-rose-600/80 dark:text-rose-400/80">📷 歷年不良片案例</span> <span class="text-slate-400 font-normal text-xs">(${bf.length})</span>
              </summary>
              <ul class="mt-2 ml-4 space-y-0.5 text-xs text-slate-600 dark:text-slate-300 list-disc pl-5 leading-relaxed">
                ${bf.map(renderBfItem).join('')}
              </ul>
            </details>
          ${wrapEnd}`;
        }
        if (tc.length) {
          return `${wrapStart}
            <details class="group">
              <summary class="cursor-pointer select-none text-sm font-semibold text-slate-500 dark:text-slate-400 list-none flex items-center gap-1.5">
                <span class="group-open:rotate-90 transition inline-block text-xs">▶</span>
                📋 會議紀錄補充 · <span class="text-emerald-600/80 dark:text-emerald-400/80">🎓 會議教學重點</span> <span class="text-slate-400 font-normal text-xs">(${tc.length})</span>
              </summary>
              <ul class="mt-2 ml-4 space-y-0.5 text-xs text-slate-600 dark:text-slate-300 list-disc pl-5 leading-relaxed">
                ${tc.map(renderTcItem).join('')}
              </ul>
            </details>
          ${wrapEnd}`;
        }
      }

      // ── 中等 / 密集:外層 details 包,預設收合 ──────────────────────────
      let html = `${wrapStart}
        <details class="group">
          <summary class="cursor-pointer select-none text-sm font-semibold text-slate-500 dark:text-slate-400 tracking-wide list-none flex items-center gap-1.5">
            <span class="group-open:rotate-90 transition inline-block text-xs">▶</span>
            📋 <span>會議紀錄補充</span>
            <span class="text-xs font-normal text-slate-400">(${total})</span>
          </summary>
          <div class="mt-2">
      `;

      if (bf.length) {
        // 密集(≥ 11)才用 6 類分群;中等(4-10)直接扁平
        if (bf.length >= 11) {
          const bfGroups = {};
          for (const t of bf) {
            const k = classifyBadFilm(t);
            (bfGroups[k] = bfGroups[k] || []).push(t);
          }
          const orderKeys = ['arti', 'cut', 'pose', 'blur', 'order', 'other'];
          const groupLabel = {
            arti: '異物 / 假影', cut: '範圍不全 / 切到', pose: '定位 / 旋轉',
            blur: '模糊 / 動態', order: '醫令 / 流程', other: '其他',
          };
          html += `
            <details class="mt-3 group" open>
              <summary class="cursor-pointer select-none text-xs font-medium text-rose-600/80 dark:text-rose-400/80 hover:text-rose-700 list-none flex items-center gap-1.5">
                <span class="group-open:rotate-90 transition inline-block">▶</span>
                📷 歷年不良片案例 <span class="text-rose-500/60">(${bf.length})</span>
              </summary>
              <div class="mt-2 ml-4 space-y-1.5">
          `;
          for (const k of orderKeys) {
            const items = bfGroups[k];
            if (!items || !items.length) continue;
            html += `
              <details class="group" ${items.length <= 5 ? 'open' : ''}>
                <summary class="cursor-pointer select-none text-xs text-slate-500 dark:text-slate-400 hover:text-rose-700 dark:hover:text-rose-300 list-none flex items-center gap-1">
                  <span class="group-open:rotate-90 transition inline-block">▶</span>
                  ${groupLabel[k]} <span class="text-slate-400">(${items.length})</span>
                </summary>
                <ul class="mt-1 ml-4 space-y-0.5 text-xs text-slate-600 dark:text-slate-300 list-disc pl-5 leading-relaxed">
                  ${items.map(renderBfItem).join('')}
                </ul>
              </details>
            `;
          }
          html += `</div></details>`;
        } else {
          // 中等 4-10:直接扁平
          html += `
            <details class="mt-3 group" open>
              <summary class="cursor-pointer select-none text-xs font-medium text-rose-600/80 dark:text-rose-400/80 hover:text-rose-700 list-none flex items-center gap-1.5">
                <span class="group-open:rotate-90 transition inline-block">▶</span>
                📷 歷年不良片案例 <span class="text-rose-500/60">(${bf.length})</span>
              </summary>
              <ul class="mt-2 ml-4 space-y-0.5 text-xs text-slate-600 dark:text-slate-300 list-disc pl-5 leading-relaxed">
                ${bf.map(renderBfItem).join('')}
              </ul>
            </details>
          `;
        }
      }

      if (tc.length) {
        html += `
          <details class="mt-3 group" ${tc.length <= 3 ? 'open' : ''}>
            <summary class="cursor-pointer select-none text-xs font-medium text-emerald-600/80 dark:text-emerald-400/80 hover:text-emerald-700 list-none flex items-center gap-1.5">
              <span class="group-open:rotate-90 transition inline-block">▶</span>
              🎓 會議教學重點 <span class="text-emerald-500/60">(${tc.length})</span>
            </summary>
            <ul class="mt-2 ml-4 space-y-0.5 text-xs text-slate-600 dark:text-slate-300 list-disc pl-5 leading-relaxed">
              ${tc.map(renderTcItem).join('')}
            </ul>
          </details>
        `;
      }

      html += `</div></details>` + wrapEnd;
      return html;
    }

    function imageBlock(src, labelZh, labelEn, caption = '') {
      // 真人擺位照不用黑底(避免水印 banner 跟容器底色合併變胖);X 光仍用黑底。
      const isPhoto = labelZh === '擺位照';
      const bgCls = isPhoto ? 'bg-slate-100 dark:bg-slate-900' : 'bg-black';
      if (src) {
        return `
          <figure class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 ${bgCls}">
            <img src="${escapeHtml(src)}" alt="${escapeHtml(labelZh)}"
                 class="w-full aspect-square object-contain cursor-zoom-in lightbox-trigger"
                 data-src="${escapeHtml(src)}">
            <figcaption class="text-center text-xs text-slate-500 py-2 bg-white dark:bg-slate-800">
              ${escapeHtml(labelZh)}
              ${caption ? `<div class="text-xs text-slate-700 dark:text-slate-300 mt-1 px-3 leading-relaxed text-left whitespace-pre-wrap">${escapeHtml(caption)}</div>` : ''}
            </figcaption>
          </figure>
        `;
      }
      return `
        <div class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700">
          <div class="aspect-square img-placeholder flex items-center justify-center text-slate-500 text-sm">(圖片待補)</div>
          <div class="text-center text-xs text-slate-500 py-2 bg-white dark:bg-slate-800">${escapeHtml(labelZh)}</div>
        </div>
      `;
    }

    // ===== Post-render(綁定事件) =====
    // ===== Typeahead 搜尋(下拉建議,任何頁可用) =====
    let _searchActiveIdx = -1;
    let _searchResults = [];

    function bindSearch() {
      const input = document.getElementById('search-input');
      const dropdown = document.getElementById('search-dropdown');
      const clearBtn = document.getElementById('search-clear');
      const wrap = document.getElementById('search-wrap');
      if (!input || !dropdown) return;

      const updateDropdown = debounce(async () => {
        const kw = input.value.trim();
        clearBtn.classList.toggle('hidden', !kw);

        // 列表頁:同時即時過濾下方卡片(若存在)
        const grid = document.getElementById('card-grid');
        if (grid) {
          const all = await dataStore.search(kw);
          grid.innerHTML = all.length
            ? all.map(cardHtml).join('')
            : emptyStateHtml('沒有符合搜尋條件的擺位。');
        }

        if (!kw) {
          closeDropdown();
          return;
        }
        const posResults = (await dataStore.search(kw)).slice(0, 6);
        // 也搜會議內容
        const kwLow = kw.toLowerCase();
        const mtgResults = meetingsStore.flatItems()
          .filter(it => it.text.toLowerCase().includes(kwLow) || (it.title || '').toLowerCase().includes(kwLow))
          .slice(0, 4);
        _searchResults = [
          ...posResults.map(p => ({ kind: 'pos', data: p })),
          ...mtgResults.map(m => ({ kind: 'mtg', data: m })),
        ];
        _searchActiveIdx = _searchResults.length ? 0 : -1;
        renderDropdown(kw);
      }, 100);

      function renderDropdown(kw) {
        if (!_searchResults.length) {
          dropdown.innerHTML = `<div class="px-4 py-3 text-sm text-slate-400">找不到符合「${escapeHtml(kw)}」的擺位</div>`;
          openDropdown();
          return;
        }
        const isLocked = !meetingGate.isUnlocked();
        dropdown.innerHTML = _searchResults.map((entry, i) => {
          const active = i === _searchActiveIdx;
          if (entry.kind === 'pos') {
            const p = entry.data;
            const cat = CATEGORIES.find(c => c.id === p.category);
            const catName = cat ? cat.name_zh.replace('擺位', '') : '';
            const thumb = (p.images && (p.images.xray_sample || p.images.positioning_photo)) || '';
            return `
              <a href="#/position/${p.id}" data-idx="${i}"
                 class="search-item flex items-center gap-3 px-3 py-2 border-b border-slate-100 dark:border-slate-700/50 last:border-0
                        ${active ? 'bg-brand-50 dark:bg-brand-700/30' : 'hover:bg-slate-50 dark:hover:bg-slate-700/40'}">
                <div class="w-10 h-10 rounded shrink-0 overflow-hidden ${thumb ? 'bg-black' : 'img-placeholder'}">
                  ${thumb ? `<img src="${escapeHtml(thumb)}" alt="" class="w-full h-full object-contain">` : ''}
                </div>
                <div class="min-w-0 flex-1">
                  <div class="flex items-baseline gap-2">
                    <span class="text-xs font-medium text-brand-600 dark:text-brand-400">📍 ${escapeHtml(p.body_part)}</span>
                    <span class="text-sm font-semibold text-slate-900 dark:text-white truncate">${highlight(p.name_zh, kw)}</span>
                  </div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 truncate">${highlight(p.name_en, kw)} · ${escapeHtml(catName)}</div>
                </div>
              </a>
            `;
          } else {
            const it = entry.data;
            const typeIcon = it.type === 'bf' ? '📷' : '🎓';
            const typeLabel = it.type === 'bf' ? '不良片' : '教學';
            const lockBadge = isLocked ? '<span class="text-xs">🔒</span>' : '';
            const preview = it.text.slice(0, 80);
            const focusId = it.raw.id || `${it.meeting}-${it.type}`;
            return `
              <a href="#/meetings" data-idx="${i}" data-mtg-focus="${escapeHtml(focusId)}"
                 class="search-item search-mtg flex items-center gap-3 px-3 py-2 border-b border-slate-100 dark:border-slate-700/50 last:border-0
                        ${active ? 'bg-brand-50 dark:bg-brand-700/30' : 'hover:bg-slate-50 dark:hover:bg-slate-700/40'}">
                <div class="w-10 h-10 rounded shrink-0 flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-lg">
                  ${typeIcon}
                </div>
                <div class="min-w-0 flex-1">
                  <div class="flex items-baseline gap-2">
                    <span class="text-xs font-medium text-amber-600 dark:text-amber-400">📋 ${escapeHtml(it.meeting)} ${typeLabel}</span>
                    <span class="text-sm font-semibold text-slate-900 dark:text-white truncate">${highlight(it.title, kw)}</span>
                    ${lockBadge}
                  </div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 truncate">${highlight(preview, kw)}</div>
                </div>
              </a>
            `;
          }
        }).join('');
        openDropdown();

        // 滑鼠 hover 同步高亮
        dropdown.querySelectorAll('.search-item').forEach(el => {
          el.addEventListener('mouseenter', () => {
            _searchActiveIdx = parseInt(el.dataset.idx, 10);
            updateActiveStyle();
          });
        });
        // 會議結果點擊:存 focusId,確保即使已在 #/meetings 也會 rerender 並滾動
        dropdown.querySelectorAll('.search-mtg').forEach(el => {
          el.addEventListener('click', (e) => {
            const fid = el.dataset.mtgFocus;
            if (fid) sessionStorage.setItem('mtg_focus', fid);
            // 若已在 #/meetings,點 href 不會 hashchange,要強制 rerender
            if (location.hash === '#/meetings') {
              e.preventDefault();
              router.handle();
              closeDropdown();
            }
          });
        });
      }

      function updateActiveStyle() {
        dropdown.querySelectorAll('.search-item').forEach((el, i) => {
          el.classList.toggle('bg-brand-50', i === _searchActiveIdx);
          el.classList.toggle('dark:bg-brand-700/30', i === _searchActiveIdx);
        });
        const active = dropdown.querySelector(`.search-item[data-idx="${_searchActiveIdx}"]`);
        if (active) active.scrollIntoView({ block: 'nearest' });
      }

      function openDropdown() {
        dropdown.hidden = false;
        input.setAttribute('aria-expanded', 'true');
      }
      function closeDropdown() {
        dropdown.hidden = true;
        input.setAttribute('aria-expanded', 'false');
        _searchActiveIdx = -1;
        _searchResults = [];
      }

      input.addEventListener('input', updateDropdown);
      input.addEventListener('focus', () => {
        if (input.value.trim()) updateDropdown();
      });

      // 鍵盤導航
      input.addEventListener('keydown', (e) => {
        if (dropdown.hidden || !_searchResults.length) {
          if (e.key === 'Enter' && _searchResults.length === 0 && input.value.trim()) {
            // 純 enter 時也跳結果(若有的話) — 此分支為 noop fallback
          }
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          _searchActiveIdx = (_searchActiveIdx + 1) % _searchResults.length;
          updateActiveStyle();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          _searchActiveIdx = (_searchActiveIdx - 1 + _searchResults.length) % _searchResults.length;
          updateActiveStyle();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const pick = _searchResults[_searchActiveIdx] || _searchResults[0];
          if (pick) {
            closeDropdown();
            input.blur();
            router.go(`/position/${pick.id}`);
          }
        } else if (e.key === 'Escape') {
          closeDropdown();
          input.blur();
        }
      });

      // 點擊外面關閉
      document.addEventListener('click', (e) => {
        if (!wrap.contains(e.target)) closeDropdown();
      });

      // 清除按鈕
      if (clearBtn) clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        closeDropdown();
        // 同步重置卡片過濾
        const grid = document.getElementById('card-grid');
        if (grid) router.handle();
        input.focus();
      });
    }

    function highlight(text, kw) {
      if (!kw) return escapeHtml(text);
      const safe = escapeHtml(text);
      const safeKw = escapeHtml(kw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(`(${safeKw})`, 'gi'),
        '<mark class="bg-amber-200 dark:bg-amber-500/40 text-inherit rounded px-0.5">$1</mark>');
    }

    // ===== Tag 自動產生(對應 pipeline 的 make_tags 邏輯) =====
    const BODY_PART_ZH = {
      'SKULL': '頭顱', 'C-SPINE': '頸椎', 'T-SPINE': '胸椎', 'L-SPINE': '腰椎',
      'CHEST': '胸部', 'SHOULDER': '肩關節', 'ABDOMEN': '腹部', 'PELVIS': '骨盆腔',
      'HIP': '髖關節', 'KNEE': '膝關節', 'ANKLE': '踝關節', 'FOOT': '足部',
      'ELBOW': '肘關節', 'WRIST': '腕關節', 'HAND': '手部', 'HUMERUS': '肱骨',
      'FEMUR': '股骨', 'TIBIA': '脛骨', 'MANDIBLE': '下頷骨', 'TMJ': '顳顎關節',
      'SINUS': '副鼻竇', 'FACIAL': '顏面骨', 'FACIAL BONE': '顏面骨', 'NASAL': '鼻骨'
    };
    const VIEW_ZH = [
      ['AP', '前後位'], ['PA', '後前位'], ['LATERAL', '側位'],
      ['OBLIQUE', '斜位'], ['FLEXION', '前屈位'], ['EXTENSION', '後伸位'],
      ['OPEN MOUTH', '張口位'], ["WATER'S", "Water's"], ['TANGENTIAL', '切線位']
    ];

    function autoGenerateTags(bodyPart, nameEn, category) {
      const set = new Set();
      const bp = (bodyPart || '').toUpperCase().trim();
      if (bp) {
        set.add(bp);
        if (BODY_PART_ZH[bp]) set.add(BODY_PART_ZH[bp]);
      }
      const en = (nameEn || '').toUpperCase();
      VIEW_ZH.forEach(([k, z]) => {
        if (en.includes(k)) { set.add(k); set.add(z); }
      });
      const cat = CATEGORIES.find(c => c.id === category);
      if (cat) set.add(cat.name_zh.replace('擺位', ''));
      return [...set];
    }

    // ===== 管理模式互動(預覽,不實際儲存) =====
    function bindAdmin() {
      // 登入 / 登出(全域 banner 按鈕)
      const signInBtn = document.getElementById('auth-signin-btn');
      if (signInBtn) signInBtn.addEventListener('click', () => authStore.signIn());
      const signOutBtn = document.getElementById('auth-signout-btn');
      if (signOutBtn) signOutBtn.addEventListener('click', () => authStore.signOut());

      // 管理員管理頁:新增
      const addAdminBtn = document.getElementById('add-admin-btn');
      if (addAdminBtn) addAdminBtn.addEventListener('click', async () => {
        const email = prompt('輸入新管理員的 Google 帳號(email):');
        if (!email) return;
        const name = prompt('暱稱(可空):', email.split('@')[0]) || '';
        try {
          await authStore.addAdmin(email, name);
          toast(`已新增 ${email}`);
          router.handle();
        } catch (e) {
          toast(`新增失敗:${e.message}`);
        }
      });

      // 管理員管理頁:移除
      document.querySelectorAll('.remove-admin-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const email = btn.dataset.email;
          if (!confirm(`確定移除管理員「${email}」?\n對方將無法登入管理介面。`)) return;
          try {
            await authStore.removeAdmin(email);
            toast(`已移除 ${email}`);
            router.handle();
          } catch (e) {
            toast(`移除失敗:${e.message}`);
          }
        });
      });

      // 列表頁:篩選 chips
      document.querySelectorAll('.filter-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          let f = {};
          try { f = JSON.parse(localStorage.getItem('radpos.adminFilter') || '{}'); } catch {}
          f[btn.dataset.key] = btn.dataset.value;
          localStorage.setItem('radpos.adminFilter', JSON.stringify(f));
          router.handle();
        });
      });

      // 列表頁:欄位排序
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          let f = {};
          try { f = JSON.parse(localStorage.getItem('radpos.adminFilter') || '{}'); } catch {}
          const key = btn.dataset.sortKey;
          if (f.sortBy === key) {
            f.sortDir = f.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            f.sortBy = key;
            f.sortDir = 'asc';
          }
          localStorage.setItem('radpos.adminFilter', JSON.stringify(f));
          router.handle();
        });
      });

      // 列表頁:刪除按鈕(軟刪除 → 進回收筒)
      document.querySelectorAll('.admin-delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const id = btn.dataset.id;
          if (!confirm(`移到回收筒:「${name}」?\n\n資料不會永久刪除,可在「🗑 回收筒」分頁復原。\n圖片會保留。`)) return;
          try {
            await dataStore.softRemove(id);
            toast(`已移到回收筒:「${name}」(可復原)`);
            router.handle();
          } catch (e) {
            toast(`刪除失敗:${e.message}`);
          }
        });
      });

      // 回收筒:復原
      document.querySelectorAll('.restore-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const id = btn.dataset.id;
          try {
            await dataStore.restore(id);
            toast(`已復原:「${name}」`);
            router.handle();
          } catch (e) {
            toast(`復原失敗:${e.message}`);
          }
        });
      });

      // 回收筒:永久刪除(雙重確認 + 要打字)
      document.querySelectorAll('.permanent-delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const id = btn.dataset.id;
          if (!confirm(`⚠️ 永久刪除「${name}」?\n\n這個動作會:\n  • 從 Firestore 永久刪除文件\n  • 從 Storage 永久刪除所有圖片\n  • 無法復原`)) return;
          const typed = prompt(`再次確認:請輸入擺位 ID「${id}」以永久刪除`);
          if (typed !== id) {
            toast('輸入不符,取消刪除');
            return;
          }
          try {
            await dataStore.permanentRemove(id);
            toast(`已永久刪除「${name}」`);
            router.handle();
          } catch (e) {
            toast(`永久刪除失敗:${e.message}`);
          }
        });
      });

      // 列表頁:匯入/匯出
      const exportBtn = document.getElementById('export-btn');
      if (exportBtn) exportBtn.addEventListener('click', async () => {
        const all = await dataStore.getAll();
        const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `positions-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('已匯出 JSON');
      });
      const importBtn = document.getElementById('import-btn');
      if (importBtn) importBtn.addEventListener('click', () => {
        // 真匯入:選檔 → 逐筆 setDoc
        const picker = document.createElement('input');
        picker.type = 'file';
        picker.accept = '.json,application/json';
        picker.onchange = async (ev) => {
          const file = ev.target.files[0];
          if (!file) return;
          try {
            const text = await file.text();
            const items = JSON.parse(text);
            if (!Array.isArray(items)) throw new Error('JSON 根層必須是陣列');
            toast(`匯入中... (${items.length} 筆)`);
            let ok = 0, fail = 0;
            for (const p of items) {
              try { await dataStore.save(p); ok++; }
              catch (e) { fail++; console.error('匯入失敗:', p.id, e); }
            }
            toast(`匯入完成:${ok} 成功 / ${fail} 失敗`);
            router.handle();
          } catch (e) {
            toast(`匯入失敗:${e.message}`);
          }
        };
        picker.click();
      });

      // 表單頁
      const form = document.getElementById('admin-form');
      if (!form) return;

      // 浮動操作:儲存 + 回頂
      const floatingBar = document.getElementById('floating-action-bar');
      const floatingSave = document.getElementById('floating-save-btn');
      if (floatingSave) {
        floatingSave.addEventListener('click', () => {
          if (form.reportValidity()) {
            form.requestSubmit ? form.requestSubmit() : form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
          }
        });
      }
      const floatingToTop = document.getElementById('floating-totop-btn');
      if (floatingToTop) {
        floatingToTop.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
      // 捲到底部按鈕列進入視窗 → 整個浮動操作淡出(避免跟原按鈕重疊)
      const bottomBar = document.getElementById('form-action-bar');
      if (bottomBar && floatingBar && 'IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(en => {
            floatingBar.classList.toggle('opacity-0', en.isIntersecting);
            floatingBar.classList.toggle('pointer-events-none', en.isIntersecting);
          });
        }, { rootMargin: '0px 0px -50px 0px', threshold: 0.1 });
        io.observe(bottomBar);
      }

      // 暫存待上傳的檔案(按存時才真上傳)
      const pendingFiles = {};

      // 動態列表:新增列
      form.querySelectorAll('.list-add-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const wrap = btn.closest('.list-input');
          const name = wrap.dataset.listName;
          const idx = wrap.querySelectorAll('.list-row').length;
          btn.insertAdjacentHTML('beforebegin', listRowHtml(name, '', idx));
          rebindListRow(wrap);
        });
      });
      form.querySelectorAll('.list-input').forEach(rebindListRow);

      // 共用:把檔案塞進指定 image slot(預覽 + 暫存)
      function attachImageFile(slot, file) {
        if (!file || !file.type.startsWith('image/')) return false;
        const name = slot.dataset.name;
        pendingFiles[name] = file;
        const reader = new FileReader();
        reader.onload = () => {
          const preview = slot.querySelector('.img-preview');
          const empty = slot.querySelector('.img-empty');
          const hidden = slot.querySelector('input[type="hidden"]');
          preview.src = reader.result;
          preview.classList.remove('hidden');
          empty.classList.add('hidden');
          hidden.value = `__pending__${file.name || 'pasted-image'}`;
          // 若 slot 內沒有「移除圖片」按鈕,動態補上(初始無 currentUrl 時不會渲染)
          if (!slot.querySelector('.img-clear-btn')) {
            const browseBtn = slot.querySelector('.img-browse-btn');
            const btnRow = browseBtn?.parentElement;
            if (btnRow) {
              const clearBtn = document.createElement('button');
              clearBtn.type = 'button';
              clearBtn.className = 'img-clear-btn text-xs text-red-500 hover:text-red-600';
              clearBtn.dataset.name = name;
              clearBtn.textContent = '移除圖片';
              clearBtn.addEventListener('click', () => {
                preview.classList.add('hidden');
                empty.classList.remove('hidden');
                hidden.value = '';
                delete pendingFiles[name];
                clearBtn.remove();
              });
              btnRow.appendChild(clearBtn);
            }
          }
        };
        reader.readAsDataURL(file);
        return true;
      }

      // 1️⃣ 「📁 瀏覽檔案」按鈕 → 觸發 file input
      form.querySelectorAll('.img-browse-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slot = btn.closest('.image-input');
          slot.querySelector('.img-file-input').click();
        });
      });
      // file input change → 接收檔案
      form.querySelectorAll('.img-file-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (attachImageFile(input.closest('.image-input'), file)) {
            toast(`已選擇「${file.name}」,按儲存時上傳`);
          }
        });
      });

      // 2️⃣ 拖拉 + 3️⃣ 剪貼簿貼上(每個 image slot 都接)
      let activeSlot = null;
      form.querySelectorAll('.image-input').forEach(slot => {
        // 點擊大框框(drop-zone)或 slot → 標記為 active(剪貼簿貼上目標),focus 後 Ctrl+V 即生效
        slot.addEventListener('click', (e) => {
          // 點到瀏覽/清除按鈕時不要影響(讓那些按鈕跑自己的邏輯)
          if (e.target.closest('.img-browse-btn') || e.target.closest('.img-clear-btn')) return;
          activeSlot = slot;
          form.querySelectorAll('.image-input').forEach(s =>
            s.classList.remove('ring-2', 'ring-brand-500'));
          slot.classList.add('ring-2', 'ring-brand-500');
          // focus drop-zone,讓 Ctrl+V 直接生效
          slot.querySelector('.img-drop-zone')?.focus();
        });

        // Drag over / leave → 視覺回饋
        slot.addEventListener('dragover', (e) => {
          e.preventDefault();
          slot.classList.add('ring-2', 'ring-brand-500', 'bg-brand-50/40');
        });
        slot.addEventListener('dragleave', () => {
          slot.classList.remove('bg-brand-50/40');
        });
        slot.addEventListener('drop', (e) => {
          e.preventDefault();
          slot.classList.remove('bg-brand-50/40');
          const file = e.dataTransfer.files[0];
          if (attachImageFile(slot, file)) {
            toast(`已拖入「${file.name}」`);
          }
        });
      });

      // Ctrl+V 貼上(整個表單範圍)
      form.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items || [];
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const file = item.getAsFile();
            const extrasSection = form.querySelector('#extras-section');

            // 若 extras 區是 active paste 目標 → 加到 extras
            if (extrasSection && extrasSection._pasteTarget && form._addPendingExtra) {
              form._addPendingExtra(file);
              toast('已從剪貼簿貼到「額外圖」');
              e.preventDefault();
              return;
            }

            const target = activeSlot
              || [...form.querySelectorAll('.image-input')]
                  .find(s => !pendingFiles[s.dataset.name]
                              && !s.querySelector('input[type="hidden"]').value)
              || form.querySelector('.image-input');
            if (target && attachImageFile(target, file)) {
              const slotName = target.dataset.name === 'positioning_photo' ? '擺位照' : 'X 光片';
              toast(`已從剪貼簿貼到「${slotName}」`);
              activeSlot = target;
              form.querySelectorAll('.image-input').forEach(s =>
                s.classList.remove('ring-2', 'ring-brand-500'));
              target.classList.add('ring-2', 'ring-brand-500');
              e.preventDefault();
              return;
            }
          }
        }
      });

      // 點主要圖框時取消 extras paste target
      form.querySelectorAll('.image-input').forEach(slot => {
        slot.addEventListener('click', () => {
          const extrasSection = form.querySelector('#extras-section');
          if (extrasSection) extrasSection._pasteTarget = false;
        });
      });

      // === 額外圖區 ===
      const pendingExtras = []; // [{file, tempId}]
      const extrasSection = form.querySelector('#extras-section');
      if (extrasSection) {
        const extrasGrid = extrasSection.querySelector('.extras-grid');

        // 既有圖的移除
        extrasGrid.querySelectorAll('.extra-item').forEach(item => bindExtraRemove(item));

        function bindExtraRemove(item) {
          item.querySelector('.extra-remove-btn').addEventListener('click', () => {
            const tid = item.dataset.tempId;
            if (tid) {
              const idx = pendingExtras.findIndex(x => x.tempId === tid);
              if (idx >= 0) pendingExtras.splice(idx, 1);
            }
            item.remove();
          });
        }

        function addPendingExtra(file) {
          if (!file || !file.type.startsWith('image/')) return;
          const tempId = 'pe_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
          pendingExtras.push({ file, tempId });
          const reader = new FileReader();
          reader.onload = () => {
            const div = document.createElement('div');
            div.className = 'extra-item rounded-lg border-2 border-amber-300 dark:border-amber-700 overflow-hidden bg-white dark:bg-slate-800';
            div.dataset.tempId = tempId;
            div.innerHTML = `
              <div class="relative bg-black">
                <img src="${reader.result}" class="w-full aspect-square object-contain">
                <button type="button" class="extra-remove-btn absolute top-1 right-1 w-7 h-7 bg-red-500/90 text-white rounded-full text-base leading-7 hover:bg-red-600 shadow">×</button>
                <span class="absolute bottom-1 left-1 px-1.5 text-[10px] bg-amber-500 text-white rounded">未存</span>
              </div>
              <input type="text" class="extra-caption w-full px-3 py-2 text-sm border-0 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white dark:bg-slate-800 dark:text-slate-100"
                     value="" placeholder="註解(例:評片標準、另一角度...)">
            `;
            extrasGrid.appendChild(div);
            bindExtraRemove(div);
          };
          reader.readAsDataURL(file);
        }

        // 「瀏覽檔案」按鈕 → 開資料夾(只有這顆會開)
        const extraFileInput = extrasSection.querySelector('.extra-file-input');
        const extraBrowseBtn = document.getElementById('extra-browse-btn');
        const extraPasteZone = document.getElementById('extra-paste-zone');
        extraBrowseBtn?.addEventListener('click', () => extraFileInput.click());
        extraFileInput.addEventListener('change', (e) => {
          for (const f of e.target.files) addPendingExtra(f);
          e.target.value = '';
        });

        // 拖檔到 paste-zone 或既有 extras-grid 都接受
        for (const el of [extraPasteZone, extrasGrid].filter(Boolean)) {
          el.addEventListener('dragover', (e) => {
            e.preventDefault();
            el.classList.add('ring-2', 'ring-brand-500', 'bg-brand-50/30');
          });
          el.addEventListener('dragleave', () => {
            el.classList.remove('ring-2', 'ring-brand-500', 'bg-brand-50/30');
          });
          el.addEventListener('drop', (e) => {
            e.preventDefault();
            el.classList.remove('ring-2', 'ring-brand-500', 'bg-brand-50/30');
            for (const f of e.dataTransfer.files) addPendingExtra(f);
          });
        }

        // 點 extras-section / paste-zone → 設為 paste 目標(不開資料夾)
        const setPasteTarget = () => {
          activeSlot = null;
          extrasSection._pasteTarget = true;
          form.querySelectorAll('.image-input').forEach(s =>
            s.classList.remove('ring-2', 'ring-brand-500'));
          extraPasteZone?.classList.add('ring-2', 'ring-brand-500');
          extrasGrid.classList.add('ring-2', 'ring-brand-500');
          extraPasteZone?.focus();
        };
        extrasSection.addEventListener('click', (e) => {
          // 點瀏覽鈕、刪除鈕 → 別觸發 paste 目標
          if (e.target.closest('#extra-browse-btn') || e.target.closest('.extra-remove-btn') || e.target.closest('.extra-file-input')) return;
          setPasteTarget();
        });

        // 暴露給後續 submit handler 使用
        form._pendingExtras = pendingExtras;
        form._addPendingExtra = addPendingExtra;
      }

      // 圖片:移除
      form.querySelectorAll('.img-clear-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const wrap = form.querySelector(`.image-input[data-name="${btn.dataset.name}"]`);
          wrap.querySelector('.img-preview').classList.add('hidden');
          wrap.querySelector('.img-empty').classList.remove('hidden');
          wrap.querySelector('input[type="hidden"]').value = '';
          delete pendingFiles[btn.dataset.name];
          btn.remove();
        });
      });

      // 從 PDF/Word 自動填入
      const autoFillInput = document.getElementById('auto-fill-file');
      const autoFillStatus = document.getElementById('auto-fill-status');
      if (autoFillInput) autoFillInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        autoFillStatus.textContent = '解析中...';
        try {
          const text = await extractFileText(file);
          if (!text || text.trim().length < 50) throw new Error('檔案內無可讀文字');
          const parsed = parsePositionText(text, file.name);
          fillFormFromParsed(form, parsed);
          autoFillStatus.textContent = `✓ 已填入 (${parsed.position_of_patient.length}+${parsed.evaluation_criteria.length}+${parsed.tips.length} 項)`;
          toast(`已從「${file.name}」自動填入,請檢視後存`);
        } catch (err) {
          console.error(err);
          autoFillStatus.textContent = '❌ 解析失敗';
          toast(`解析失敗:${err.message}`);
        }
        e.target.value = '';
      });

      // 預覽(以詳情頁樣式 modal 顯示表單當前內容,含未存的圖)
      const previewBtn = document.getElementById('form-preview-btn');
      if (previewBtn) previewBtn.addEventListener('click', async () => {
        previewBtn.disabled = true;
        previewBtn.textContent = '產生中...';
        try {
          const data = collectFormData(form);
          if (!data.id) data.id = form.dataset.editId || computePipelineId(data.body_part, data.name_en || data.name_zh);

          // 把 pending file 轉 dataURL 用於預覽(取代 __pending__ placeholder)
          for (const [type, file] of Object.entries(pendingFiles)) {
            data.images[type] = await fileToDataURL(file);
          }
          // extras: 依 DOM 順序;既有用 data-url、pending 用 dataURL,都帶 caption
          const extrasSection = form.querySelector('#extras-section');
          if (extrasSection) {
            const finalExtras = [];
            const items = [...extrasSection.querySelectorAll('.extra-item')];
            const pendingExtras = form._pendingExtras || [];
            for (const item of items) {
              const cap = item.querySelector('.extra-caption')?.value.trim() || '';
              if (item.dataset.url) {
                finalExtras.push({ url: item.dataset.url, caption: cap });
              } else if (item.dataset.tempId) {
                const pending = pendingExtras.find(x => x.tempId === item.dataset.tempId);
                if (pending) {
                  finalExtras.push({ url: await fileToDataURL(pending.file), caption: cap });
                }
              }
            }
            data.images.extra = finalExtras;
          }

          showPreviewModal(data);
        } catch (e) {
          console.error(e);
          toast(`預覽失敗:${e.message}`);
        } finally {
          previewBtn.disabled = false;
          previewBtn.textContent = '預覽';
        }
      });

      // 即時 ID 預覽(根據 body_part + name_en 即時計算)
      const idPreview = form.querySelector('#id-preview');
      const editId = form.dataset.editId;
      const bpInput = form.querySelector('[name="body_part"]');
      const enInput = form.querySelector('[name="name_en"]');
      if (idPreview && bpInput && enInput) {
        const updateIdPreview = () => {
          const bp = bpInput.value.trim();
          const en = enInput.value.trim();
          if (!bp && !en) {
            idPreview.innerHTML = '<span class="text-slate-400">(請先填部位或英文名)</span>';
            return;
          }
          const newId = computePipelineId(bp, en);
          const isEdit = !!editId;
          const changed = isEdit && newId !== editId;
          const cache = dataStore._cache || [];
          const conflict = !isEdit && cache.some(p => p.id === newId && !p.deleted);
          const editSelf = isEdit && newId === editId;

          let html = `<span class="text-slate-500">儲存時將用 id:</span> <code class="font-mono text-brand-700 dark:text-brand-300">${escapeHtml(newId)}</code>`;
          if (conflict) {
            html += ` <span class="text-red-600">⚠️ 已有同 id 擺位,儲存會覆蓋</span>`;
          } else if (changed && !editSelf) {
            html += ` <span class="text-amber-600">⚠️ 和現有 id「${escapeHtml(editId)}」不同,儲存會建新的、舊的會留著</span>`;
          } else if (editSelf) {
            html += ` <span class="text-emerald-600">✓ 跟現有 id 一致</span>`;
          } else {
            html += ` <span class="text-emerald-600">✓ 可用</span>`;
          }
          idPreview.innerHTML = html;
        };
        bpInput.addEventListener('input', updateIdPreview);
        enInput.addEventListener('input', updateIdPreview);
        updateIdPreview();
      }

      // 自動產生 tag
      const autoTagBtn = document.getElementById('auto-tags-btn');
      if (autoTagBtn) autoTagBtn.addEventListener('click', () => {
        const bp = form.querySelector('[name="body_part"]').value;
        const en = form.querySelector('[name="name_en"]').value;
        const cat = form.querySelector('[name="category"]').value;
        const generated = autoGenerateTags(bp, en, cat);
        if (!generated.length) {
          toast('請先填「部位大標」或「英文名稱」');
          return;
        }
        const tagsInput = form.querySelector('[name="tags"]');
        const existing = tagsInput.value.split(/[,，]\s*/).map(s => s.trim()).filter(Boolean);
        // 合併:保留既有 + 新增不重複的
        const merged = [...new Set([...existing, ...generated])];
        tagsInput.value = merged.join(', ');

        // 顯示這次新加的(預覽 chip)
        const added = generated.filter(t => !existing.includes(t));
        const preview = document.getElementById('auto-tags-preview');
        preview.innerHTML = added.length
          ? added.map(t => `<span class="px-2 py-0.5 rounded text-xs bg-brand-100 dark:bg-brand-700/40 text-brand-700 dark:text-brand-200">+ ${escapeHtml(t)}</span>`).join('')
          : `<span class="text-xs text-slate-400">已存在,無新增</span>`;
        preview.classList.remove('hidden');
      });

      // 刪除(軟刪除 → 進回收筒)
      const delBtn = document.getElementById('form-delete-btn');
      if (delBtn) delBtn.addEventListener('click', async () => {
        const id = delBtn.dataset.id;
        if (!confirm(`移到回收筒「${id}」?\n\n資料和圖片不會永久刪除,可在管理頁的「🗑 回收筒」分頁復原。`)) return;
        try {
          await dataStore.softRemove(id);
          toast('已移到回收筒(可復原)');
          router.go('/admin');
        } catch (e) {
          toast(`刪除失敗:${e.message}`);
        }
      });

      // 儲存(真存進 Firestore + 上傳圖片到 Storage)
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = collectFormData(form);
        const missing = [];
        if (!data.name_zh) missing.push('中文名稱');
        if (!data.name_en) missing.push('英文名稱');
        if (!data.body_part) missing.push('部位大標');
        if (missing.length) {
          toast(`必填欄位未填:${missing.join('、')}`);
          return;
        }
        // id 自動生成
        const editId = form.dataset.editId;
        if (!data.id) data.id = editId || slugifyId(data.name_en);

        const submitBtn = form.querySelector('button[type="submit"]');
        const oldText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = '儲存中...';

        // 收集本次替換掉的舊圖 URL,儲存後標記為延遲刪除(3 天 grace)
        const urlsToGraceDelete = [];

        try {
          // 上傳新主要圖片(positioning_photo / xray_sample),若是替換要記下舊 URL
          for (const [type, file] of Object.entries(pendingFiles)) {
            const oldUrl = data.images?.[type];
            toast(`上傳 ${type} 圖片...`);
            const url = await dataStore.uploadImage(file, data.id, type);
            data.images[type] = url;
            if (oldUrl && oldUrl !== url) urlsToGraceDelete.push(oldUrl);
          }

          // 額外圖區:依 DOM 順序逐項組合(每項是 {url, caption})
          // 比對「原本有,新清單沒有」→ 標記延遲刪除
          const oldExtras = (data.images?.extra || []).map(e => typeof e === 'string' ? e : e?.url).filter(Boolean);
          const extrasSection = form.querySelector('#extras-section');
          if (extrasSection) {
            const finalExtras = [];
            const items = [...extrasSection.querySelectorAll('.extra-item')];
            const pendingExtras = form._pendingExtras || [];
            let extraIdx = 0;
            for (const item of items) {
              const captionInput = item.querySelector('.extra-caption');
              const caption = captionInput ? captionInput.value.trim() : '';
              if (item.dataset.url) {
                // 既有(URL 已存)
                finalExtras.push({ url: item.dataset.url, caption });
              } else if (item.dataset.tempId) {
                // 未存:上傳到 Storage
                const pending = pendingExtras.find(x => x.tempId === item.dataset.tempId);
                if (!pending) continue;
                toast(`上傳額外圖 ${extraIdx + 1}...`);
                const url = await dataStore.uploadImage(
                  pending.file, data.id, `extra_${extraIdx}`
                );
                finalExtras.push({ url, caption });
              }
              extraIdx++;
            }
            data.images.extra = finalExtras;
            // 找出被移除的 extras
            const newExtraUrls = new Set(finalExtras.map(e => e.url));
            for (const oldU of oldExtras) {
              if (!newExtraUrls.has(oldU)) urlsToGraceDelete.push(oldU);
            }
          } else {
            data.images.extra = data.images.extra || [];
          }

          // 處理「已確認」metadata
          if (data.reviewed) {
            const u = authStore.getUser();
            data.reviewed_by = u?.email || '';
            data.reviewed_by_name = u?.displayName || (u?.email?.split('@')[0]) || '';
            data.reviewed_at = new Date().toISOString();
          } else {
            // 取消確認 → 清掉 metadata
            data.reviewed_by = '';
            data.reviewed_by_name = '';
            data.reviewed_at = '';
          }

          // 寫 Firestore
          await dataStore.save(data);
          // 標記被換掉/移除的圖為延遲刪除(3 天 grace,給誤操作還原機會)
          if (urlsToGraceDelete.length) {
            Promise.allSettled(urlsToGraceDelete.map(u => markImageForGraceDelete(u, 3)))
              .then(() => console.log(`[grace] 標記 ${urlsToGraceDelete.length} 張舊圖待 3 天後刪除`));
          }
          toast(`已儲存 ${data.id}`);
          // 從詳情頁進來的就回詳情頁,否則回 admin 列表
          if (window._adminFormFrom === 'detail') {
            window._adminFormFrom = '';
            router.go(`/position/${data.id}`);
          } else {
            router.go('/admin');
          }
        } catch (err) {
          console.error(err);
          toast(`儲存失敗:${err.message}`);
          submitBtn.disabled = false;
          submitBtn.textContent = oldText;
        }
      });
    }

    function renumberListRows(wrap) {
      wrap.querySelectorAll('.list-row').forEach((row, i) => {
        const num = row.querySelector('.row-num');
        if (num) num.textContent = `${i + 1}.`;
      });
    }

    function rebindListRow(wrap) {
      // 刪除按鈕
      wrap.querySelectorAll('.list-del-btn').forEach(btn => {
        if (btn.dataset.bound) return;
        btn.dataset.bound = '1';
        btn.addEventListener('click', () => {
          if (wrap.querySelectorAll('.list-row').length <= 1) {
            btn.parentElement.querySelector('textarea').value = '';
          } else {
            btn.parentElement.remove();
            renumberListRows(wrap);
          }
        });
      });

      // 啟用拖拉排序(Sortable.js)— 每個 wrap 只初始化一次
      if (!wrap.dataset.sortableInited && typeof Sortable !== 'undefined') {
        wrap.dataset.sortableInited = '1';
        Sortable.create(wrap, {
          handle: '.drag-handle',
          animation: 180,
          ghostClass: 'opacity-30',
          chosenClass: 'ring-2',
          // 排除「+ 新增一項」按鈕,不讓它被拖
          filter: '.list-add-btn',
          preventOnFilter: false,
          onEnd: () => renumberListRows(wrap)
        });
      }
    }

    function collectFormData(form) {
      const fd = new FormData(form);
      const obj = {};
      const arrays = {};
      for (const [k, v] of fd.entries()) {
        if (k.endsWith('[]')) {
          const key = k.slice(0, -2);
          (arrays[key] = arrays[key] || []).push(v);
        } else {
          obj[k] = v;
        }
      }
      // 陣列欄位:過濾空值
      Object.entries(arrays).forEach(([k, arr]) => obj[k] = arr.filter(s => s.trim()));
      // tips_meeting:跟 data-orig 比對,改過的條目自動加 ✏ 標記(同步時不會被覆蓋)
      if (obj.tips_meeting) {
        const tas = Array.from(form.querySelectorAll('textarea[name="tips_meeting[]"]'));
        const origByVal = new Set();  // 用原值集合判斷是否「就是某條原文」
        tas.forEach(ta => { if ((ta.dataset.orig || '').trim()) origByVal.add(ta.dataset.orig); });
        obj.tips_meeting = obj.tips_meeting.map(v => {
          const trimmed = v.trim();
          if (!trimmed) return trimmed;
          // 已有 ✏ 不再加
          if (/^📷\s*✏|^🎓\s*✏/.test(trimmed)) return trimmed;
          // 原始 tip 集合內找得到 → 沒改,維持
          if (origByVal.has(trimmed)) return trimmed;
          // 改過了 → 加 ✏
          if (trimmed.startsWith('📷')) return trimmed.replace(/^📷\s*/, '📷✏ ');
          if (trimmed.startsWith('🎓')) return trimmed.replace(/^🎓\s*/, '🎓✏ ');
          return trimmed;  // 沒前綴(admin 自己貼的內容)
        });
        obj.tips = [...(obj.tips || []), ...obj.tips_meeting];
        delete obj.tips_meeting;
      }
      // tags 由逗號切
      if (typeof obj.tags === 'string') {
        obj.tags = obj.tags.split(/[,，]\s*/).map(s => s.trim()).filter(Boolean);
      }
      // sid_cm 轉數字
      if (obj.sid_cm) obj.sid_cm = Number(obj.sid_cm);
      // reviewed 轉 boolean(checkbox 沒勾就沒這 key)
      obj.reviewed = !!obj.reviewed;
      // 圖片
      obj.images = {
        positioning_photo: obj.positioning_photo || '',
        positioning_photo_caption: obj.positioning_photo_caption || '',
        xray_sample: obj.xray_sample || '',
        xray_sample_caption: obj.xray_sample_caption || '',
        extra: []
      };
      delete obj.positioning_photo;
      delete obj.positioning_photo_caption;
      delete obj.xray_sample;
      delete obj.xray_sample_caption;
      return obj;
    }

          <div class="flex items-center justify-end mt-2">
            <button type="button" class="bf-browse text-xs px-2.5 py-1 rounded border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700">

            </button>
          </div>
          <div class="mt-3">
            <label class="text-xs text-slate-500 dark:text-slate-400">圖片說明(選填)</label>
            <input type="text" class="bf-caption mt-1 w-full px-2.5 py-1.5 text-sm rounded border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800" value="${escapeHtml(existing.caption || '')}" placeholder="例:箭頭標示 cut-off 位置">
          </div>
          <div class="mt-4 flex justify-between gap-2">
            <div>
              ${existing.url ? `<button class="bf-remove px-3 py-1.5 text-xs text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded">🗑 移除目前圖</button>` : ''}

              <button class="bf-save px-3 py-1.5 text-sm bg-brand-600 hover:bg-brand-700 text-white rounded disabled:opacity-50" disabled>儲存</button>

      `;
      document.body.appendChild(modal);

      const fileInput = modal.querySelector('.bf-file');
      const browseBtn = modal.querySelector('.bf-browse');
      const dropEl = modal.querySelector('.bf-drop');
      const dropText = modal.querySelector('.bf-drop-text');
      const captionInput = modal.querySelector('.bf-caption');
      const saveBtn = modal.querySelector('.bf-save');
      const removeBtn = modal.querySelector('.bf-remove');
      let pendingFile = null;

      let lastPreviewUrl = null;
      const resetDropZone = () => {
        if (lastPreviewUrl) { URL.revokeObjectURL(lastPreviewUrl); lastPreviewUrl = null; }
        pendingFile = null;
        fileInput.value = '';  // 重置 file input,允許再次選同一檔
        dropEl.classList.add('flex', 'flex-col', 'items-center', 'justify-center');
        dropEl.classList.remove('relative', 'bg-black/5', 'dark:bg-black/40');
        dropEl.innerHTML = `<span class="bf-drop-text leading-relaxed text-center">拖曳圖檔到此<br>或點此後 Ctrl+V 貼上</span>`;
        saveBtn.disabled = true;
      };
      const setFile = (f) => {
        if (!f || !f.type.startsWith('image/')) return;
        if (lastPreviewUrl) URL.revokeObjectURL(lastPreviewUrl);
        pendingFile = f;
        lastPreviewUrl = URL.createObjectURL(f);
        dropEl.classList.remove('flex', 'flex-col', 'items-center', 'justify-center');
        dropEl.classList.add('relative', 'bg-black/5', 'dark:bg-black/40');
        dropEl.innerHTML = `
          <img src="${lastPreviewUrl}" class="w-full h-full object-contain rounded" alt="預覽">

          resetDropZone();
        });

      browseBtn.addEventListener('click', () => fileInput.click());
      dropEl.addEventListener('dragover', (e) => { e.preventDefault(); dropEl.classList.add('border-brand-500'); });
      dropEl.addEventListener('dragleave', () => dropEl.classList.remove('border-brand-500'));
      dropEl.addEventListener('drop', (e) => {
        e.preventDefault(); dropEl.classList.remove('border-brand-500');
        setFile(e.dataTransfer.files?.[0]);
      });
      // 允許貼上(Ctrl+V)— 聽整個 document,只在 modal 開著時生效
      const onPaste = (e) => {
        const items = e.clipboardData?.items || [];
        for (const it of items) {
          if (it.type.startsWith('image/')) { setFile(it.getAsFile()); e.preventDefault(); break; }
        }
      };
      document.addEventListener('paste', onPaste);
      // 開啟時 focus drop zone,讓鍵盤焦點接收 paste(雙保險)
      setTimeout(() => dropEl.focus(), 50);

      const close = () => {
        document.removeEventListener('paste', onPaste);
        modal.remove();

          const uid = (crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '' + Math.random())).replace(/-/g, '');
          const path = `bad_films/${uid}.jpg`;
          const ref = storageRef(storage, path);
          await uploadBytes(ref, blob, { contentType: 'image/jpeg' });
          const url = await getDownloadURL(ref);
          await badFilmImagesStore.set(bfId, {
            url,
            caption: captionInput.value.trim(),
            uploaded_by: (authStore.getUser()?.email || ''),
            uploaded_at: new Date().toISOString(),
          });

          close();

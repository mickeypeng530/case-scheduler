          console.error('[bf-upload]', e);
          toast('上傳失敗:' + e.message);
          saveBtn.disabled = false; saveBtn.textContent = '儲存';
        }
      });

      if (removeBtn) {
        removeBtn.addEventListener('click', async () => {
          if (!confirm('確定移除目前的不良片影像?')) return;
          try {
            await badFilmImagesStore.remove(bfId);
            toast('已移除');
            close();
            window.dispatchEvent(new HashChangeEvent('hashchange'));
          } catch (e) {
            toast('移除失敗:' + e.message);
          }
        });
      }
    }

    // ===== Utils =====
    function safeDecode(s) {
      if (!s) return s;
      try { return decodeURIComponent(s); }
      catch { return s; }
    }

    /**
     * 計算擺位的「完整度狀態」
     * @returns 'reviewed' | 'pending-build' | 'pending-fill' | 'normal'
     */
    // ===== 時間格式化 =====
    function fmtDateTime(iso, opts = {}) {
      if (!iso) return '';
      // 舊格式 date-only "YYYY-MM-DD"
      if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso;
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        const yr = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const dy = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mn = String(d.getMinutes()).padStart(2, '0');
        if (opts.dateOnly) return `${yr}-${mo}-${dy}`;
        return `${yr}-${mo}-${dy} ${hr}:${mn}`;
      } catch { return iso; }
    }

    function statusType(p) {
      if (!p) return 'normal';
      // reviewed 是終極狀態,優先於 override(避免「已確認」又被同時標為「待補」造成重複計數)
      if (p.reviewed) return 'reviewed';
      // 手動覆寫(僅在未 reviewed 時生效)
      const ov = p.status_override;
      if (ov && ov !== '' && ov !== 'auto') return ov;
      const posCount = (p.position_of_patient || []).length;
      const evalCount = (p.evaluation_criteria || []).length;
      const hasContent = posCount > 0 || evalCount > 0;
      const hasImg = !!(p.images && (p.images.positioning_photo || p.images.xray_sample));
      const notes = p.notes || '';
      const isTextbookDraft = notes.includes('📖');  // 教科書草稿
      const noteFlag = /範例|待補|⏳/.test(notes);
      if (!hasContent) return 'pending-build';                  // 完全空 → 紅
      if (isTextbookDraft) return 'pending-confirm';            // 教科書草稿 → 橙
      if (!hasImg || noteFlag) return 'pending-fill';            // 缺圖或項目 → 黃
      return 'normal';                                            // 已建置但未確認(綠/中性)
    }

    function statusBadgeHtml(p, opts = {}) {
      const t = statusType(p);
      const small = opts.small;
      const cls = small ? 'px-1.5 py-0 text-[10px]' : 'px-2 py-0.5 text-xs';
      if (t === 'pending-build')
        return `<span class="${cls} rounded bg-rose-100 text-rose-700 dark:bg-rose-900/60 dark:text-rose-200" title="完全空白,待建置">⌛ 待建置</span>`;
      if (t === 'pending-confirm')
        return `<span class="${cls} rounded bg-orange-100 text-orange-700 dark:bg-orange-900/60 dark:text-orange-300" title="教科書草稿,等待審核">📖 待確認</span>`;
      if (t === 'pending-fill')
        return `<span class="${cls} rounded bg-amber-100 text-amber-700 dark:bg-amber-900/60 dark:text-amber-300" title="有內容,缺圖或缺項目">⏳ 待補</span>`;
      if (t === 'reviewed') return ''; // 已確認的不擾,顯示在另一個 badge
      return '';
    }

    // 兼容舊資料(extra 是純字串陣列)與新資料(物件陣列)
    function normalizeExtra(e) {
      if (!e) return { url: '', caption: '' };
      if (typeof e === 'string') return { url: e, caption: '' };
      return { url: e.url || '', caption: e.caption || '' };
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    // ===== PDF / Word 文字解析(對應 split_word.py / extract_pipeline.py 邏輯) =====
    async function extractFileText(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith('.docx') || name.endsWith('.doc')) {
        const buf = await file.arrayBuffer();
        const r = await mammoth.extractRawText({ arrayBuffer: buf });
        return r.value;
      }
      if (name.endsWith('.pdf')) {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          // 用 y 座標換行
          let lastY = null;
          for (const it of content.items) {
            const y = it.transform[5];
            if (lastY !== null && Math.abs(y - lastY) > 4) text += '\n';
            text += it.str;
            lastY = y;
          }
          text += '\n';
        }
        return text;
      }
      throw new Error('只支援 .pdf 或 .docx');
    }

    // ===== 會議 .docx 解析(JSZip + DOMParser)=====

    // 推 body_part(從 exam_name 字串)
    function inferBodyPart(examName) {
      const e = (examName || '').toLowerCase();
      const map = [
        [/chest|肺|胸(?!椎)/, 'CHEST'],
        [/kub|abd|abdomen|腹/, 'ABDOMEN'],
        [/c-?spine|cervical|頸/, 'C-SPINE'],
        [/t-?spine|thoracic/, 'T-SPINE'],
        [/l-?spine|lumbar|腰椎/, 'L-SPINE'],
        [/skull|towns|water|顱|頭顱/, 'SKULL'],
        [/sinus|鼻竇/, 'SINUS'],
        [/mandible|下頷/, 'MANDIBLE'],
        [/tmj|顳顎/, 'TMJ'],
        [/zygomatic|顴/, 'ZYGOMATIC ARCH'],
        [/mastoid|乳突/, 'MASTOID'],
        [/wrist|腕/, 'WRIST'],
        [/finger|指(?!骨)/, 'FINGER'],
        [/hand|手(?!臂)/, 'HAND'],
        [/forearm|前臂/, 'FOREARM'],
        [/elbow|肘/, 'ELBOW'],
        [/humerus|肱/, 'HUMERUS'],
        [/shoulder|肩/, 'SHOULDER'],
        [/clavicle|鎖骨/, 'CLAVICLE'],
        [/(?:^| )thr|hip|髖/, 'HIP'],
        [/femur|股骨/, 'FEMUR'],
        [/knee|膝/, 'KNEE'],
        [/leg|tibia|fibula|小腿/, 'LEG'],
        [/ankle|踝/, 'ANKLE'],
        [/foot|足|腳/, 'FOOT'],
        [/toe|趾/, 'TOE'],
        [/bone\s*age|骨齡/, 'BONE AGE'],
        [/scano|scout|全脊|下肢全長/, 'SCANOGRAPHY'],
        [/neck/, 'NECK'],
      ];
      for (const [re, bp] of map) if (re.test(e)) return bp;
      return '';
    }

    // 從 exam_name 推 related_views;用 +,、 切多段比對(處理 "Chest PA+Rt+Lt Chest Rib" 這類多檢查)
    // 比對策略:相等 / 互含 / 前綴重疊(處理 "KUB Supine(包括尿道)" 這類含中文括號註解)
    async function inferRelatedViews(examName) {
      try {
        const all = await dataStore.getAll();
        // 去掉中文/括號後正規化,只剩英數字
        const norm = s => (s || '')
          .replace(/[一-鿿(()){}『』「」【】<>《》]/g, '')
          .toLowerCase()
          .replace(/[\s\-+,'’`./]+/g, '');
        const commonPrefixLen = (a, b) => {
          let n = 0;
          const lim = Math.min(a.length, b.length);
          while (n < lim && a[n] === b[n]) n++;
          return n;
        };
        if (!examName || examName.length < 3) return [];
        const tokens = examName.split(/[+,,、/]/).map(s => s.trim()).filter(s => s.length >= 3);
        const matchSet = new Map();  // view_id -> score
        for (const tok of tokens) {
          const e = norm(tok);
          if (!e || e.length < 3) continue;
          for (const p of all) {
            const en = norm(p.name_en || '');
            const id = norm(p.id || '');
            let s = 0;
            if (en && en === e) s = 6;
            else if (en && (en.includes(e) || e.includes(en))) s = 4;
            else if (id && (id.includes(e) || e.includes(id))) s = 3;
            else {
              // 前綴重疊
              const cpEn = en ? commonPrefixLen(en, e) : 0;
              const cpId = id ? commonPrefixLen(id, e) : 0;
              const cp = Math.max(cpEn, cpId);
              if (cp >= 5) s = 2;
            }
            if (s) matchSet.set(p.id, Math.max(matchSet.get(p.id) || 0, s));
          }
        }
        const arr = [...matchSet.entries()].sort((a, b) => b[1] - a[1]);
        return arr.slice(0, 5).map(x => x[0]);
      } catch { return []; }
    }

    // 解析 word/document.xml → 順序段落陣列(每段帶 text + 是否含圖)
    // 支援兩種圖示語法:
    //   - 新版 OOXML: <a:blip r:embed="rId8"/>(drawingml ns)
    //   - 舊版 VML: <v:imagedata r:id="rId8"/>(VML ns,常見於舊版 Word)
    function parseDocxParagraphs(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
      const W_NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
      const A_NS = 'http://schemas.openxmlformats.org/drawingml/2006/main';
      const V_NS = 'urn:schemas-microsoft-com:vml';
      const R_NS = 'http://schemas.openxmlformats.org/officeDocument/2006/relationships';
      const out = [];
      const ps = doc.getElementsByTagNameNS(W_NS, 'p');
      for (let i = 0; i < ps.length; i++) {
        const p = ps[i];
        const texts = p.getElementsByTagNameNS(W_NS, 't');
        let txt = '';
        for (const t of texts) txt += t.textContent;

        const embedIds = [];
        // 新版 a:blip
        const blips = p.getElementsByTagNameNS(A_NS, 'blip');
        for (const b of blips) {
          const eid = b.getAttributeNS(R_NS, 'embed') || b.getAttribute('r:embed');
          if (eid) embedIds.push(eid);
        }
        // 舊版 v:imagedata
        const vimgs = p.getElementsByTagNameNS(V_NS, 'imagedata');
        for (const v of vimgs) {
          const rid = v.getAttributeNS(R_NS, 'id') || v.getAttribute('r:id');
          if (rid) embedIds.push(rid);
        }

        out.push({ text: txt.trim(), hasImg: embedIds.length > 0, embedIds });
      }
      return out;
    }

    // 讀 word/_rels/document.xml.rels:embed id → 媒體相對路徑
    function parseDocxRels(xmlText) {
      const map = {};
      const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
      const rels = doc.getElementsByTagName('Relationship');
      for (const r of rels) {
        map[r.getAttribute('Id')] = r.getAttribute('Target');
      }
      return map;
    }

    // 主入口:解一份會議 .docx
    async function parseMeetingDocx(file) {
      if (!window.JSZip) throw new Error('JSZip 未載入');
      const buf = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(buf);

      const docXml = await zip.file('word/document.xml')?.async('string');
      if (!docXml) throw new Error('找不到 word/document.xml');
      const relsXml = await zip.file('word/_rels/document.xml.rels')?.async('string') || '';

      const paragraphs = parseDocxParagraphs(docXml);
      const rels = parseDocxRels(relsXml);

      // 抽 meeting id:檔名 "2026年04月..." → "2026-04"
      let mid = '';
      const mname = file.name.match(/(\d{4})年(\d{2})月/);
      if (mname) mid = `${mname[1]}-${mname[2]}`;

      // 解不良片區
      const bf = parseDocxBadFilms(paragraphs, mid);
      // 解教學區
      const tc = parseDocxTeachings(paragraphs, mid);

      // 配對圖到 bf:用 paragraphs 順序找最近的 bf
      // 每個 bf 記錄它最後一段的 paragraph index;之後出現的圖配給它,直到下個 bf 開始
      const bfImageBlobs = await assignImagesToBfs(zip, rels, paragraphs, bf);

      return {
        id: mid,
        source_file: file.name,
        bad_films: bf,
        teachings: tc,
        _bf_images: bfImageBlobs,  // { [bf.id]: Blob }
      };
    }

    function parseDocxBadFilms(paragraphs, meetingId) {
      const entries = [];
      let inSection = false;
      let current = null;

      for (let i = 0; i < paragraphs.length; i++) {
        const t = paragraphs[i].text;
        if (!inSection && /不良片討論/.test(t)) { inSection = true; continue; }
        if (inSection && /^[陸柒捌玖]、|^經驗分享|^討論事項/.test(t)) {
          inSection = false;
          if (current) { current._endIdx = i; entries.push(current); current = null; }
          continue;
        }
        if (!inSection || !t) continue;

        // 案例起始:case_id, exam_name, datetime
        const m = t.match(/^([A-Z0-9]{5,}|\d{6,})[,,]\s*(.+?)[,,]\s*(\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}(?::\d{2})?)/);
        if (m) {
          if (current) { current._endIdx = i; entries.push(current); }
          current = {
            case_id: m[1],
            exam_name: m[2].trim(),
            exam_datetime: m[3],
            issue: '', reason: '', decision: '',
            _startIdx: i, _endIdx: -1,
          };
          continue;
        }
        if (!current) continue;

        if (/^\(發送時間/.test(t)) continue;
        const reasonMatch = t.match(/^\s*原因[\s::：]*(.+)$/u);
        if (reasonMatch) { current.reason = reasonMatch[1].trim(); continue; }
        const decisionMatch = t.match(/^\s*(?:決議|改進)[\s::：]*(.+)$/u);
        if (decisionMatch) { current.decision = decisionMatch[1].trim(); continue; }
        // 短標籤(C-061、A-025、B1 之類),跳過
        if (/^[A-Z]-?\d{2,}/.test(t) && t.length < 25) continue;
        // 其餘當 issue 累積
        current.issue = (current.issue ? current.issue + ' ' : '') + t;
      }
      if (current) { current._endIdx = paragraphs.length; entries.push(current); }

      // 補 id / body_part(related_views 留 UI 端 async 補)
      return entries.map((bf, idx) => ({
        ...bf,
        id: `${meetingId}-BFP${String(idx + 1).padStart(2, '0')}`,
        body_part: inferBodyPart(bf.exam_name),
        related_views: [],
      }));
    }

    function parseDocxTeachings(paragraphs, meetingId) {
      const out = [];
      let inSection = false;
      let cur = null;
      let titleParts = [];   // 暫存 section 開始後、第一個 sub-heading 之前的段落 → 合併成 title
      let titleLocked = false;

      const isSubHead = (t) => /Position of Patient|擺位\s*\/\s*姿勢|SID|Central Ray|距離\s*\/\s*中心射線|Evaluation Criteria|評片標準/i.test(t);
      const isStartShare = (t) => /^伍、/.test(t) || /經驗分享/.test(t);
      const isEndShare = (t) => /^[陸柒捌玖]、|^討論事項|^臨時動議|^散會|^會議記錄/.test(t);

      for (let i = 0; i < paragraphs.length; i++) {
        const t = paragraphs[i].text;
        if (!t) continue;

        if (!inSection && isStartShare(t)) {
          inSection = true;
          // 同段就帶 view 名稱(用 [:全形/半形] + 空白匹配)
          const after = t.replace(/^.*?經驗分享[\s::　]*/u, '').trim();
          if (after) titleParts.push(after);
          continue;
        }
        if (inSection && isEndShare(t)) {
          if (cur) { out.push(cur); cur = null; }
          inSection = false; titleParts = []; titleLocked = false;
          continue;
        }
        if (!inSection) continue;

        // 第一個 sub-heading 出現前 → 累積成 title
        if (!titleLocked && !isSubHead(t) && !cur) {
          titleParts.push(t);
          continue;
        }

        // 遇到 sub-heading → 鎖定 title 並建 cur
        if (isSubHead(t) && !cur) {
          titleLocked = true;
          cur = { title: titleParts.join(' ').trim(), summary: '', key_points: [] };
          titleParts = [];
          continue;
        }

        if (!cur) continue;
        if (isSubHead(t)) continue;

        // 編號條目 → key_points
        if (/^\d+\s*[.\s、]/.test(t)) {
          cur.key_points.push(t.replace(/^\d+\s*[.\s、]+/, '').trim());
        } else if (cur.summary) {
          cur.summary += ' ' + t;
        } else {
          cur.summary = t;
        }
      }
      if (cur) out.push(cur);
      // 沒進到 sub-heading 但有 title 段落(罕見場合)→ 也輸出為 1 筆
      else if (titleParts.length) out.push({ title: titleParts.join(' ').trim(), summary: '', key_points: [] });

      return out
        .filter(tc => tc.title || tc.summary || tc.key_points.length)
        .map((tc, idx) => ({
          id: `${meetingId}-T${String(idx + 1).padStart(2, '0')}`,
          view_id: '',
          title: tc.title,
          summary: tc.summary,
          key_points: tc.key_points,
        }));
    }

    // 配對圖片到 bf:按 paragraph 順序,每個 bf 取「位於它 _startIdx 之後且在下個 bf _startIdx 之前」的第一張圖
    async function assignImagesToBfs(zip, rels, paragraphs, bfs) {
      const result = {};
      if (!bfs.length) return result;

      // 抽出 word/media 內的 blob,key 為 word/media/imageX.png
      const mediaCache = {};
      const loadMedia = async (relTarget) => {
        // relTarget 形如 "media/image3.png" → 完整路徑 word/media/image3.png
        const path = 'word/' + relTarget.replace(/^\.\.?\//, '');
        if (mediaCache[path]) return mediaCache[path];
        const f = zip.file(path);
        if (!f) return null;
        const blob = await f.async('blob');
        mediaCache[path] = blob;
        return blob;
      };

      for (let bi = 0; bi < bfs.length; bi++) {
        const bf = bfs[bi];
        const start = bf._startIdx;
        const end = bi + 1 < bfs.length ? bfs[bi + 1]._startIdx : (bf._endIdx || paragraphs.length);
        // 找第一段含圖的
        for (let i = start; i < end; i++) {
          const p = paragraphs[i];
          if (!p.hasImg || !p.embedIds.length) continue;
          const target = rels[p.embedIds[0]];
          if (!target) continue;
          const blob = await loadMedia(target);
          if (blob) { result[bf.id] = blob; break; }
        }
      }
      return result;
    }


    function parsePositionText(text, fileName) {
      const rawLines = text.split(/\r?\n/).map(l => l.trim());
      const lines = rawLines;

      // body_part: 找「X-Y、Word」或「X、Word」的最後一個
      let bodyPart = '';
      const headerRe = /^(\d+(?:-\d+)?)\s*[、．.]\s*([A-Za-z][\w\s\-\/&]+?)\s*$/;
      for (const l of lines) {
        const m = l.match(headerRe);
        if (m) bodyPart = m[2].trim().toUpperCase();
      }
      // 從檔名再 fallback(例:Shoulder Y view.pdf)
      if (!bodyPart) {
        const stem = fileName.replace(/\.[^.]+$/, '');
        const fnMatch = stem.match(/^([A-Za-z][\w\-]+)/);
        if (fnMatch) bodyPart = fnMatch[1].toUpperCase();
      }

      // 找 Position of Patient anchor
      const posIdx = lines.findIndex(l => /^Position of Patient/i.test(l));
      if (posIdx < 0) {
        return { body_part: bodyPart, view: '', position_of_patient: [], sid_cm: null, central_ray: '', central_ray_notes: [], evaluation_criteria: [], tips: [] };
      }

      // 往前找 view name(15 行內)
      let view = '';
      const viewKW = /\b(view|AP|PA|LAT|Lateral|Oblique|Axial|Standing|Decubitus|Supine|Open\s*Mouth|Flexion|Extension|Tunnel|Y\s*view|Frog|Mortise|Internal|External|Scapular|Bone\s*Age|Whole\s*Spine|Lower\s*Limbs?|Stenver|Caldwell|Town|Water|Law|Fuchs|Mastoid|Sella|Clavicle|Both|Sacroiliac|Sternoclavicular|Sternum|S-C\s*Joint|Lordotic)\b/i;
      for (let j = posIdx - 1; j >= Math.max(0, posIdx - 15); j--) {
        const t = lines[j];
        if (!t) continue;
        if (headerRe.test(t)) break;
        if (t.length > 60) continue;
        if (viewKW.test(t)) { view = t; break; }
      }
      // fallback:取緊鄰的非空短行
      if (!view) {
        for (let j = posIdx - 1; j >= Math.max(0, posIdx - 5); j--) {
          const t = lines[j];
          if (t && t.length <= 60 && !headerRe.test(t)) { view = t; break; }
        }
      }

      // 解析 Position / SID / Eval / Tips
      let state = null;
      const result = {
        body_part: bodyPart, view,
        position_of_patient: [], sid_cm: null, central_ray: '', central_ray_notes: [],
        evaluation_criteria: [], tips: []
      };
      const isIntro = (s) => /[.。…]{2,}\s*$/.test(s) || s.endsWith('...');
      const cleanCh = (s) => s.replace(/([\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])\s+(?=[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])/g, '$1').trim();

      for (let i = posIdx; i < lines.length; i++) {
        const l = lines[i];
        if (/^Position of Patient/i.test(l)) { state = 'pos'; continue; }
        if (/^SID\s*\/\s*Central Ray/i.test(l)) { state = 'sid'; continue; }
        if (/^Evaluation Criteria/i.test(l)) { state = 'eval'; continue; }
        if (/^Tips/i.test(l)) { state = 'tips'; continue; }
        if (!l) continue;
        const cleaned = cleanCh(l.replace(/^\d+[.、)]\s*/, ''));

        if (state === 'pos') result.position_of_patient.push(cleaned);
        else if (state === 'eval') result.evaluation_criteria.push(cleaned);
        else if (state === 'tips') result.tips.push(cleaned);
        else if (state === 'sid') {
          const m = cleaned.match(/^(\d+)\s*cm\s*\/\s*(.+)$/i);
          if (m && result.sid_cm === null) {
            result.sid_cm = parseInt(m[1]);
            result.central_ray = m[2].trim();
          } else {
            result.central_ray_notes.push(cleaned);
          }
        }
      }

      // 過濾 intro / 太短
      result.position_of_patient = result.position_of_patient.filter(x => x.length > 3 && !isIntro(x));
      result.evaluation_criteria = result.evaluation_criteria.filter(x => x.length > 3);
      result.tips = result.tips.filter(x => x.length > 3 && !isIntro(x));
      result.central_ray_notes = result.central_ray_notes.filter(x => x.length > 3);

      return result;
    }

    function fillFormFromParsed(form, parsed) {
      const set = (name, value) => {
        const el = form.querySelector(`[name="${name}"]`);
        if (el && value !== undefined && value !== null && value !== '') el.value = value;
      };
      set('body_part', parsed.body_part);
      if (parsed.body_part || parsed.view) {
        set('name_en', `${parsed.body_part || ''} ${parsed.view || ''}`.trim());
      }
      // name_zh 自動組(用 BODY_PART_ZH + view 對照)
      if (parsed.body_part) {
        const bpZh = ({
          'SKULL':'頭顱','C-SPINE':'頸椎','T-SPINE':'胸椎','L-SPINE':'腰椎',
          'CHEST':'胸部','SHOULDER':'肩關節','ABDOMEN':'腹部','PELVIS':'骨盆腔',
          'HIP':'髖關節','KNEE':'膝關節','ANKLE':'踝關節','FOOT':'足部',
          'ELBOW':'肘關節','WRIST':'腕關節','HAND':'手部','HUMERUS':'肱骨',
          'FEMUR':'股骨','TIBIA':'脛骨','MANDIBLE':'下頷骨','TMJ':'顳顎關節',
          'SINUS':'副鼻竇','FACIAL':'顏面骨','NASAL':'鼻骨','MASTOID':'乳突',
          'CLAVICLE':'鎖骨','SCAPULA':'肩胛骨','FOREARM':'前臂','FINGER':'手指',
          'BONE AGE':'骨齡','SCANOGRAPHY':'全長片'
        })[parsed.body_part.toUpperCase()] || '';
        const vsUp = (parsed.view || '').toUpperCase();
        const vZh = vsUp.includes('AP') ? '前後位'
                  : vsUp.includes('PA') ? '後前位'
                  : vsUp.includes('LATERAL') || vsUp.includes('LAT') ? '側位'
                  : vsUp.includes('OBLIQUE') ? '斜位'
                  : vsUp.includes('AXIAL') ? '軸位' : '';
        if (bpZh) set('name_zh', `${bpZh}${vZh}`);
      }
      set('sid_cm', parsed.sid_cm);
      set('central_ray', parsed.central_ray);

      // 動態列表
      const fillList = (name, items) => {
        const wrap = form.querySelector(`.list-input[data-list-name="${name}"]`);
        if (!wrap || !items) return;
        wrap.querySelectorAll('.list-row').forEach(r => r.remove());
        const addBtn = wrap.querySelector('.list-add-btn');
        const arr = items.length ? items : [''];
        arr.forEach((item, i) => addBtn.insertAdjacentHTML('beforebegin', listRowHtml(name, item, i)));
        rebindListRow(wrap);
      };
      fillList('position_of_patient', parsed.position_of_patient);
      fillList('evaluation_criteria', parsed.evaluation_criteria);
      fillList('tips', parsed.tips);
      fillList('central_ray_notes', parsed.central_ray_notes);
    }

    function showPreviewModal(p) {
      const cat = CATEGORIES.find(c => c.id === p.category);
      const hasPhoto = p.images && p.images.positioning_photo;
      const hasXray = p.images && p.images.xray_sample;

      const modal = document.createElement('div');
      modal.id = 'preview-modal';
      modal.className = 'fixed inset-0 z-50 bg-black/70 overflow-auto';
      modal.innerHTML = `
        <div class="max-w-4xl mx-auto my-6 mb-12 bg-slate-50 dark:bg-slate-900 rounded-xl shadow-2xl">
          <!-- modal header -->
          <div class="sticky top-0 z-10 flex items-center justify-between px-5 py-3 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-t-xl">
            <div class="flex items-center gap-2">
              <span class="px-2 py-0.5 rounded text-xs bg-amber-100 text-amber-700 dark:bg-amber-900/60 dark:text-amber-200">尚未儲存的預覽</span>
              <span class="text-sm text-slate-500">${escapeHtml(cat ? cat.name_zh : '')}</span>
            </div>
            <button id="preview-close-btn" class="px-3 py-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-sm" aria-label="關閉預覽">
              ✕ 關閉
            </button>
          </div>

          <!-- 內容區(模擬詳情頁版型) -->
          <div class="p-4 sm:p-6">
            <div class="bg-white dark:bg-slate-800 rounded-xl p-6 sm:p-8 border border-slate-200 dark:border-slate-700 shadow-sm">
              <div class="flex items-baseline flex-wrap gap-x-3 gap-y-1">
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white">${escapeHtml(p.body_part || '?')}</h1>
                <span class="text-lg text-slate-600 dark:text-slate-300">${escapeHtml(p.name_en || '')}</span>
              </div>
              <div class="mt-1 text-base text-slate-500 dark:text-slate-400">${escapeHtml(p.name_zh || '')}</div>

              ${p.position_of_patient && p.position_of_patient.length ? `
                <section class="mt-8">
                  <h2 class="text-lg sm:text-xl font-bold text-brand-600 dark:text-brand-400 uppercase tracking-wider">Position of Patient <span class="text-slate-400 font-normal text-sm">擺位/姿勢</span></h2>
                  <ol class="mt-2 space-y-2 text-slate-700 dark:text-slate-200 list-decimal list-outside pl-6 leading-relaxed">
                    ${p.position_of_patient.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
                  </ol>
                </section>
              ` : ''}

              <section class="mt-6">
                <h2 class="text-lg sm:text-xl font-bold text-brand-600 dark:text-brand-400 uppercase tracking-wider">SID / Central Ray <span class="text-slate-400 font-normal text-sm">距離/中心射線</span></h2>
                <div class="mt-2 text-slate-700 dark:text-slate-200 leading-relaxed">
                  <span class="font-semibold">${p.sid_cm ? p.sid_cm + ' cm' : ''}</span>
                  ${p.sid_cm && p.central_ray ? ' / ' : ''}
                  ${escapeHtml(p.central_ray || '')}
                </div>
                ${p.central_ray_notes && p.central_ray_notes.length ? `
                  <ol class="mt-2 space-y-1 text-slate-600 dark:text-slate-300 list-decimal list-outside pl-6 text-sm leading-relaxed">
                    ${p.central_ray_notes.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
                  </ol>
                ` : ''}
              </section>

              <section class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                ${imageBlock(hasPhoto, '擺位照', 'positioning', p.images?.positioning_photo_caption)}
                ${imageBlock(hasXray, 'X 光示範片', 'X-ray sample', p.images?.xray_sample_caption)}
              </section>

              ${(p.images && p.images.extra && p.images.extra.length) ? `
                <section class="mt-4">
                  <div class="text-xs text-slate-400 mb-2">額外影像 ${p.images.extra.length} 張</div>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${p.images.extra.map((e, i) => {
                      const item = normalizeExtra(e);
                      const cap = item.caption || `補充 ${i+1}`;
                      return `
                        <figure class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 bg-black">
                          <img src="${escapeHtml(item.url)}" alt="${escapeHtml(cap)}" class="w-full aspect-square object-contain">
                          <figcaption class="text-center text-xs text-slate-500 py-2 bg-white dark:bg-slate-800">${escapeHtml(cap)}</figcaption>
                        </figure>
                      `;
                    }).join('')}
                  </div>
                </section>
              ` : ''}

              ${p.evaluation_criteria && p.evaluation_criteria.length ? `
                <section class="mt-6">
                  <h2 class="text-lg sm:text-xl font-bold text-brand-600 dark:text-brand-400 uppercase tracking-wider">Evaluation Criteria <span class="text-slate-400 font-normal text-sm">評片標準</span></h2>
                  <ol class="mt-2 space-y-2 text-slate-700 dark:text-slate-200 list-decimal list-outside pl-6 leading-relaxed">
                    ${p.evaluation_criteria.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
                  </ol>
                </section>
              ` : ''}

              ${p.tips && p.tips.length ? renderTipsSection(p.tips) : ''}
              ${p.tips && p.tips.length ? renderMeetingExtractsSection(p.tips) : ''}

              ${p.notes ? `
                <section class="mt-6 text-xs text-slate-400 dark:text-slate-500 italic">
                  備註:${escapeHtml(p.notes)}
                </section>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      // 關閉:按鈕、點背景、Esc
      const close = () => modal.remove();
      modal.querySelector('#preview-close-btn').addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
      const onKey = (e) => {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey); }
      };
      document.addEventListener('keydown', onKey);
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function debounce(fn, ms) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    // 鍵盤 esc 關 lightbox
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const lb = document.getElementById('lightbox');
        if (lb && !lb.hidden) lb.hidden = true;
      }
    });

    // 鍵盤快捷鍵:詳情頁按 E 直跳編輯 / 編輯頁按 Esc 跳回詳情(僅 admin)
    document.addEventListener('keydown', (e) => {
      // 跳過 input/textarea/contenteditable 內的鍵入
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      const hash = location.hash || '';
      // E:詳情頁跳編輯
      if ((e.key === 'e' || e.key === 'E') && /^#\/position\//.test(hash)) {
        if (!authStore.isAdmin || !authStore.isAdmin()) return;
        const id = decodeURIComponent(hash.replace(/^#\/position\//, ''));
        e.preventDefault();
        router.go(`/admin/edit/${encodeURIComponent(id)}?from=detail`);
        return;
      }
      // Esc:從詳情進來的編輯頁,跳回該詳情
      if (e.key === 'Escape' && /^#\/admin\/edit\//.test(hash) && window._adminFormFrom === 'detail') {
        const m = hash.match(/^#\/admin\/edit\/([^?]+)/);
        if (m) {
          window._adminFormFrom = '';
          router.go(`/position/${m[1]}`);
        }
      }
    });

    // 全域回最上面按鈕(只設定一次)
    (function setupGlobalBackTop() {
      const btn = document.getElementById('global-back-top');
      if (!btn) return;
      const onScroll = () => {
        // 編輯擺位頁的浮動操作列已含「回頂」鈕,避免雙重 → 隱藏全域版
        const hasFloatingBar = !!document.getElementById('floating-action-bar');
        const show = !hasFloatingBar && window.scrollY > 300;
        btn.classList.toggle('opacity-0', !show);
        btn.classList.toggle('pointer-events-none', !show);
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      onScroll();
    })();

    // ===== 啟動 =====
    applyTheme(prefs.getTheme());
    applyFontSize(prefs.getFontSize());
    authStore.init();
    authStore.onChange(() => router.handle()); // 登入狀態變了重新渲染
    // 背景載入 Firestore 資料(meetings + bad_film_images),完成後 trigger 重渲染
    Promise.all([
      meetingsStore.loadLive(),
      badFilmImagesStore.loadAll(),
    ]).then(() => {
      if (location.hash) router.handle();
    });
    dataStore.init().then(() => router.init());

    // 暴露到全域方便 debug
    window.__radpos = { dataStore, prefs, router, CATEGORIES, auth, db, storage };
  </script>
